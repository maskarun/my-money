<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Money">
<meta name="theme-color" content="#f0f4ff">
<link id="ati" rel="apple-touch-icon" sizes="180x180">
<title>My Money</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --fg: #0f172a;
  --card: #ffffff;
  --border: #e0e7ff;
  --muted: #f0f4ff;
  --muted-fg: #94a3b8;
  --accent: #0284c7;
  --accent-fg: #ffffff;
  --income: #059669;
  --expense: #e11d48;
  --gold: #d97706;
  --radius: 16px;
  --radius-md: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 8px rgba(14,165,233,.07);
  --shadow-bold: 0 16px 48px -8px rgba(2,132,199,.35);
  --nav-h: 56px;
  --header-h: 52px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--fg); height: 100%;
  overflow: hidden; -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none; -webkit-font-smoothing: antialiased;
}
button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
input, select, textarea { font-family: inherit; color: var(--fg); }
a { color: inherit; text-decoration: none; }

/* Header */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(var(--safe-top) + 10px) 16px 10px;
  background: var(--card); border-bottom: 1px solid var(--border);
  height: calc(var(--header-h) + var(--safe-top));
  box-shadow: 0 1px 0 var(--border);
}
.header-title { font-size: 17px; font-weight: 900; letter-spacing: -.5px; }
.header-badge {
  font-size: 8px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase;
  background: var(--accent); color: #fff; border-radius: 4px; padding: 2px 6px; margin-left: 7px;
}
.header-actions { display: flex; gap: 5px; }
.hbtn {
  height: 26px; padding: 0 9px; border-radius: 6px; font-size: 10px; font-weight: 600;
  border: 1px solid var(--border); background: var(--bg); color: var(--fg);
  display: flex; align-items: center; gap: 3px;
}

/* Scroll */
#scroll {
  position: fixed; top: calc(var(--header-h) + var(--safe-top));
  left: 0; right: 0; bottom: calc(var(--nav-h) + var(--safe-bottom));
  overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 14px 20px;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Nav */
#nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + var(--safe-bottom)); padding-bottom: var(--safe-bottom);
  background: var(--card); border-top: 1px solid var(--border);
  display: flex; z-index: 100; box-shadow: 0 -2px 12px rgba(14,165,233,.06);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; font-size: 9px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
  color: var(--muted-fg); min-height: 44px; touch-action: manipulation;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 20px; height: 20px; stroke-width: 1.8; }

/* Hero card */
.card-hero {
  background: linear-gradient(135deg, #0369a1 0%, #0284c7 55%, #0ea5e9 100%);
  color: #fff; border-radius: var(--radius); padding: 18px;
  box-shadow: var(--shadow-bold); margin-bottom: 12px;
}
.card-hero .eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 1.6px; opacity: .6; text-transform: uppercase; }
.card-hero .amount { font-size: 32px; font-weight: 900; letter-spacing: -1.2px; margin-top: 4px; font-variant-numeric: tabular-nums; }
.card-hero .chips { display: flex; gap: 8px; margin-top: 12px; }
.card-hero .chip { background: rgba(255,255,255,.15); border-radius: 8px; padding: 6px 10px; flex: 1; }
.card-hero .chip-lbl { font-size: 8px; font-weight: 700; opacity: .6; letter-spacing: .8px; text-transform: uppercase; }
.card-hero .chip-val { font-size: 13px; font-weight: 800; margin-top: 1px; font-variant-numeric: tabular-nums; }
.card-hero .chip-val.inc { color: #d1fae5; }
.card-hero .chip-val.exp { color: #fee2e2; }

/* Summary stat cards */
.cards-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.stat-card { background: var(--card); border-radius: var(--radius-md); padding: 12px 14px; border: 1px solid var(--border); }
.stat-card .sc-label { font-size: 9px; font-weight: 700; color: var(--muted-fg); text-transform: uppercase; letter-spacing: .7px; }
.stat-card .sc-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.stat-card .sc-amount { font-size: 18px; font-weight: 800; margin-top: 4px; letter-spacing: -.4px; font-variant-numeric: tabular-nums; }
.stat-card .sc-amount.income { color: var(--income); }
.stat-card .sc-amount.expense { color: var(--expense); }

/* Section card */
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow); }
.sec-hdr { display: flex; align-items: flex-start; justify-content: space-between; padding: 14px 16px 10px; }
.sec-title-row { display: flex; align-items: center; gap: 7px; }
.sec-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sec-dot.green { background: #10b981; }
.sec-dot.red { background: #f43f5e; }
.sec-dot.amber { background: #f59e0b; }
.sec-title { font-size: 15px; font-weight: 800; letter-spacing: -.3px; }
.sec-sub { font-size: 10px; color: var(--muted-fg); margin-top: 2px; padding-left: 14px; }
.sec-totals { text-align: right; }
.sec-total-lbl { font-size: 8px; font-weight: 700; letter-spacing: 1px; color: var(--muted-fg); text-transform: uppercase; margin-bottom: 2px; }
.sec-total-amt { font-size: 13px; font-weight: 800; line-height: 1.5; font-variant-numeric: tabular-nums; }
.sec-total-amt.grn { color: var(--income); }
.sec-total-amt.red { color: var(--expense); }
.sec-total-amt.amb { color: var(--gold); }

/* Add transaction area (inside card, no border) */
.tx-form-wrap { padding: 0 16px 14px; }
.sec-hdr-pad { padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between; }

/* Toggle pill */
.toggle-pill { display: flex; gap: 3px; background: var(--muted); border-radius: 10px; padding: 3px; margin-bottom: 12px; }
.toggle-pill button { flex: 1; height: 28px; border-radius: 8px; font-size: 12px; font-weight: 700; letter-spacing: .1px; transition: background .18s, color .18s; touch-action: manipulation; color: var(--muted-fg); }
.toggle-pill button.active { background: var(--card); box-shadow: 0 1px 4px rgba(0,0,0,.1); color: var(--fg); }
.toggle-pill button.active.expense { color: var(--expense); }
.toggle-pill button.active.income { color: var(--income); }

/* Form */
.form-row { margin-bottom: 10px; }
.form-label { display: block; font-size: 10px; font-weight: 700; color: var(--muted-fg); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .5px; }
.input {
  width: 100%; height: 40px; border: 1.5px solid var(--border);
  border-radius: var(--radius-md); padding: 0 12px;
  font-size: 16px; background: var(--bg);
  appearance: none; -webkit-appearance: none; outline: none; transition: border-color .15s;
  font-variant-numeric: tabular-nums;
}
.input:focus { border-color: var(--accent); }
textarea.input { height: 68px; padding: 10px 12px; resize: none; }
.select-wrap { position: relative; }
.select-wrap::after {
  content: ''; position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
  border-left: 4px solid transparent; border-right: 4px solid transparent;
  border-top: 5px solid var(--muted-fg); pointer-events: none;
}
.select-wrap select { padding-right: 30px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }

/* Buttons */
.btn {
  display: flex; align-items: center; justify-content: center;
  gap: 5px; min-height: 36px; border-radius: var(--radius-md);
  font-size: 13px; font-weight: 700; padding: 0 14px;
  touch-action: manipulation; transition: opacity .15s; width: 100%;
}
.btn:active { opacity: .75; }
.btn svg { width: 15px; height: 15px; flex-shrink: 0; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-outline { border: 1.5px solid var(--border); background: var(--card); color: var(--fg); }
.add-form-btns { display: flex; gap: 8px; margin-top: 12px; }
.add-form-btns .btn { flex: 1; }

/* Portfolio rows */
.p-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-top: 1px solid var(--muted); }
.p-row-icon { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.p-row-icon.sav { background: #e0f2fe; }
.p-row-icon.loan { background: #fff1f2; }
.p-row-icon.gold { background: #fef9c3; }
.p-row-icon.inv { background: #f3e8ff; }
.p-row-meta { flex: 1; min-width: 0; }
.p-row-name { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 5px; letter-spacing: -.1px; }
.cur-pill { font-size: 8px; font-weight: 800; background: #e0f2fe; color: var(--accent); padding: 1px 5px; border-radius: 4px; letter-spacing: .3px; }
.cur-pill.red { background: #fff1f2; color: var(--expense); }
.cur-pill.amb { background: #fef9c3; color: var(--gold); }
.ov-card { margin: 16px 16px 0; padding: 18px 16px 14px; }
.ov-cur-label { font-size: 11px; font-weight: 800; letter-spacing: .6px; color: var(--muted-fg); text-transform: uppercase; margin-bottom: 4px; }
.ov-net { font-size: 28px; font-weight: 800; letter-spacing: -.5px; font-variant-numeric: tabular-nums; margin-bottom: 14px; }
.ov-divider { height: 1px; background: var(--border); margin-bottom: 12px; }
.ov-row { display: flex; align-items: center; justify-content: space-between; }
.ov-row-left { display: flex; align-items: center; gap: 7px; }
.ov-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ov-row-label { font-size: 13px; font-weight: 600; color: var(--fg); }
.ov-row-val { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
.ov-row-detail { padding-left: 15px; margin-top: 4px; display: flex; flex-wrap: wrap; gap: 4px 10px; }
.ov-sub { font-size: 11px; color: var(--muted-fg); }
.ov-sub.muted { font-style: italic; }
.p-row-sub { font-size: 10px; color: var(--muted-fg); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
.p-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.p-row-amt-lbl { font-size: 8px; font-weight: 600; letter-spacing: .7px; color: var(--muted-fg); text-transform: uppercase; }
.p-row-amt { font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -.2px; }
.p-row-amt.grn { color: var(--income); }
.p-row-amt.red { color: var(--expense); }
.p-row-amt.amb { color: var(--gold); }
.p-row-btns { display: flex; gap: 1px; }
.ibtn { width: 26px; height: 26px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: #cbd5e1; transition: color .15s, background .15s; }
.ibtn:hover { background: var(--muted); color: #64748b; }
.ibtn.del:hover { background: #fff1f2; color: var(--expense); }
.p-chev { width: 20px; height: 20px; border-radius: 6px; background: var(--muted); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
.p-chev svg { transition: transform .2s; }
.p-chev.open svg { transform: rotate(90deg); }

/* Add row button */
.add-row-btn {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  width: calc(100% - 32px); margin: 6px 16px 12px; min-height: 30px; border-radius: 8px;
  border: 1.5px dashed #c7d2fe; background: transparent;
  font-size: 11px; font-weight: 600; color: var(--muted-fg); touch-action: manipulation;
}
.add-row-btn:active { background: var(--muted); }
.rec-sub-hdr { font-size: 10px; font-weight: 800; color: var(--muted-fg); text-transform: uppercase; letter-spacing: .08em; padding: 10px 16px 4px; }
.rec-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 99px; white-space: nowrap; }
.rec-badge.paid { background: #d1fae5; color: #065f46; }
.rec-badge.pending { background: #fef9c3; color: #92400e; }
.rec-btn { font-size: 11px; padding: 5px 10px; height: auto; min-width: 62px; white-space: nowrap; }
.rec-amt-input { width: 90px; height: 32px; font-size: 13px; padding: 0 8px; flex-shrink: 0; }
.hist-note { font-size: 10px; color: var(--muted-fg); font-weight: 400; margin-top: 1px; }

/* Inline add form */
.add-form { border-top: 1px solid var(--muted); padding: 14px 16px; }
.add-form-title { font-size: 11px; font-weight: 800; margin-bottom: 12px; color: var(--muted-fg); text-transform: uppercase; letter-spacing: .6px; }

/* Schedule table */
.schedule-wrap { padding: 0 16px 12px; }
.schedule-tbl-wrap { max-height: 200px; overflow-y: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(--muted); border-radius: 8px; }
.schedule-tbl { width: 100%; border-collapse: collapse; font-size: 11px; font-variant-numeric: tabular-nums; }
.schedule-tbl thead th { position: sticky; top: 0; background: var(--muted); padding: 5px 8px; text-align: right; font-weight: 700; white-space: nowrap; color: var(--muted-fg); }
.schedule-tbl thead th:first-child { text-align: left; }
.schedule-tbl tbody td { padding: 5px 8px; text-align: right; border-bottom: 1px solid var(--muted); }
.schedule-tbl tbody td:first-child { text-align: left; color: var(--muted-fg); }
.schedule-tbl tbody tr:last-child td { border-bottom: none; }
.sched-pp-row { background: #f0fdf4; }
.sched-pp-amt { color: #059669; font-weight: 700; font-size: 11px; }
.pp-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--muted); }
.pp-hdr-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.pp-hdr-title { font-size: 11px; font-weight: 700; color: var(--muted-fg); text-transform: uppercase; letter-spacing: .05em; }
.pp-count { background: var(--accent); color: #fff; border-radius: 99px; padding: 1px 6px; font-size: 10px; }
.pp-tbl-wrap { max-height: 200px; overflow-y: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(--muted); border-radius: 8px; margin-bottom: 4px; }
.pp-tbl { width: 100%; border-collapse: collapse; font-size: 11px; font-variant-numeric: tabular-nums; }
.pp-tbl thead th { position: sticky; top: 0; background: var(--muted); padding: 5px 8px; text-align: right; font-weight: 700; white-space: nowrap; color: var(--muted-fg); }
.pp-tbl thead th:first-child { text-align: left; }
.pp-tbl tbody td { padding: 5px 8px; text-align: right; border-bottom: 1px solid var(--muted); }
.pp-tbl tbody td:first-child { text-align: left; color: var(--muted-fg); }
.pp-tbl tbody tr:last-child td { border-bottom: none; }
.pp-tbl-amt { font-weight: 700; color: var(--income); }
.pp-tbl tfoot td { padding: 5px 8px; font-size: 11px; color: var(--muted-fg); background: var(--muted); text-align: right; }
.pp-form { margin-top: 2px; }

/* Preview row */
.preview-row { background: var(--muted); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.preview-cell .plabel { font-size: 9px; color: var(--muted-fg); font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }
.preview-cell .pval { font-size: 12px; font-weight: 800; margin-top: 2px; font-variant-numeric: tabular-nums; }

/* Transaction list */
.tx-list { list-style: none; }
.tx-row { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-top: 1px solid var(--muted); }
.tx-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tx-icon.income { background: rgba(5,150,105,.1); color: var(--income); }
.tx-icon.expense { background: rgba(225,29,72,.08); color: var(--expense); }
.tx-icon svg { width: 16px; height: 16px; stroke-width: 2; }
.tx-body { flex: 1; min-width: 0; }
.tx-cat { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
.tx-badge { font-size: 8px; font-weight: 800; background: var(--muted); border-radius: 3px; padding: 1px 4px; color: var(--muted-fg); letter-spacing: .3px; }
.tx-meta { font-size: 10px; color: var(--muted-fg); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-right { text-align: right; flex-shrink: 0; }
.tx-amount { font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; }
.tx-amount.income { color: var(--income); }
.tx-amount.expense { color: var(--expense); }
.tx-del { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #cbd5e1; flex-shrink: 0; transition: color .15s; }
.tx-del:hover { color: var(--expense); }
.tx-del svg { width: 13px; height: 13px; stroke-width: 1.8; }

/* Category bars */
.cat-wrap { padding: 0 16px 14px; }
.cat-row { margin-bottom: 9px; }
.cat-hdr { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
.cat-name { font-size: 12px; font-weight: 600; }
.cat-amt { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
.cat-pct { font-size: 10px; color: var(--muted-fg); margin-left: 3px; }
.bar-bg { height: 5px; background: var(--muted); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #0284c7, #38bdf8); }

/* Empty state */
.empty { text-align: center; padding: 28px 16px; color: var(--muted-fg); }
.empty svg { width: 36px; height: 36px; margin: 0 auto 8px; display: block; opacity: .3; }
.empty p { font-size: 13px; }

/* Toast */
#toast-wrap {
  position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
  left: 50%; transform: translateX(-50%); z-index: 200;
  display: flex; flex-direction: column; gap: 6px; align-items: center;
}
.toast {
  background: var(--fg); color: #fff; border-radius: 20px; padding: 8px 16px;
  font-size: 12px; font-weight: 600; white-space: nowrap;
  animation: toast-in .2s ease; box-shadow: 0 4px 16px rgba(0,0,0,.2);
}
.toast.out { animation: toast-out .2s ease forwards; }
@keyframes toast-in { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
@keyframes toast-out { from { opacity:1; } to { opacity:0; } }

/* Misc */
.cur-badge { display: inline-block; font-size: 9px; font-weight: 700; background: var(--muted); border-radius: 4px; padding: 1px 5px; }
.cur-section { margin-bottom: 16px; }
.cur-section-label { font-size: 10px; font-weight: 700; color: var(--muted-fg); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
.text-muted { color: var(--muted-fg); }
.text-sm { font-size: 11px; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:10px">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none" style="flex-shrink:0">
      <defs>
        <clipPath id="logoClip">
          <rect x="4" y="4" width="36" height="36" rx="12"/>
        </clipPath>
      </defs>
      <rect x="4" y="4" width="36" height="36" rx="12" fill="#0369a1"/>
      <g clip-path="url(#logoClip)">
        <path d="M4 34 Q11 28 18 34 Q25 40 32 34 Q39 28 46 34 L46 44 L4 44Z" fill="#0284c7"/>
        <path d="M4 26 Q11 20 18 26 Q25 32 32 26 Q39 20 46 26 L46 36 L4 36Z" fill="#0ea5e9"/>
        <path d="M4 18 Q11 12 18 18 Q25 24 32 18 Q39 12 46 18 L46 28 L4 28Z" fill="#38bdf8"/>
      </g>
      <circle cx="22" cy="14" r="7" fill="#fbbf24"/>
      <text x="22" y="18" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="900" fill="#92400e">₹$</text>
    </svg>
    <div>
      <span class="header-title">My Money</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="hbtn" data-action="import-trigger">

<script>
const EXPENSE_CATS = ['Food','Transport','Housing','Bills','Shopping','Health','Entertainment','Other'];
const INCOME_CATS  = ['Salary','Freelance','Investment','Gift','Other'];
const CURRENCIES   = ['USD','INR'];

const S = {
  tab: 'dashboard', transactions: [],
  portfolio: { savings: [], loans: [], goldLoans: [], investments: [] },
  recurring: { items: [], creditCards: [] },
  txType: 'expense', txCurrency: 'USD',
  addingSaving: false, addingLoan: false, addingGoldLoan: false, addingInvestment: false,
  addingRecurringIncome: false, addingBill: false, addingCard: false, addingTx: false,
  editingId: null, editSection: null, expandedLoan: null, expandedGoldLoan: null, showingPPForm: null, expandedMonth: null,
};

function save() {
  try {
    localStorage.setItem('mmc.tx.v1', JSON.stringify(S.transactions));
    localStorage.setItem('mmc.portfolio.v1', JSON.stringify(S.portfolio));
    localStorage.setItem('mmc.recurring.v1', JSON.stringify(S.recurring));
    localStorage.setItem('mmc.lastCurrency.v1', S.txCurrency);
  } catch(e) {}
}

function load() {
  try { const tx = localStorage.getItem('mmc.tx.v1'); if (tx) S.transactions = JSON.parse(tx); } catch(e) { S.transactions = []; }
  try { const p = localStorage.getItem('mmc.portfolio.v1'); if (p) S.portfolio = Object.assign({savings:[],loans:[],goldLoans:[],investments:[]}, JSON.parse(p)); } catch(e) {}
  S.portfolio.loans = S.portfolio.loans.map(l => ({partPayments:[], ...l}));
  try { const r = localStorage.getItem('mmc.recurring.v1'); if (r) S.recurring = JSON.parse(r); } catch(e) {}
  if (!S.recurring) S.recurring = {items:[], creditCards:[]};
  if (!S.recurring.items) S.recurring.items = [];
  if (!S.recurring.creditCards) S.recurring.creditCards = [];
  // also try old keys for migration
  if (!S.transactions.length) { try { const tx = localStorage.getItem('budget.tx.v1'); if (tx) S.transactions = JSON.parse(tx); } catch(e) {} }
  if (!S.portfolio.savings.length && !S.portfolio.loans.length) { try { const p = localStorage.getItem('budget.portfolio.v1'); if (p) S.portfolio = Object.assign({savings:[],loans:[],goldLoans:[],investments:[]}, JSON.parse(p)); } catch(e) {} }
  S.txCurrency = localStorage.getItem('mmc.lastCurrency.v1') || localStorage.getItem('budget.lastCurrency.v1') || 'USD';
}

const uid = () => { try { return crypto.randomUUID(); } catch(e) { return Math.random().toString(36).slice(2)+Date.now().toString(36); } };
const todayISO = () => new Date().toISOString().slice(0,10);
const getCur = t => t.currency || 'USD';

function formatMoney(n, cur='USD') {
  if (isNaN(n)) n = 0;
  return new Intl.NumberFormat(cur==='INR'?'en-IN':'en-US',{style:'currency',currency:cur,maximumFractionDigits:0}).format(n);
}
function fmtDate(iso) { if (!iso) return ''; return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtDateFull(iso) { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function computeEmi(principal, ratePct, years) {
  const n = years * 12; if (!n || !principal) return 0;
  if (!ratePct) return principal / n;
  const r = ratePct / 100 / 12, pow = Math.pow(1+r,n);
  return (principal * r * pow) / (pow - 1);
}
function monthsElapsed(startISO) {
  const start = new Date(startISO), now = new Date();
  let m = (now.getFullYear()-start.getFullYear())*12+(now.getMonth()-start.getMonth());
  if (now.getDate() < start.getDate()) m--;
  return Math.max(0, m);
}
function computeOutstanding(loan) {
  const {principal,startDate,tenureYears,interestRate} = loan;
  if (!startDate||!principal) return principal||0;
  const n = tenureYears*12, elapsed = Math.min(monthsElapsed(startDate),n);
  const emi = computeEmi(principal,interestRate,tenureYears), r = interestRate/100/12;
  const payments = (loan.partPayments||[]).slice().sort((a,b)=>a.date<b.date?-1:1);
  const start = new Date(startDate);
  let bal = principal;
  for (let i=1;i<=elapsed;i++) {
    const mDate = new Date(start); mDate.setMonth(mDate.getMonth()+i);
    const interest = bal*r, princ = Math.min(emi-interest, bal);
    bal = Math.max(0, bal-princ);
    // apply part payments whose date falls within this month
    const mStr = mDate.toISOString().slice(0,7); // "YYYY-MM"
    for (const p of payments) {
      if ((p.date||'').slice(0,7)===mStr) bal = Math.max(0, bal-p.amount);
    }
  }
  return bal;
}
function computeScheduleToDate(loan) {
  const {principal,startDate,tenureYears,interestRate} = loan;
  if (!startDate||!principal) return [];
  const n = tenureYears*12, elapsed = Math.min(monthsElapsed(startDate),n);
  const emi = computeEmi(principal,interestRate,tenureYears), r = interestRate/100/12;
  const payments = (loan.partPayments||[]).slice().sort((a,b)=>a.date<b.date?-1:1);
  const start = new Date(startDate);
  let bal = principal; const rows = [];
  for (let i=1;i<=elapsed;i++) {
    const mDate = new Date(start); mDate.setMonth(mDate.getMonth()+i);
    const interest=bal*r, princ=Math.min(emi-interest,bal);
    bal = Math.max(0,bal-princ);
    const mStr = mDate.toISOString().slice(0,7);
    let partPaid = 0;
    for (const p of payments) {
      if ((p.date||'').slice(0,7)===mStr) { partPaid+=p.amount; bal=Math.max(0,bal-p.amount); }
    }
    rows.push({month:i,date:mDate.toLocaleDateString('en-US',{month:'short',year:'2-digit'}),interest,principal:princ,emi,balance:bal,partPaid:partPaid||0});
  }
  return rows;
}
function computeGoldLoanInterest(loan) {
  const {principal,interestRate,startDate} = loan; if (!principal||!interestRate) return 0;
  const start = startDate ? new Date(startDate) : new Date();
  const days = Math.min(365,Math.max(0,Math.floor((Date.now()-start.getTime())/86400000)));
  return (principal*interestRate*days)/(100*365);
}
function computeGoldSchedule(loan) {
  const {principal,interestRate,startDate} = loan; if (!principal||!interestRate||!startDate) return [];
  const start = new Date(startDate);
  const days = Math.min(365,Math.max(0,Math.floor((Date.now()-start.getTime())/86400000)));
  const dailyRate = (principal*interestRate)/(100*365); const rows = [];
  for (let i=1;i<=days;i++) {
    if (i%30===0||i===days) { const d=new Date(start); d.setDate(d.getDate()+i); rows.push({day:i,date:d.toLocaleDateString('en-US',{month:'short',day:'numeric'}),daily:dailyRate,total:principal+dailyRate*i}); }
  }
  return rows;
}

function toast(msg) {
  const wrap = document.getElementById('toast-wrap'), el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg; wrap.appendChild(el);
  setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),220); },2500);
}

// SVG icons
const svgArrowUp   = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>`;
const svgArrowDown = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="7" y1="7" x2="17" y2="17"/><polyline points="17 7 17 17 7 17"/></svg>`;
const svgTrash     = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6m5 0V4h4v2"/></svg>`;
const svgPlus      = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
const svgChevron   = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>`;
const svgEdit      = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg>`;
const svgBank      = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8L2 7h20l-6-4z"/></svg>`;
const svgHome      = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
const svgGold      = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 3"/></svg>`;
const svgChart     = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M21 7v6h-6"/></svg>`;
const svgCard      = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>`;

function curOptions(sel) { return CURRENCIES.map(c=>`<option value="${c}"${c===sel?' selected':''}>${c}</option>`).join(''); }
function catOptions(type, sel) { return (type==='income'?INCOME_CATS:EXPENSE_CATS).map(c=>`<option value="${c}"${c===sel?' selected':''}>${c}</option>`).join(''); }

// ── Dashboard Overview ─────────────────────────────────────────────────────────
function renderOverview() {
  // Gather all currencies across transactions and portfolio
  const allCurs = new Set();
  for (const t of S.transactions) allCurs.add(getCur(t));
  for (const i of [...S.portfolio.savings,...S.portfolio.loans,...S.portfolio.goldLoans]) allCurs.add(getCur(i));
  if (!allCurs.size) allCurs.add('USD');

  const cards = [...allCurs].map(cur => {
    // Credit: savings balance + transaction net income (if positive)
    const sav = S.portfolio.savings.filter(i=>getCur(i)===cur).reduce((a,i)=>a+i.amount,0);
    let txIncome=0, txExpense=0;
    for (const t of S.transactions) { if (getCur(t)!==cur) continue; if (t.type==='income') txIncome+=t.amount; else txExpense+=t.amount; }
    const txNet = txIncome - txExpense;
    const credit = sav + Math.max(0, txNet);

    // Debt: loans + gold loans outstanding
    const loans = S.portfolio.loans.filter(i=>getCur(i)===cur).reduce((a,i)=>a+computeOutstanding(i),0);
    const gold  = S.portfolio.goldLoans.filter(i=>getCur(i)===cur).reduce((a,i)=>a+i.principal+computeGoldLoanInterest(i),0);
    const debt  = loans + gold;

    const net = credit - debt;
    const netColor = net >= 0 ? 'var(--income)' : 'var(--expense)';

    return `<div class="card ov-card">
      <div class="ov-cur-label">${cur}</div>
      <div class="ov-net" style="color:${netColor}">${formatMoney(net, cur)}</div>
      <div class="ov-divider"></div>
      <div class="ov-row">
        <div class="ov-row-left">
          <span class="ov-dot" style="background:var(--income)"></span>
          <span class="ov-row-label">Credit</span>
        </div>
        <span class="ov-row-val income">${formatMoney(credit, cur)}</span>
      </div>
      <div class="ov-row-detail">
        ${sav>0?`<span class="ov-sub">Savings ${formatMoney(sav,cur)}</span>`:''}
        ${txNet>0?`<span class="ov-sub">Income surplus ${formatMoney(txNet,cur)}</span>`:''}
        ${!sav&&txNet<=0?`<span class="ov-sub muted">No savings or income surplus</span>`:''}
      </div>
      <div class="ov-row" style="margin-top:10px">
        <div class="ov-row-left">
          <span class="ov-dot" style="background:var(--expense)"></span>
          <span class="ov-row-label">Debt</span>
        </div>
        <span class="ov-row-val expense">${formatMoney(debt, cur)}</span>
      </div>
      <div class="ov-row-detail">
        ${loans>0?`<span class="ov-sub">Loans ${formatMoney(loans,cur)}</span>`:''}
        ${gold>0?`<span class="ov-sub" style="color:var(--gold)">Gold ${formatMoney(gold,cur)}</span>`:''}
        ${!debt?`<span class="ov-sub muted">No outstanding debt</span>`:''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('tab-dashboard').innerHTML = cards;
}

// ── Transactions ───────────────────────────────────────────────────────────────
const thisMonth = () => todayISO().slice(0,7);

function fmtMonth(mon) {
  return new Date(mon+'-02').toLocaleDateString('en-US',{month:'long',year:'numeric'});
}

function renderHistory() {
  const months = new Set();
  for (const t of S.transactions) if (t.date) months.add(t.date.slice(0,7));
  for (const item of S.recurring.items) for (const mon of Object.keys(item.months||{})) months.add(mon);
  for (const card of S.recurring.creditCards) for (const mon of Object.keys(card.months||{})) months.add(mon);

  if (!months.size) {
    document.getElementById('tab-history').innerHTML =
      `<div class="card"><div class="sec-hdr"><div><div class="sec-title-row"><span class="sec-dot amber"></span><span class="sec-title">Monthly History</span></div></div></div><div class="empty"><p>No activity yet</p></div></div>`;
    return;
  }

  const sorted = [...months].sort((a,b)=>b.localeCompare(a));
  const monthCards = sorted.map(mon => {
    const monTxs = S.transactions.filter(t=>t.date&&t.date.slice(0,7)===mon);
    const recItems = S.recurring.items.filter(i=>i.months?.[mon]?.paid);
    const recCards = S.recurring.creditCards.filter(c=>c.months?.[mon]?.paid);

    const byCur = {};
    for (const t of monTxs) {
      const c=getCur(t); if(!byCur[c]) byCur[c]={income:0,expense:0};
      if(t.type==='income') byCur[c].income+=t.amount; else byCur[c].expense+=t.amount;
    }
    const primaryCur = Object.keys(byCur)[0]||recItems[0]?.currency||recCards[0]?.currency||'INR';
    const totIncome = Object.values(byCur).reduce((s,v)=>s+v.income,0)
      + recItems.filter(i=>i.type==='income').reduce((s,i)=>s+(i.months[mon]?.amount||i.amount||0),0);
    const totExpense = Object.values(byCur).reduce((s,v)=>s+v.expense,0)
      + recItems.filter(i=>i.type==='expense').reduce((s,i)=>s+(i.months[mon]?.amount||i.amount||0),0)
      + recCards.reduce((s,c)=>s+(c.months[mon]?.amount||0),0);
    const net = totIncome - totExpense;

    const isExpanded = S.expandedMonth===mon;
    let detail = '';
    if (isExpanded) {
      // Transactions table
      let txSection = '';
      if (monTxs.length) {
        const rows = monTxs.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(t=>{
          const c=getCur(t), isInc=t.type==='income';
          return `<tr>
            <td>${fmtDate(t.date)}</td>
            <td>${esc(t.category)}${t.note?`<div class="hist-note">${esc(t.note)}</div>`:''}</td>
            <td><span class="cur-pill${isInc?'':' red'}">${c}</span></td>
            <td class="${isInc?'grn':'red'}">${isInc?'+':'−'}${formatMoney(t.amount,c)}</td>
          </tr>`;
        }).join('');
        txSection = `<div class="rec-sub-hdr">Transactions</div>
          <div class="schedule-tbl-wrap" style="max-height:none">
            <table class="schedule-tbl">
              <thead><tr><th style="text-align:left">Date</th><th style="text-align:left">Details</th><th style="text-align:left">Cur</th><th>Amount</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      }

      // Recurring table
      let recSection = '';
      if (recItems.length) {
        const rows = recItems.map(item=>{
          const c=item.currency||'INR', amt=item.months[mon]?.amount||item.amount||0, isInc=item.type==='income';
          return `<tr>
            <td>${esc(item.name)}</td>
            <td><span class="cur-pill${isInc?'':' red'}">${c}</span></td>
            <td>${isInc?'Income':'Bill'}</td>
            <td class="${isInc?'grn':'red'}">${isInc?'+':'−'}${formatMoney(amt,c)}</td>
          </tr>`;
        }).join('');
        recSection = `<div class="rec-sub-hdr">Recurring</div>
          <div class="schedule-tbl-wrap" style="max-height:none">
            <table class="schedule-tbl">
              <thead><tr><th style="text-align:left">Name</th><th style="text-align:left">Cur</th><th style="text-align:left">Type</th><th>Amount</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      }

      // Credit cards table
      let ccSection = '';
      if (recCards.length) {
        const rows = recCards.map(card=>{
          const c=card.currency||'INR', amt=card.months[mon]?.amount||0;
          return `<tr><td>${esc(card.name)}</td><td><span class="cur-pill red">${c}</span></td><td class="red">−${formatMoney(amt,c)}</td></tr>`;
        }).join('');
        ccSection = `<div class="rec-sub-hdr">Credit Cards</div>
          <div class="schedule-tbl-wrap" style="max-height:none">
            <table class="schedule-tbl">
              <thead><tr><th style="text-align:left">Card</th><th style="text-align:left">Cur</th><th>Bill</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      }

      detail = `<div class="schedule-wrap">${txSection}${recSection}${ccSection}</div>`;
    }

    return `<div class="card">
      <div class="sec-hdr" data-action="toggle-month" data-month="${mon}" style="cursor:pointer;padding-bottom:14px">
        <div>
          <div class="sec-title-row">
            <div class="p-chev${isExpanded?' open':''}" style="margin-right:2px">${svgChevron}</div>
            <span class="sec-title">${fmtMonth(mon)}</span>
          </div>
          <div class="sec-sub" style="margin-top:4px;display:flex;gap:8px;flex-wrap:wrap">
            ${totIncome?`<span style="color:var(--income);font-weight:700;font-size:11px">↑ ${formatMoney(totIncome,primaryCur)}</span>`:''}
            ${totExpense?`<span style="color:var(--expense);font-weight:700;font-size:11px">↓ ${formatMoney(totExpense,primaryCur)}</span>`:''}
            ${(totIncome||totExpense)?`<span style="color:${net>=0?'var(--income)':'var(--expense)'};font-weight:700;font-size:11px">Net ${net>=0?'+':''}${formatMoney(net,primaryCur)}</span>`:''}
          </div>
        </div>
      </div>
      ${detail}
    </div>`;
  }).join('');

  document.getElementById('tab-history').innerHTML = monthCards ||
    `<div class="card"><div class="empty"><p>No activity yet</p></div></div>`;
}

function ordinal(n) { const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }

function renderRecurringSection() {
  const mon = thisMonth();
  const incomeItems = S.recurring.items.filter(i=>i.type==='income');
  const billItems   = S.recurring.items.filter(i=>i.type==='expense');
  const cards       = S.recurring.creditCards;

  // --- Income rows ---
  const incomeRows = incomeItems.map(item => {
    const ms = item.months||{}, paid = ms[mon]?.paid;
    const c = item.currency||'USD';
    return `<div class="p-row">
      <div class="p-row-icon sav">${svgArrowUp.replace('stroke="currentColor"','stroke="#059669"')}</div>

  // --- Bill rows ---
  const billRows = billItems.map(item => {

    const lastAmt = ms[mon]?.amount || item.amount || 0;

      <div class="p-row-icon loan">${svgArrowDown.replace('stroke="currentColor"','stroke="#e11d48"')}</div>

        <div class="p-row-name">${esc(item.name)}<span class="cur-pill red">${c}</span></div>
        <div class="p-row-sub">${item.isVariable?'Variable':'Fixed · '+formatMoney(item.amount,c)}${item.dayOfMonth?' · Due '+ordinal(item.dayOfMonth):''}</div>

      <div class="p-row-right" style="gap:6px">
        ${paid
          ? `<span class="rec-badge paid">✓ Paid</span>`

            ? `<form data-action="mark-variable-bill" data-id="${item.id}" style="display:flex;gap:6px;align-items:center">

               </form>`
            : `<button class="btn btn-accent rec-btn" data-action="mark-bill-paid" data-id="${item.id}">Mark Paid</button>`}
        <button class="ibtn del" data-action="del-recurring-item" data-id="${item.id}" title="Delete">${svgTrash}</button>
      </div>
    </div>`;
  }).join('');

  // --- Card rows ---
  const cardRows = cards.map(card => {
    const ms = card.months||{}, paid = ms[mon]?.paid, billAmt = ms[mon]?.amount||0;
    const c = card.currency||'INR';
    return `<div class="p-row">
      <div class="p-row-icon" style="background:#ede9fe">${svgCard.replace('stroke="currentColor"','stroke="#7c3aed"')}</div>
      <div class="p-row-meta">
        <div class="p-row-name">${esc(card.name)}<span class="cur-pill amb">${c}</span></div>
        <div class="p-row-sub">Due ${ordinal(card.dueDay)} of month</div>
      </div>
      <div class="p-row-right" style="gap:6px">
        ${paid
          ? `<span class="rec-badge paid">✓ Paid · ${formatMoney(billAmt,c)}</span>`
          : `<form data-action="save-card-bill" data-id="${card.id}" style="display:flex;gap:6px;align-items:center">
              <input class="input rec-amt-input" type="number" name="amount" inputmode="decimal" placeholder="Bill amt" value="${billAmt||''}" min="0" step="0.01">
              <button type="submit" class="btn btn-accent rec-btn">Paid</button>
             </form>`}
        <button class="ibtn del" data-action="del-credit-card" data-id="${card.id}" title="Delete">${svgTrash}</button>
      </div>
    </div>`;
  }).join('');

  // --- Add forms ---
  const addIncomeHtml = S.addingRecurringIncome
    ? `<div class="add-form">
        <div class="add-form-title">New Recurring Income</div>
        <form data-action="add-recurring-income">
          <div class="form-row-2">
            <div><label class="form-label">Currency</label><div class="select-wrap"><select class="input" name="currency">${curOptions('INR')}</select></div></div>
            <div><label class="form-label">Amount *</label><input class="input" type="number" name="amount" inputmode="decimal" min="0.01" step="0.01" required></div>
          </div>
          <div class="form-row"><label class="form-label">Name *</label><input class="input" type="text" name="name" placeholder="e.g. Salary" required></div>
          <div class="form-row-2">
            <div><label class="form-label">Category</label><div class="select-wrap"><select class="input" name="category">${INCOME_CATS.map(c=>`<option>${c}</option>`).join('')}</select></div></div>
            <div><label class="form-label">Day of month</label><input class="input" type="number" name="dayOfMonth" min="1" max="31" placeholder="1"></div>
          </div>
          <div class="add-form-btns"><button type="button" class="btn btn-outline" data-action="cancel-recurring-income">Cancel</button><button type="submit" class="btn btn-accent">Add</button></div>
        </form>
      </div>`
    : `<button class="add-row-btn" data-action="toggle-add-recurring-income">${svgPlus} Add recurring income</button>`;

  const addBillHtml = S.addingBill
    ? `<div class="add-form">
        <div class="add-form-title">New Monthly Bill</div>
        <form data-action="add-bill">
          <div class="form-row-2">
            <div><label class="form-label">Currency</label><div class="select-wrap"><select class="input" name="currency">${curOptions('INR')}</select></div></div>
            <div><label class="form-label">Amount</label><input class="input" type="number" name="amount" inputmode="decimal" min="0" step="0.01" placeholder="0 if variable"></div>
          </div>
          <div class="form-row"><label class="form-label">Name *</label><input class="input" type="text" name="name" placeholder="e.g. Electricity" required></div>
          <div class="form-row-2">
            <div><label class="form-label">Type</label><div class="select-wrap"><select class="input" name="isVariable"><option value="0">Fixed</option><option value="1">Variable</option></select></div></div>
            <div><label class="form-label">Due day</label><input class="input" type="number" name="dayOfMonth" min="1" max="31" placeholder="1"></div>
          </div>
          <div class="add-form-btns"><button type="button" class="btn btn-outline" data-action="cancel-bill">Cancel</button><button type="submit" class="btn btn-accent">Add</button></div>
        </form>
      </div>`
    : `<button class="add-row-btn" data-action="toggle-add-bill">${svgPlus} Add monthly bill</button>`;

  const addCardHtml = S.addingCard
    ? `<div class="add-form">
        <div class="add-form-title">New Credit Card</div>
        <form data-action="add-credit-card">
          <div class="form-row"><label class="form-label">Card name *</label><input class="input" type="text" name="name" placeholder="e.g. HDFC Regalia" required></div>
          <div class="form-row-2">
            <div><label class="form-label">Currency</label><div class="select-wrap"><select class="input" name="currency">${curOptions('INR')}</select></div></div>
            <div><label class="form-label">Due day *</label><input class="input" type="number" name="dueDay" min="1" max="31" placeholder="5" required></div>
          </div>
          <div class="add-form-btns"><button type="button" class="btn btn-outline" data-action="cancel-card">Cancel</button><button type="submit" class="btn btn-accent">Add</button></div>
        </form>
      </div>`
    : `<button class="add-row-btn" data-action="toggle-add-card">${svgPlus} Add credit card</button>`;

  const hasAny = incomeItems.length || billItems.length || cards.length;
  return `<div class="card">
    <div class="sec-hdr">
      <div><div class="sec-title-row"><span class="sec-dot amber"></span><span class="sec-title">Recurring & Bills</span></div><div class="sec-sub">Auto-tracks monthly salary, bills & cards</div></div>
    </div>
    ${incomeItems.length ? `<div class="rec-sub-hdr">Income</div>${incomeRows}` : ''}
    ${addIncomeHtml}
    ${billItems.length ? `<div class="rec-sub-hdr">Monthly Bills</div>${billRows}` : ''}
    ${addBillHtml}
    ${cards.length ? `<div class="rec-sub-hdr">Credit Cards</div>${cardRows}` : ''}
    ${addCardHtml}
  </div>`;
}

function renderDashboard() {
  document.getElementById('tab-transactions').innerHTML =
    renderHeroCards() + renderCatBreakdown() + renderRecurringSection() + renderActivity();
}

function renderHeroCards() {
  const byCur = {};
  for (const t of S.transactions) {
    const c = getCur(t); if (!byCur[c]) byCur[c] = {income:0,expense:0};
    if (t.type==='income') byCur[c].income+=t.amount; else byCur[c].expense+=t.amount;
  }
  if (!Object.keys(byCur).length) byCur['USD'] = {income:0,expense:0};
  return Object.entries(byCur).map(([cur,{income,expense}]) => `
  <div class="card-hero">
    <div class="eyebrow">${cur} Balance</div>
    <div class="amount">${formatMoney(income-expense,cur)}</div>
    <div class="chips">
      <div class="chip"><div class="chip-lbl">Income</div><div class="chip-val inc">${formatMoney(income,cur)}</div></div>
      <div class="chip"><div class="chip-lbl">Expenses</div><div class="chip-val exp">${formatMoney(expense,cur)}</div></div>
    </div>
  </div>`).join('');
}

function renderCatBreakdown() {
  const byCur = {};
  for (const t of S.transactions) {
    if (t.type!=='expense') continue;
    const c = getCur(t); if (!byCur[c]) byCur[c] = {};
    byCur[c][t.category] = (byCur[c][t.category]||0)+t.amount;
  }
  const curs = Object.keys(byCur);
  if (!curs.length) return `<div class="card"><div class="sec-hdr-pad" style="padding-bottom:14px"><div style="font-size:14px;font-weight:800">By Category</div></div><div class="empty" style="padding-top:8px"><p>No expenses yet</p></div></div>`;
  const sections = curs.map(cur => {
    const cats = byCur[cur], total = Object.values(cats).reduce((a,b)=>a+b,0);
    return `${curs.length>1?`<div class="cur-section-label" style="padding:0 16px 4px">${cur}</div>`:''}
    ${Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>`
      <div class="cat-row">
        <div class="cat-hdr"><span class="cat-name">${esc(cat)}</span><span><span class="cat-amt">${formatMoney(amt,cur)}</span><span class="cat-pct">${Math.round(amt/total*100)}%</span></span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(amt/total*100)}%"></div></div>
      </div>`).join('')}`;
  }).join('');
  return `<div class="card"><div class="sec-hdr-pad" style="padding-bottom:10px"><div style="font-size:14px;font-weight:800">By Category</div></div><div class="cat-wrap">${sections}</div></div>`;
}

function renderActivity() {
  const cats = S.txType==='income' ? INCOME_CATS : EXPENSE_CATS;
  const addForm = S.addingTx ? `<div class="add-form" style="margin:0 0 4px">
    <div class="add-form-title">Add Transaction</div>
    <div class="toggle-pill" style="margin-bottom:10px">
      <button class="${S.txType==='expense'?'active expense':''}" data-action="set-tx-type" data-type="expense">Expense</button>
      <button class="${S.txType==='income'?'active income':''}" data-action="set-tx-type" data-type="income">Income</button>
    </div>
    <form data-action="add-tx">
      <div class="form-row-2">
        <div><label class="form-label">Currency</label><div class="select-wrap"><select class="input" name="currency">${curOptions(S.txCurrency)}</select></div></div>
        <div><label class="form-label">Amount</label><input class="input" type="number" name="amount" inputmode="decimal" min="0.01" step="0.01" placeholder="0.00" required></div>
      </div>
      <div class="form-row"><label class="form-label">Category</label><div class="select-wrap"><select class="input" name="category">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div></div>
      <div class="form-row"><label class="form-label">Note <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label><input class="input" type="text" name="note" placeholder="e.g. Lunch with team" maxlength="120"></div>
      <div class="add-form-btns"><button type="button" class="btn btn-outline" data-action="cancel-tx">Cancel</button><button type="submit" class="btn btn-accent">${svgPlus} Add ${S.txType==='income'?'Income':'Expense'}</button></div>
    </form>
  </div>` : '';

  const hdr = `<div class="sec-hdr-pad">
    <div style="font-size:14px;font-weight:800">Recent Activity</div>
    <div style="display:flex;align-items:center;gap:8px">
      ${S.transactions.length?`<span class="text-muted text-sm">${S.transactions.length} total</span>`:''}
      <button class="add-row-btn" style="width:auto;margin:0;min-height:26px;padding:0 10px" data-action="toggle-add-tx">${S.addingTx?'Cancel':svgPlus+' Add'}</button>
    </div>
  </div>`;

  if (!S.transactions.length && !S.addingTx) return `<div class="card">${hdr}<div class="empty"><p>Nothing here yet</p></div></div>`;

  const sorted = [...S.transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,12);
  const rows = sorted.map(t => {
    const isIncome = t.type==='income';
    return `<li class="tx-row">
      <div class="tx-icon ${t.type}">${isIncome?svgArrowUp:svgArrowDown}</div>
      <div class="tx-body"><div class="tx-cat">${esc(t.category)}<span class="tx-badge">${getCur(t)}</span></div><div class="tx-meta">${t.note?esc(t.note):fmtDate(t.date)}</div></div>
      <div class="tx-right"><div class="tx-amount ${t.type}">${isIncome?'+':'−'}${formatMoney(t.amount,getCur(t))}</div></div>
      <button class="tx-del" data-action="del-tx" data-id="${t.id}" title="Delete">${svgTrash}</button>
    </li>`;
  }).join('');
  return `<div class="card">${hdr}${addForm}<ul class="tx-list">${rows}</ul></div>`;
}

// ── Portfolio ──────────────────────────────────────────────────────────────────
function renderPortfolio() {
  document.getElementById('tab-portfolio').innerHTML =
    renderPortfolioSummary() + renderSavings() + renderLoans() + renderGoldLoans();
}

function getPortfolioCurrencies() {
  const curs = new Set();
  for (const i of [...S.portfolio.savings,...S.portfolio.loans,...S.portfolio.goldLoans]) curs.add(getCur(i));
  if (!curs.size) curs.add('USD');
  return [...curs];
}

function renderPortfolioSummary() {
  if (!S.portfolio.savings.length && !S.portfolio.loans.length && !S.portfolio.goldLoans.length) return '';
  return getPortfolioCurrencies().map(cur => {
    const sav = S.portfolio.savings.filter(i=>getCur(i)===cur).reduce((a,i)=>a+i.amount,0);
    const loans = S.portfolio.loans.filter(i=>getCur(i)===cur).reduce((a,i)=>a+computeOutstanding(i),0);
    const gold = S.portfolio.goldLoans.filter(i=>getCur(i)===cur).reduce((a,i)=>a+i.principal+computeGoldLoanInterest(i),0);
    return `<div class="cards-row">
      <div class="stat-card"><div class="sc-label"><span class="sc-dot" style="background:#10b981;display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle"></span>Savings · ${cur}</div><div class="sc-amount income">${formatMoney(sav,cur)}</div></div>
      <div class="stat-card"><div class="sc-label"><span class="sc-dot" style="background:#f43f5e;display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle"></span>Loans · ${cur}</div><div class="sc-amount expense">${formatMoney(loans+gold,cur)}</div></div>
    </div>`;
  }).join('');
}

function renderSavings() {
  const items = S.portfolio.savings;
  const totals = {};
  for (const i of items) { const c=getCur(i); totals[c]=(totals[c]||0)+(i.amount||0); }
  const rows = items.map(item => {

    if (S.editingId===item.id && S.editSection==='saving') return `<div class="add-form">${savingForm(item)}</div>`;
    return `<div class="p-row">
      <div class="p-row-icon sav">${svgBank.replace('stroke="currentColor"','stroke="#0284c7"')}</div>
      <div class="p-row-meta"><div class="p-row-name">${esc(item.name)}<span class="cur-pill">${c}</span></div><div class="p-row-sub">${item.institution?'Institution: '+esc(item.institution):''}${item.interestRate?' · '+item.interestRate+'% p.a.':''}</div></div>
      <div class="p-row-right">
        <div><div class="p-row-amt-lbl">Balance</div><div class="p-row-amt grn">${formatMoney(item.amount,c)}</div></div>
        <div class="p-row-btns">
          <button class="ibtn" title="Edit" data-action="edit-saving" data-id="${item.id}">${svgEdit}</button>
          <button class="ibtn del" title="Delete" data-action="del-saving" data-id="${item.id}">${svgTrash}</button>
        </div>
      </div>
    </div>`;
  }).join('');
  const addHtml = S.addingSaving ? `<div class="add-form">${savingForm(null)}</div>` : `<button class="add-row-btn" data-action="toggle-add-saving">${svgPlus} Add entry</button>`;
  return `<div class="card">
    <div class="sec-hdr">
      <div><div class="sec-title-row"><span class="sec-dot green"></span><span class="sec-title">Savings</span></div><div class="sec-sub">Bank accounts, deposits, cash</div></div>
      ${items.length?`<div class="sec-totals"><div class="sec-total-lbl">Total Balance</div>${Object.entries(totals).map(([c,v])=>`<div class="sec-total-amt grn">${formatMoney(v,c)}</div>`).join('')}</div>`:''}
    </div>
    ${rows}${addHtml}</div>`;
}

function renderLoans() {

    if (S.editingId===loan.id && S.editSection==='loan') return `<div class="add-form">${loanForm(loan)}</div>`;

    const isExpanded = S.expandedLoan===loan.id;
    const schedule = isExpanded ? computeScheduleToDate(loan) : [];

    const partHtml = `<div class="pp-section">

    </div>`;
    const schedHtml = isExpanded ? `<div class="schedule-wrap">
      <div class="text-sm text-muted" style="margin-bottom:6px">${schedule.length} months amortised · Interest: ${formatMoney(schedule.reduce((a,r)=>a+r.interest,0),c)}</div>
      ${schedule.length?(()=>{const hasPP=schedule.some(r=>r.partPaid>0);return`<div class="schedule-tbl-wrap"><table class="schedule-tbl"><thead><tr><th>Month</th><th>Interest</th><th>Principal</th>${hasPP?'<th>Part Paid</th>':''}<th>Balance</th></tr></thead><tbody>${schedule.map(r=>`<tr${r.partPaid>0?' class="sched-pp-row"':''}><td>${r.date}</td><td>${formatMoney(r.interest,c)}</td><td>${formatMoney(r.principal,c)}</td>${hasPP?`<td>${r.partPaid>0?'<span class="sched-pp-amt">−'+formatMoney(r.partPaid,c)+'</span>':''}</td>`:''}<td>${formatMoney(r.balance,c)}</td></tr>`).join('')}</tbody></table></div>`;})():'<p class="text-sm text-muted">No payments yet</p>'}
      ${partHtml}
    </div>` : '';
    const curPillClass = c==='USD'?'':''; // default blue pill for all
    return `<div>
      <div class="p-row" data-action="toggle-loan" data-id="${loan.id}" style="cursor:pointer">
        <div class="p-chev${isExpanded?' open':''}">${svgChevron}</div>
        <div class="p-row-icon loan">${svgHome.replace('stroke="currentColor"','stroke="#e11d48"')}</div>
        <div class="p-row-meta"><div class="p-row-name">${esc(loan.name)}<span class="cur-pill red">${c}</span></div><div class="p-row-sub">${loan.lender?esc(loan.lender)+' · ':''}${formatMoney(loan.principal,c)} · ${loan.tenureYears}yr · ${loan.interestRate}% · EMI ${formatMoney(emi,c)}</div></div>
        <div class="p-row-right">
          <div><div class="p-row-amt-lbl">Outstanding</div><div class="p-row-amt red">${formatMoney(outstanding,c)}</div></div>
          <div class="p-row-btns">
            <button class="ibtn" title="Edit" data-action="edit-loan" data-id="${loan.id}">${svgEdit}</button>
            <button class="ibtn del" title="Delete" data-action="del-loan" data-id="${loan.id}">${svgTrash}</button>
          </div>
        </div>
      </div>
      ${schedHtml}
    </div>`;
  }).join('');
  const addHtml = S.addingLoan ? `<div class="add-form">${loanForm(null)}</div>` : `<button class="add-row-btn" data-action="toggle-add-loan">${svgPlus} Add loan</button>`;
  return `<div class="card">
    <div class="sec-hdr">
      <div><div class="sec-title-row"><span class="sec-dot red"></span><span class="sec-title">Loans</span></div><div class="sec-sub">EMI-based amortising loans</div></div>
      ${Object.keys(totals).length?`<div class="sec-totals"><div class="sec-total-lbl">Outstanding Today</div>${Object.entries(totals).map(([c,v])=>`<div class="sec-total-amt red">${formatMoney(v,c)}</div>`).join('')}</div>`:''}
    </div>
    ${rows}${addHtml}</div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function formData(form) { const o={}; for (const [k,v] of new FormData(form).entries()) o[k]=v; return o; }

function handleSubmit(e) {
  const form = e.target, action = form.dataset.action;
  if (!action) return; e.preventDefault();
  const d = formData(form);

  if (action==='add-tx') {
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    S.transactions.unshift({id:uid(),type:S.txType,amount,category:d.category,note:d.note||undefined,date:new Date().toISOString(),currency:d.currency});
    S.addingTx=false; save(); renderOverview(); renderDashboard(); toast('Transaction added'); return;
  }
  if (action==='add-recurring-income') {
    if (!d.name.trim()) return toast('Name is required');
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    S.recurring.items.push({id:uid(),name:d.name.trim(),type:'income',category:d.category||'Salary',amount,currency:d.currency,dayOfMonth:d.dayOfMonth?parseInt(d.dayOfMonth):undefined,months:{},createdAt:todayISO()});
    S.addingRecurringIncome=false; save(); renderDashboard(); toast('Recurring income added'); return;
  }
  if (action==='add-bill') {
    if (!d.name.trim()) return toast('Name is required');
    const isVariable = d.isVariable==='1';
    const amount = isVariable ? 0 : (parseFloat(d.amount)||0);
    S.recurring.items.push({id:uid(),name:d.name.trim(),type:'expense',isVariable,amount,currency:d.currency,dayOfMonth:d.dayOfMonth?parseInt(d.dayOfMonth):undefined,months:{},createdAt:todayISO()});
    S.addingBill=false; save(); renderDashboard(); toast('Bill added'); return;
  }
  if (action==='add-credit-card') {
    if (!d.name.trim()) return toast('Card name is required');
    const dueDay = parseInt(d.dueDay); if (!dueDay||dueDay<1||dueDay>31) return toast('Enter a valid due day');
    S.recurring.creditCards.push({id:uid(),name:d.name.trim(),currency:d.currency,dueDay,months:{},createdAt:todayISO()});
    S.addingCard=false; save(); renderDashboard(); toast('Card added'); return;
  }
  if (action==='save-card-bill') {
    const card = S.recurring.creditCards.find(c=>c.id===form.dataset.id); if (!card) return;
    const mon = thisMonth(); if (!card.months) card.months = {};
    const amount = parseFloat(d.amount)||0;
    card.months[mon] = {...(card.months[mon]||{}), amount};
    const txId = uid();
    S.transactions.unshift({id:txId,type:'expense',amount,category:'Bills',note:card.name+' CC Bill',date:new Date().toISOString(),currency:card.currency||'INR'});
    card.months[mon].paid = true; card.months[mon].txId = txId;
    save(); renderOverview(); renderDashboard(); toast(card.name+' bill recorded'); return;
  }
  if (action==='mark-variable-bill') {
    const item = S.recurring.items.find(i=>i.id===form.dataset.id); if (!item) return;
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    const mon = thisMonth(); if (!item.months) item.months = {};
    const txId = uid();
    S.transactions.unshift({id:txId,type:'expense',amount,category:'Bills',note:item.name,date:new Date().toISOString(),currency:item.currency||'INR'});
    item.months[mon] = {paid:true, amount, txId};
    save(); renderOverview(); renderDashboard(); toast(item.name+' marked paid'); return;
  }
  if (action==='add-saving') {
    if (!d.name.trim()) return toast('Name is required');
    const amount = parseFloat(d.amount); if (!amount||amount<0) return toast('Enter a valid amount');
    S.portfolio.savings.unshift({id:uid(),name:d.name.trim(),institution:d.institution||undefined,amount,interestRate:d.interestRate?parseFloat(d.interestRate):undefined,note:d.note||undefined,currency:d.currency,createdAt:todayISO()});
    S.addingSaving=false; save(); renderPortfolio(); toast('Saving added'); return;
  }
  if (action==='update-saving') {
    const amount = parseFloat(d.amount);
    S.portfolio.savings = S.portfolio.savings.map(i=>i.id===form.dataset.id?{...i,name:d.name.trim(),institution:d.institution||undefined,amount,interestRate:d.interestRate?parseFloat(d.interestRate):undefined,note:d.note||undefined,currency:d.currency}:i);
    S.editingId=null; S.editSection=null; save(); renderPortfolio(); toast('Saving updated'); return;
  }
  if (action==='add-investment') {
    if (!d.name.trim()) return toast('Name is required');
    const amountInvested = parseFloat(d.amountInvested); const currentValue = parseFloat(d.currentValue);
    if (!(amountInvested>=0) || !(currentValue>=0)) return toast('Enter valid amounts');
    S.portfolio.investments.unshift({id:uid(),name:d.name.trim(),type:d.type||undefined,amountInvested,currentValue,note:d.note||undefined,currency:d.currency,createdAt:todayISO()});
    S.addingInvestment=false; save(); renderInvestments(); toast('Investment added'); return;
  }
  if (action==='update-investment') {
    const amountInvested = parseFloat(d.amountInvested); const currentValue = parseFloat(d.currentValue);
    S.portfolio.investments = S.portfolio.investments.map(i=>i.id===form.dataset.id?{...i,name:d.name.trim(),type:d.type||undefined,amountInvested,currentValue,note:d.note||undefined,currency:d.currency}:i);
    S.editingId=null; S.editSection=null; save(); renderInvestments(); toast('Investment updated'); return;
  }
  if (action==='add-loan') {
    if (!d.name.trim()) return toast('Name is required');
    S.portfolio.loans.unshift({id:uid(),name:d.name.trim(),lender:d.lender||undefined,principal:parseFloat(d.principal),startDate:d.startDate,tenureYears:parseFloat(d.tenureYears),interestRate:parseFloat(d.interestRate),note:d.note||undefined,currency:d.currency,partPayments:[],createdAt:todayISO()});
    S.addingLoan=false; save(); renderPortfolio(); toast('Loan added'); return;
  }
  if (action==='update-loan') {
    S.portfolio.loans = S.portfolio.loans.map(i=>i.id===form.dataset.id?{...i,name:d.name.trim(),lender:d.lender||undefined,principal:parseFloat(d.principal),startDate:d.startDate,tenureYears:parseFloat(d.tenureYears),interestRate:parseFloat(d.interestRate),note:d.note||undefined,currency:d.currency}:i);
    S.editingId=null; S.editSection=null; save(); renderPortfolio(); toast('Loan updated'); return;
  }
  if (action==='add-part-payment') {
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    const loan = S.portfolio.loans.find(l=>l.id===form.dataset.id);
    if (!loan) return;
    if (!loan.partPayments) loan.partPayments = [];
    loan.partPayments.unshift({id:uid(), date:d.date||todayISO(), amount, note:d.note||undefined});
    S.showingPPForm=null; save(); renderPortfolio(); toast('Part payment recorded'); return;
  }
  if (action==='add-gold') {
    if (!d.name.trim()) return toast('Name is required');
    S.portfolio.goldLoans.unshift({id:uid(),name:d.name.trim(),lender:d.lender||undefined,principal:parseFloat(d.principal),interestRate:parseFloat(d.interestRate),startDate:d.startDate||undefined,note:d.note||undefined,currency:d.currency,createdAt:todayISO()});
    S.addingGoldLoan=false; save(); renderPortfolio(); toast('Gold loan added'); return;
  }
  if (action==='update-gold') {
    S.portfolio.goldLoans = S.portfolio.goldLoans.map(i=>i.id===form.dataset.id?{...i,name:d.name.trim(),lender:d.lender||undefined,principal:parseFloat(d.principal),interestRate:parseFloat(d.interestRate),startDate:d.startDate||undefined,note:d.note||undefined,currency:d.currency}:i);
    S.editingId=null; S.editSection=null; save(); renderPortfolio(); toast('Gold loan updated'); return;
  }
}

function handleClick(e) {
  const btn = e.target.closest('[data-action]'); if (!btn) return;
  const action = btn.dataset.action;

  if (action==='switch-tab') {
    S.tab = btn.dataset.tab;
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('tab-'+S.tab).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===S.tab));
    if (S.tab==='dashboard') renderOverview();
    else if (S.tab==='transactions') renderDashboard();
    else if (S.tab==='portfolio') renderPortfolio();
    else if (S.tab==='investments') renderInvestments();
    else if (S.tab==='history') renderHistory();
    return;
  }
  if (action==='set-tx-type') { S.txType=btn.dataset.type; renderDashboard(); return; }
  if (action==='toggle-add-tx') { S.addingTx=!S.addingTx; renderDashboard(); return; }
  if (action==='cancel-tx') { S.addingTx=false; renderDashboard(); return; }
  // Recurring income
  if (action==='toggle-add-recurring-income') { S.addingRecurringIncome=!S.addingRecurringIncome; renderDashboard(); return; }
  if (action==='cancel-recurring-income') { S.addingRecurringIncome=false; renderDashboard(); return; }
  if (action==='confirm-recurring') {
    const item = S.recurring.items.find(i=>i.id===btn.dataset.id); if (!item) return;
    const mon = thisMonth();
    if (!item.months) item.months = {};
    const txId = uid();
    S.transactions.unshift({id:txId,type:'income',amount:item.amount,category:item.category||'Salary',note:item.name,date:new Date().toISOString(),currency:item.currency||'USD'});
    item.months[mon] = {paid:true, amount:item.amount, txId};
    save(); renderOverview(); renderDashboard(); toast(item.name+' credited'); return;
  }
  if (action==='del-recurring-item') {
    if (!confirm('Remove this recurring entry?')) return;
    S.recurring.items = S.recurring.items.filter(i=>i.id!==btn.dataset.id); save(); renderDashboard(); return;
  }
  // Bills
  if (action==='toggle-add-bill') { S.addingBill=!S.addingBill; renderDashboard(); return; }
  if (action==='cancel-bill') { S.addingBill=false; renderDashboard(); return; }
  if (action==='mark-bill-paid') {
    const item = S.recurring.items.find(i=>i.id===btn.dataset.id); if (!item) return;
    const mon = thisMonth();
    if (!item.months) item.months = {};
    const txId = uid();
    S.transactions.unshift({id:txId,type:'expense',amount:item.amount,category:'Bills',note:item.name,date:new Date().toISOString(),currency:item.currency||'INR'});
    item.months[mon] = {paid:true, amount:item.amount, txId};
    save(); renderOverview(); renderDashboard(); toast(item.name+' marked paid'); return;
  }
  // Credit cards
  if (action==='toggle-add-card') { S.addingCard=!S.addingCard; renderDashboard(); return; }
  if (action==='cancel-card') { S.addingCard=false; renderDashboard(); return; }
  if (action==='mark-card-paid') {
    const card = S.recurring.creditCards.find(c=>c.id===btn.dataset.id); if (!card) return;
    const mon = thisMonth();
    if (!card.months) card.months = {};
    const amt = card.months[mon]?.amount||0;
    const txId = uid();
    if (amt>0) S.transactions.unshift({id:txId,type:'expense',amount:amt,category:'Bills',note:card.name+' CC Bill',date:new Date().toISOString(),currency:card.currency||'INR'});
    card.months[mon] = {...(card.months[mon]||{}), paid:true, txId};
    save(); renderOverview(); renderDashboard(); toast(card.name+' bill marked paid'); return;
  }
  if (action==='del-credit-card') {
    if (!confirm('Remove this card?')) return;
    S.recurring.creditCards = S.recurring.creditCards.filter(c=>c.id!==btn.dataset.id); save(); renderDashboard(); return;
  }
  if (action==='del-tx') {
    if (!confirm('Delete this transaction?')) return;
    S.transactions=S.transactions.filter(t=>t.id!==btn.dataset.id); save(); renderOverview(); renderDashboard(); return;
  }
  if (action==='toggle-add-investment') { S.addingInvestment=!S.addingInvestment; S.editingId=null; renderInvestments(); return; }
  if (action==='cancel-investment') { S.addingInvestment=false; S.editingId=null; S.editSection=null; renderInvestments(); return; }
  if (action==='edit-investment') { S.editingId=btn.dataset.id; S.editSection='investment'; S.addingInvestment=false; renderInvestments(); return; }
  if (action==='del-investment') {
    if (!confirm('Delete this investment?')) return;
    S.portfolio.investments=S.portfolio.investments.filter(i=>i.id!==btn.dataset.id); save(); renderInvestments(); return;
  }
  if (action==='toggle-add-saving') { S.addingSaving=!S.addingSaving; S.editingId=null; renderPortfolio(); return; }
  if (action==='cancel-saving') { S.addingSaving=false; S.editingId=null; S.editSection=null; renderPortfolio(); return; }
  if (action==='edit-saving') { S.editingId=btn.dataset.id; S.editSection='saving'; S.addingSaving=false; renderPortfolio(); return; }
  if (action==='del-saving') {
    if (!confirm('Delete this saving?')) return;
    S.portfolio.savings=S.portfolio.savings.filter(i=>i.id!==btn.dataset.id); save(); renderPortfolio(); return;
  }
  if (action==='toggle-add-loan') { S.addingLoan=!S.addingLoan; S.editingId=null; renderPortfolio(); return; }
  if (action==='cancel-loan') { S.addingLoan=false; S.editingId=null; S.editSection=null; renderPortfolio(); return; }
  if (action==='edit-loan') { S.editingId=btn.dataset.id; S.editSection='loan'; S.addingLoan=false; renderPortfolio(); return; }
  if (action==='del-loan') {
    if (!confirm('Delete this loan?')) return;
    S.portfolio.loans=S.portfolio.loans.filter(i=>i.id!==btn.dataset.id); save(); renderPortfolio(); return;
  }
  if (action==='toggle-loan') { S.expandedLoan=S.expandedLoan===btn.dataset.id?null:btn.dataset.id; S.showingPPForm=null; renderPortfolio(); return; }
  if (action==='toggle-pp-form') { S.showingPPForm=S.showingPPForm===btn.dataset.id?null:btn.dataset.id; renderPortfolio(); return; }
  if (action==='toggle-month') { S.expandedMonth=S.expandedMonth===btn.dataset.month?null:btn.dataset.month; renderHistory(); return; }
  if (action==='del-part-payment') {
    const loan = S.portfolio.loans.find(l=>l.id===btn.dataset.loanId);
    if (loan) { loan.partPayments=(loan.partPayments||[]).filter(p=>p.id!==btn.dataset.paymentId); save(); renderPortfolio(); }
    return;
  }
  if (action==='toggle-add-gold') { S.addingGoldLoan=!S.addingGoldLoan; S.editingId=null; renderPortfolio(); return; }
  if (action==='cancel-gold') { S.addingGoldLoan=false; S.editingId=null; S.editSection=null; renderPortfolio(); return; }
  if (action==='edit-gold') { S.editingId=btn.dataset.id; S.editSection='goldLoan'; S.addingGoldLoan=false; renderPortfolio(); return; }
  if (action==='del-gold') {
    if (!confirm('Delete this gold loan?')) return;
    S.portfolio.goldLoans=S.portfolio.goldLoans.filter(i=>i.id!==btn.dataset.id); save(); renderPortfolio(); return;
  }
  if (action==='toggle-gold') { S.expandedGoldLoan=S.expandedGoldLoan===btn.dataset.id?null:btn.dataset.id; renderPortfolio(); return; }
  if (action==='export') { exportJSON(); return; }
  if (action==='import-trigger') { document.getElementById('file-input').click(); return; }
}

function handleInput(e) {
  const inp = e.target;
  if (inp.hasAttribute('data-loan-preview')) {
    const form = inp.closest('form'); if (!form) return;
    const p=parseFloat(form.querySelector('[name=principal]')?.value)||0;
    const r=parseFloat(form.querySelector('[name=interestRate]')?.value)||0;
    const y=parseFloat(form.querySelector('[name=tenureYears]')?.value)||0;
    const emi=computeEmi(p,r,y), totalInt=emi*y*12-p;
    const c=form.querySelector('[name=currency]')?.value||'USD';
    const ep=document.getElementById('prev-emi'), ei=document.getElementById('prev-int'), et=document.getElementById('prev-total');
    if (ep) ep.textContent=emi?formatMoney(emi,c):'—';
    if (ei) ei.textContent=totalInt>0?formatMoney(totalInt,c):'—';
    if (et) et.textContent=(emi&&p)?formatMoney(emi*y*12,c):'—';
  }
  if (inp.hasAttribute('data-gold-preview')) {
    const form = inp.closest('form'); if (!form) return;
    const p=parseFloat(form.querySelector('[name=principal]')?.value)||0;
    const r=parseFloat(form.querySelector('[name=interestRate]')?.value)||0;
    const c=form.querySelector('[name=currency]')?.value||'USD';
    const annualInt=(p*r)/100;
    const gp=document.getElementById('gprev-p'), gi=document.getElementById('gprev-i'), gt=document.getElementById('gprev-t');
    if (gp) gp.textContent=p?formatMoney(p,c):'—';
    if (gi) gi.textContent=annualInt?formatMoney(annualInt,c):'—';
    if (gt) gt.textContent=(p&&annualInt)?formatMoney(p+annualInt,c):'—';
  }
  if (inp.name==='currency' && inp.closest('[data-action="add-tx"]')) {
    S.txCurrency=inp.value; localStorage.setItem('mmc.lastCurrency.v1',inp.value);
  }
}

function exportJSON() {
  const payload = JSON.stringify({version:2,transactions:S.transactions,portfolio:S.portfolio},null,2);
  const blob = new Blob([payload],{type:'application/json'}), url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='my-money.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000); toast('Exported my-money.json');
}

document.getElementById('file-input').addEventListener('change', async function(e) {
  const file = e.target.files[0]; if (!file) return;
  try {
    const data = JSON.parse(await file.text());
    let transactions, portfolio;
    if (Array.isArray(data)) { transactions=data; portfolio={savings:[],loans:[],goldLoans:[]}; }
    else { transactions=data.transactions||[]; portfolio=Object.assign({savings:[],loans:[],goldLoans:[]},data.portfolio||{}); }
    S.transactions=transactions; S.portfolio=portfolio;
    save(); renderOverview(); renderDashboard(); renderPortfolio(); renderInvestments(); renderHistory(); toast(`Imported ${transactions.length} transactions`);
  } catch(err) { toast('Import failed — invalid JSON'); }
  this.value='';
});

document.addEventListener('submit', handleSubmit);
document.addEventListener('click', handleClick);
document.addEventListener('input', handleInput);

load(); renderOverview(); renderDashboard(); renderPortfolio(); renderInvestments(); renderHistory();
</script>
<script>
(function(){
  const c = document.createElement('canvas');
  c.width = c.height = 180;
  const ctx = c.getContext('2d');
  const r = 38;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(180-r,0); ctx.quadraticCurveTo(180,0,180,r);
  ctx.lineTo(180,180-r); ctx.quadraticCurveTo(180,180,180-r,180);
  ctx.lineTo(r,180); ctx.quadraticCurveTo(0,180,0,180-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();
  ctx.fillStyle='#0369a1'; ctx.fill();
  ctx.save(); ctx.clip();
  function wave(y1,cp,y2,fill){
    ctx.beginPath();
    ctx.moveTo(0,y1);
    ctx.quadraticCurveTo(45,cp,73,y1);
    ctx.quadraticCurveTo(102,y2,131,y1);
    ctx.quadraticCurveTo(160,cp,180,y1);
    ctx.lineTo(180,180); ctx.lineTo(0,180);
    ctx.closePath();
    ctx.fillStyle=fill; ctx.fill();
  }
  wave(139,115,163,'#0284c7');
  wave(106,82,130,'#0ea5e9');
  wave(74,49,98,'#38bdf8');
  ctx.restore();
  ctx.beginPath(); ctx.arc(90,57,28,0,Math.PI*2);
  ctx.fillStyle='#fbbf24'; ctx.fill();
  ctx.beginPath(); ctx.arc(90,57,22,0,Math.PI*2);
  ctx.strokeStyle='#d97706'; ctx.lineWidth=3; ctx.stroke();
  ctx.font='900 26px Inter,sans-serif';
  ctx.fillStyle='#92400e'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('₹$',90,59);
  document.getElementById('ati').href = c.toDataURL('image/png');
})();
</script>
