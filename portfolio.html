<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Money">
<meta name="theme-color" content="#f0f4ff">
<link id="ati" rel="apple-touch-icon" sizes="180x180">
<title>My Money</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --fg: #0f172a;
  --card: #ffffff;
  --border: #e0e7ff;
  --muted: #f0f4ff;
  --muted-fg: #94a3b8;
  --accent: #0284c7;
  --accent-fg: #ffffff;
  --income: #059669;
  --expense: #e11d48;
  --gold: #d97706;
  --radius: 16px;
  --radius-md: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 8px rgba(14,165,233,.07);
  --shadow-bold: 0 16px 48px -8px rgba(2,132,199,.35);
  --nav-h: 56px;
  --header-h: 52px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
body.dark {
  --bg: #0f172a; --fg: #e2e8f0; --card: #1e293b; --border: #334155;
  --muted: #1e293b; --muted-fg: #64748b;
  --shadow: 0 1px 8px rgba(0,0,0,.2); --shadow-bold: 0 16px 48px -8px rgba(0,0,0,.4);
}
body.dark .p-row-icon.sav { background: rgba(2,132,199,.15); }
body.dark .p-row-icon.loan { background: rgba(225,29,72,.15); }
body.dark .p-row-icon.gold { background: rgba(217,119,6,.15); }
body.dark .p-row-icon.inv { background: rgba(139,92,246,.15); }
body.dark .tx-icon.income { background: rgba(5,150,105,.15); }
body.dark .tx-icon.expense { background: rgba(225,29,72,.15); }
body.dark .tx-icon.transfer { background: rgba(2,132,199,.15); }
body.dark .input { background: var(--bg); color: var(--fg); border-color: var(--border); }
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--fg); height: 100%;
  overflow: hidden; -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none; -webkit-font-smoothing: antialiased;
}
button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
input, select, textarea { font-family: inherit; color: var(--fg); }
a { color: inherit; text-decoration: none; }

/* Header */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(var(--safe-top) + 10px) 16px 10px;
  background: var(--card); border-bottom: 1px solid var(--border);
  height: calc(var(--header-h) + var(--safe-top));
  box-shadow: 0 1px 0 var(--border);
}
.header-title { font-size: 17px; font-weight: 900; letter-spacing: -.5px; }
.header-badge {
  font-size: 8px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase;
  background: var(--accent); color: #fff; border-radius: 4px; padding: 2px 6px; margin-left: 7px;
}
.header-actions { display: flex; gap: 5px; }
.hbtn {
  height: 26px; padding: 0 9px; border-radius: 6px; font-size: 10px; font-weight: 600;
  border: 1px solid var(--border); background: var(--bg); color: var(--fg);
  display: flex; align-items: center; gap: 3px;
}
#header-month-nav {
  display: none; align-items: center; gap: 8px; font-size: 13px; font-weight: 800; position: relative;
}
#header-month-nav.visible { display: flex; }
.month-label { cursor: pointer; user-select: none; }
.month-picker { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #fff; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,.2); z-index: 100; padding: 16px; min-width: 260px; }
body.dark .month-picker { background: #1e293b; box-shadow: 0 12px 40px rgba(0,0,0,.6); }
.month-picker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
.month-picker-yr { font-size: 11px; font-weight: 800; color: var(--fg); letter-spacing: .3px; padding: 8px 4px 4px; grid-column: 1/-1; }
.month-picker-yr:first-child { padding-top: 2px; }
.mp-btn { padding: 10px 4px; border-radius: 8px; font-size: 12px; font-weight: 600; text-align: center; cursor: pointer; border: none; background: none; color: var(--fg); }
.mp-btn:hover { background: var(--muted); }
.mp-btn.active { background: var(--accent); color: #fff; }
.mp-btn.today { box-shadow: inset 0 0 0 1.5px var(--accent); }
.month-picker-backdrop { position: fixed; inset: 0; z-index: 99; background: rgba(0,0,0,.35); }

/* Scroll */
#scroll {
  position: fixed; top: calc(var(--header-h) + var(--safe-top));
  left: 0; right: 0; bottom: calc(var(--nav-h) + var(--safe-bottom));
  overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 14px 92px;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Nav */
#nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + var(--safe-bottom)); padding-bottom: var(--safe-bottom);
  background: var(--card); border-top: 1px solid var(--border);
  display: flex; z-index: 100; box-shadow: 0 -2px 12px rgba(14,165,233,.06);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; font-size: 9px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
  color: var(--muted-fg); min-height: 44px; touch-action: manipulation;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 20px; height: 20px; stroke-width: 1.8; }

/* Hero card */
.card-hero {
  background: linear-gradient(135deg, #0369a1 0%, #0284c7 55%, #0ea5e9 100%);
  color: #fff; border-radius: var(--radius); padding: 12px 14px;
  box-shadow: var(--shadow-bold); margin-bottom: 10px;
}
.card-hero .eyebrow { font-size: 8px; font-weight: 700; letter-spacing: 1.4px; opacity: .6; text-transform: uppercase; }
.card-hero .amount { font-size: 22px; font-weight: 900; letter-spacing: -1px; margin-top: 2px; font-variant-numeric: tabular-nums; }
.card-hero .chips { display: flex; gap: 6px; margin-top: 8px; }
.card-hero .chip { background: rgba(255,255,255,.15); border-radius: 7px; padding: 4px 8px; flex: 1; }
.card-hero .chip-lbl { font-size: 8px; font-weight: 700; opacity: .6; letter-spacing: .8px; text-transform: uppercase; }
.card-hero .chip-val { font-size: 12px; font-weight: 800; margin-top: 1px; font-variant-numeric: tabular-nums; }
.card-hero .chip-val.inc { color: #d1fae5; }
.card-hero .chip-val.exp { color: #fee2e2; }

/* Summary stat cards */
.cards-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.stat-card { background: var(--card); border-radius: var(--radius-md); padding: 12px 14px; border: 1px solid var(--border); }
.stat-card .sc-label { font-size: 9px; font-weight: 700; color: var(--muted-fg); text-transform: uppercase; letter-spacing: .7px; }
.stat-card .sc-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.stat-card .sc-amount { font-size: 18px; font-weight: 800; margin-top: 4px; letter-spacing: -.4px; font-variant-numeric: tabular-nums; }
.stat-card .sc-amount.income { color: var(--income); }
.stat-card .sc-amount.expense { color: var(--expense); }

/* Section card */
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow); }
.sec-hdr { display: flex; align-items: flex-start; justify-content: space-between; padding: 14px 16px 10px; }
.sec-title-row { display: flex; align-items: center; gap: 7px; }
.sec-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sec-dot.green { background: #10b981; }
.sec-dot.red { background: #f43f5e; }
.sec-dot.amber { background: #f59e0b; }
.sec-dot.blue { background: #0284c7; }
.sec-title { font-size: 15px; font-weight: 800; letter-spacing: -.3px; }
.sec-sub { font-size: 10px; color: var(--muted-fg); margin-top: 2px; padding-left: 14px; }
.sec-totals { text-align: right; }
.sec-total-lbl { font-size: 8px; font-weight: 700; letter-spacing: 1px; color: var(--muted-fg); text-transform: uppercase; margin-bottom: 2px; }
.sec-total-amt { font-size: 13px; font-weight: 800; line-height: 1.5; font-variant-numeric: tabular-nums; }
.sec-total-amt.grn { color: var(--income); }
.sec-total-amt.red { color: var(--expense); }
.sec-total-amt.amb { color: var(--gold); }

/* Add transaction area (inside card, no border) */
.tx-form-wrap { padding: 0 16px 14px; }
.sec-hdr-pad { padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between; }

/* Toggle pill */
.toggle-pill { display: flex; gap: 3px; background: var(--muted); border-radius: 10px; padding: 3px; margin-bottom: 12px; }
.toggle-pill button { flex: 1; height: 28px; border-radius: 8px; font-size: 12px; font-weight: 700; letter-spacing: .1px; transition: background .18s, color .18s; touch-action: manipulation; color: var(--muted-fg); }
.toggle-pill button.active { background: var(--card); box-shadow: 0 1px 4px rgba(0,0,0,.1); color: var(--fg); }
.toggle-pill button.active.expense { color: var(--expense); }
.toggle-pill button.active.income { color: var(--income); }

/* Entry type chip row */
.toggle-chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.toggle-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; background: var(--muted); color: var(--muted-fg); border: none; cursor: pointer; touch-action: manipulation; transition: background .15s, color .15s; }
.toggle-chip.active { background: var(--accent); color: #fff; }

/* Form */
.form-row { margin-bottom: 10px; }
.form-label { display: block; font-size: 10px; font-weight: 700; color: var(--muted-fg); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .5px; }
.input {
  width: 100%; height: 40px; border: 1.5px solid var(--border);
  border-radius: var(--radius-md); padding: 0 12px;
  font-size: 16px; background: var(--bg);
  appearance: none; -webkit-appearance: none; outline: none; transition: border-color .15s;
  font-variant-numeric: tabular-nums;
}
.input:focus { border-color: var(--accent); }
textarea.input { height: 68px; padding: 10px 12px; resize: none; }
.select-wrap { position: relative; }
.select-wrap::after {
  content: ''; position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
  border-left: 4px solid transparent; border-right: 4px solid transparent;
  border-top: 5px solid var(--muted-fg); pointer-events: none;
}
.select-wrap select { padding-right: 30px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }

/* Buttons */
.btn {
  display: flex; align-items: center; justify-content: center;
  gap: 5px; min-height: 36px; border-radius: var(--radius-md);
  font-size: 13px; font-weight: 700; padding: 0 14px;
  touch-action: manipulation; transition: opacity .15s; width: 100%;
}
.btn:active { opacity: .75; }
.btn svg { width: 15px; height: 15px; flex-shrink: 0; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-outline { border: 1.5px solid var(--border); background: var(--card); color: var(--fg); }
.add-form-btns { display: flex; gap: 8px; margin-top: 12px; }
.add-form-btns .btn { flex: 1; }

/* Portfolio rows */
.p-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-top: 1px solid var(--muted); }
.p-row-icon { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.p-row-icon.sav { background: #e0f2fe; }
.p-row-icon.loan { background: #fff1f2; }
.p-row-icon.gold { background: #fef9c3; }
.p-row-icon.inv { background: #f3e8ff; }
.p-row-meta { flex: 1; min-width: 0; }
.p-row-name { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 5px; letter-spacing: -.1px; }
.cur-pill { font-size: 8px; font-weight: 800; background: #e0f2fe; color: var(--accent); padding: 1px 5px; border-radius: 4px; letter-spacing: .3px; }
.cur-pill.red { background: #fff1f2; color: var(--expense); }
.cur-pill.amb { background: #fef9c3; color: var(--gold); }
.cur-pill.purple { background: #f3e8ff; color: #9333ea; }
.cur-pill.green { background: #dcfce7; color: #16a34a; }
.p-row-sub { font-size: 10px; color: var(--muted-fg); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
.p-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.p-row-amt-lbl { font-size: 8px; font-weight: 600; letter-spacing: .7px; color: var(--muted-fg); text-transform: uppercase; }
.p-row-amt { font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -.2px; }
.p-row-amt.grn { color: var(--income); }
.p-row-amt.red { color: var(--expense); }
.p-row-amt.amb { color: var(--gold); }
.p-row-btns { display: flex; align-items: center; gap: 6px; }
.ibtn { width: 24px; height: 24px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: #cbd5e1; transition: color .15s, background .15s; flex-shrink: 0; }
.ibtn:hover { background: var(--muted); color: #64748b; }
.ibtn.del:hover { background: #fff1f2; color: var(--expense); }
.ibtn:disabled { opacity: .35; cursor: default; }
.ibtn:disabled:hover { background: transparent; color: #cbd5e1; }
.link-btn { font-size: 11px; font-weight: 700; color: var(--accent); background: none; border: none; padding: 0; cursor: pointer; text-decoration: underline; }
.p-chev { width: 20px; height: 20px; border-radius: 6px; background: var(--muted); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
.p-chev svg { transition: transform .2s; }
.p-chev.open svg { transform: rotate(90deg); }

/* Add row button */
.add-row-btn {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  width: calc(100% - 32px); margin: 6px 16px 12px; min-height: 30px; border-radius: 8px;
  border: 1.5px dashed #c7d2fe; background: transparent;
  font-size: 11px; font-weight: 600; color: var(--muted-fg); touch-action: manipulation;
}
.add-row-btn:active { background: var(--muted); }
.rec-sub-hdr { font-size: 10px; font-weight: 800; color: var(--muted-fg); text-transform: uppercase; letter-spacing: .08em; padding: 10px 16px 4px; }
.rec-badge { font-size: 10.5px; font-weight: 700; padding: 2px 7px; border-radius: 99px; white-space: nowrap; }
.rec-badge.paid { background: #d1fae5; color: #065f46; }
.rec-badge.pending { background: #fef9c3; color: #92400e; }
.rec-badge.due-today { background: #dbeafe; color: #1d4ed8; }
.rec-badge.overdue { background: #fee2e2; color: #dc2626; }
.rec-badge.due-soon { background: #fef3c7; color: #d97706; }
.rec-btn { font-size: 10.5px; padding: 4px 8px; height: auto; min-width: 54px; white-space: nowrap; }
.rec-amt-input { width: 72px; height: 32px; font-size: 13px; padding: 0 8px; flex-shrink: 0; }

/* Swipe-to-reveal actions */
.swipe-wrap { position: relative; overflow: hidden; border-top: 1px solid var(--muted); }
.swipe-front { position: relative; z-index: 1; background: var(--card-bg); transition: transform .25s ease; overflow: hidden; }
.swipe-wrap .p-row, .swipe-wrap .tx-row { border-top: none; }
.swipe-back, .swipe-back-left { position: absolute; top: 0; bottom: 0; display: flex; align-items: stretch; z-index: 0; opacity: 0; transition: opacity .15s; }
.swipe-back { right: 0; }
.swipe-back-left { left: 0; }
.swipe-wrap.swiped-left .swipe-back, .swipe-wrap.swiping-left .swipe-back { opacity: 1; }
.swipe-wrap.swiped-right .swipe-back-left, .swipe-wrap.swiping-right .swipe-back-left { opacity: 1; }
.swipe-back button, .swipe-back-left button { display: flex; align-items: center; justify-content: center; width: 48px; border: none; cursor: pointer; color: #fff; }
.swipe-back .sb-edit { background: #3b82f6; }
.swipe-back .sb-tag { background: #8b5cf6; }
.swipe-back .sb-del { background: #ef4444; }
.swipe-back .sb-undo { background: #f59e0b; }
.swipe-back-left .sb-confirm { background: #059669; font-size: 10px; font-weight: 700; width: 72px; gap: 4px; }
.swipe-wrap.swiped-left .swipe-front { transform: translateX(var(--swipe-w, -96px)); }
.swipe-wrap.swiped-right .swipe-front { transform: translateX(var(--swipe-wl, 72px)); }
.hist-note { font-size: 10px; color: var(--muted-fg); font-weight: 400; margin-top: 1px; }

/* Inline add form */
.add-form { border-top: 1px solid var(--muted); padding: 14px 16px; }
.add-form-title { font-size: 11px; font-weight: 800; margin-bottom: 12px; color: var(--muted-fg); text-transform: uppercase; letter-spacing: .6px; }

/* Schedule table */
.schedule-wrap { padding: 0 16px 12px; }
.schedule-tbl-wrap { max-height: 200px; overflow-y: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(--muted); border-radius: 8px; }
.schedule-tbl { width: 100%; border-collapse: collapse; font-size: 11px; font-variant-numeric: tabular-nums; }
.schedule-tbl thead th { position: sticky; top: 0; background: var(--muted); padding: 5px 8px; text-align: right; font-weight: 700; white-space: nowrap; color: var(--muted-fg); }
.schedule-tbl thead th:first-child { text-align: left; }
.schedule-tbl tbody td { padding: 5px 8px; text-align: right; border-bottom: 1px solid var(--muted); }
.schedule-tbl tbody td:first-child { text-align: left; color: var(--muted-fg); }
.schedule-tbl tbody tr:last-child td { border-bottom: none; }
.ledger-filters { display:flex; gap:8px; padding:8px 16px; flex-wrap:wrap; align-items:center; }
.ledger-filters select { font-size:12px; padding:4px 8px; border-radius:6px; border:1px solid var(--muted); background:var(--bg); color:var(--fg); }
.ledger-month-hdr { padding:10px 16px 4px; font-size:12px; font-weight:800; color:var(--muted-fg); }
.ledger-tbl-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.ledger-tbl { width:100%; border-collapse:collapse; font-size:11px; font-variant-numeric:tabular-nums; }
.ledger-tbl thead th { position:sticky; top:0; background:var(--muted); padding:5px 8px; text-align:right; font-weight:700; white-space:nowrap; color:var(--muted-fg); }
.ledger-tbl thead th:first-child, .ledger-tbl thead th:nth-child(2) { text-align:left; }
.ledger-tbl tbody td { padding:5px 8px; text-align:right; border-bottom:1px solid var(--muted); }
.ledger-tbl tbody td:first-child, .ledger-tbl tbody td:nth-child(2) { text-align:left; }
.ledger-tbl tbody tr:last-child td { border-bottom:none; }
.ledger-src { font-size:9px; padding:1px 5px; border-radius:4px; font-weight:600; }
.ledger-src.inc { background:#d1fae5; color:#047857; }
.ledger-src.exp { background:#fee2e2; color:#b91c1c; }
.ledger-src.xfr { background:#dbeafe; color:#1d4ed8; }
.ledger-src.loan { background:#fef3c7; color:#92400e; }
.sched-pp-row { background: #f0fdf4; }
.sched-pp-amt { color: #059669; font-weight: 700; font-size: 11px; }
.pp-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--muted); }
.pp-hdr-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.pp-hdr-title { font-size: 11px; font-weight: 700; color: var(--muted-fg); text-transform: uppercase; letter-spacing: .05em; }
.pp-count { background: var(--accent); color: #fff; border-radius: 99px; padding: 1px 6px; font-size: 10px; }
.pp-tbl-wrap { max-height: 200px; overflow-y: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(--muted); border-radius: 8px; margin-bottom: 4px; }
.pp-tbl { width: 100%; border-collapse: collapse; font-size: 11px; font-variant-numeric: tabular-nums; }
.pp-tbl thead th { position: sticky; top: 0; background: var(--muted); padding: 5px 8px; text-align: right; font-weight: 700; white-space: nowrap; color: var(--muted-fg); }
.pp-tbl thead th:first-child { text-align: left; }
.pp-tbl tbody td { padding: 5px 8px; text-align: right; border-bottom: 1px solid var(--muted); }
.pp-tbl tbody td:first-child { text-align: left; color: var(--muted-fg); }
.pp-tbl tbody tr:last-child td { border-bottom: none; }
.pp-tbl-amt { font-weight: 700; color: var(--income); }
.pp-tbl tfoot td { padding: 5px 8px; font-size: 11px; color: var(--muted-fg); background: var(--muted); text-align: right; }
.pp-form { margin-top: 2px; }

/* Preview row */
.preview-row { background: var(--muted); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.preview-cell .plabel { font-size: 9px; color: var(--muted-fg); font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }
.preview-cell .pval { font-size: 12px; font-weight: 800; margin-top: 2px; font-variant-numeric: tabular-nums; }

/* Transaction list */
.tx-list { list-style: none; }
.tx-row { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-top: 1px solid var(--muted); cursor: pointer; }
.tx-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tx-icon.income { background: rgba(5,150,105,.1); color: var(--income); }
.tx-icon.expense { background: rgba(225,29,72,.08); color: var(--expense); }
.tx-icon.transfer { background: rgba(2,132,199,.1); color: var(--accent); }
.tx-icon svg { width: 16px; height: 16px; stroke-width: 2; }
.tx-body { flex: 1; min-width: 0; }
.tx-cat { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
.tx-badge { font-size: 8px; font-weight: 800; background: var(--muted); border-radius: 3px; padding: 1px 4px; color: var(--muted-fg); letter-spacing: .3px; }
.tx-meta { font-size: 10px; color: var(--muted-fg); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-right { text-align: right; flex-shrink: 0; }
.tx-amount { font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; }
.tx-amount.income { color: var(--income); }
.tx-amount.expense { color: var(--expense); }
.tx-amount.transfer { color: var(--accent); font-size: 12px; }
.tx-del { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #cbd5e1; flex-shrink: 0; transition: color .15s; }
.tx-del:hover { color: var(--expense); }
.tx-del svg { width: 13px; height: 13px; stroke-width: 1.8; }
.tx-date-hdr {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
  color: var(--muted-fg); padding: 10px 16px 4px; list-style: none;
}

/* Category bars */
.cat-wrap { padding: 0 16px 14px; }
.cat-row { margin-bottom: 9px; }
.cat-hdr { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
.cat-name { font-size: 12px; font-weight: 600; }
.cat-amt { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
.cat-pct { font-size: 10px; color: var(--muted-fg); margin-left: 3px; }
.bar-bg { height: 5px; background: var(--muted); border-radius: 3px; overflow: hidden; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; padding:0 12px 12px; }
.cal-day-hdr { text-align:center; font-size:10px; font-weight:600; color:var(--muted-fg); padding:6px 0 4px; }
.cal-day { border-radius:8px; padding:5px 2px 4px; min-height:46px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; transition:background .1s; }
.cal-day:active { opacity:.7; }
.cal-day-num { font-size:12px; font-weight:500; line-height:1; }
.cal-dots { display:flex; gap:2px; flex-wrap:wrap; justify-content:center; align-items:center; }
.cal-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.cal-dot-more { font-size:8px; color:var(--muted-fg); line-height:1; }
.bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #0284c7, #38bdf8); }
.bar-fill.inc { background: linear-gradient(90deg, var(--income), #34d399); }
.cat-amt.grn { color: var(--income); }
.cat-subrow { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--muted-fg); padding: 4px 0 0 10px; }

/* Charts */
.chart-card svg { display: block; margin: 0 auto; }
.chart-legend { display: flex; flex-wrap: wrap; gap: 8px 12px; margin-top: 12px; justify-content: center; padding: 0 16px 14px; }
.chart-legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--fg); }
.chart-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Empty state */
.empty { text-align: center; padding: 28px 16px; color: var(--muted-fg); }
.empty svg { width: 36px; height: 36px; margin: 0 auto 8px; display: block; opacity: .3; }
.empty p { font-size: 13px; }

/* Toast */
#toast-wrap {
  position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
  left: 50%; transform: translateX(-50%); z-index: 200;
  display: flex; flex-direction: column; gap: 6px; align-items: center;
}
.toast {
  background: var(--fg); color: #fff; border-radius: 20px; padding: 8px 16px;
  font-size: 12px; font-weight: 600; white-space: normal; max-width: calc(100vw - 32px); text-align: center; word-break: break-word;
  animation: toast-in .2s ease; box-shadow: 0 4px 16px rgba(0,0,0,.2);
}
.toast.out { animation: toast-out .2s ease forwards; }
@keyframes toast-in { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
@keyframes toast-out { from { opacity:1; } to { opacity:0; } }

/* Misc */
.cur-badge { display: inline-block; font-size: 9px; font-weight: 700; background: var(--muted); border-radius: 4px; padding: 1px 5px; }
.cur-section { margin-bottom: 16px; }
.cur-section-label { font-size: 10px; font-weight: 700; color: var(--muted-fg); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
.text-muted { color: var(--muted-fg); }
.text-sm { font-size: 11px; }
.hidden { display: none !important; }
.fab {
  position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px); right: 20px;
  width: 56px; height: 56px; border-radius: 50%; z-index: 90;
  background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(2,132,199,.4); border: none; transition: transform .2s, opacity .2s;
}
.fab:active { transform: scale(.92); }
.fab.hidden { display: none; }
.bottom-sheet-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn .2s ease;

.bottom-sheet {

@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

function save() {
  try {
    localStorage.setItem('mmc.tx.v1', JSON.stringify(S.transactions));
    localStorage.setItem('mmc.portfolio.v1', JSON.stringify(S.portfolio));
    localStorage.setItem('mmc.recurring.v1', JSON.stringify(S.recurring));
    localStorage.setItem('mmc.lastCurrency.v1', S.txCurrency);
    localStorage.setItem('mmc.goals.v1', JSON.stringify(S.goals));
    const backup = JSON.stringify({version:3, transactions:S.transactions, portfolio:S.portfolio, recurring:S.recurring, goals:S.goals, budgets:JSON.parse(localStorage.getItem('mmc.budgets')||'{}')});
    localStorage.setItem('mmc.backup', backup);

  } catch(e) {}

function load() {
  try { const tx = localStorage.getItem('mmc.tx.v1'); if (tx) S.transactions = JSON.parse(tx); } catch(e) { S.transactions = []; }
  try { const p = localStorage.getItem('mmc.portfolio.v1'); if (p) S.portfolio = Object.assign({savings:[],loans:[],goldLoans:[],investments:[],insurance:[]}, JSON.parse(p)); } catch(e) {}

  S.portfolio.goldLoans = S.portfolio.goldLoans.map(g => ({payments:[], ...g}));

  try { const so = localStorage.getItem('mmc.secOpen'); if (so) Object.assign(S.secOpen, JSON.parse(so)); } catch(e) {}
  try {
    const ord = localStorage.getItem('mmc.sectionOrder.v1');
    if (ord) {
      const saved = JSON.parse(ord);
      const defaults = { dashboard: ['heroCards','anomalies','pendingBills','financialCalendar','budgetAlerts','trendChart','netWorth','categoryDonut','reports','activity'], portfolio: ['summary','savings','loans','goldLoans','investments','insurance'], recurring: ['recSummary','recIncome','bills','cards'], insights: ['goals','projections','whatIf','aiInsights'] };
      for (const tab of Object.keys(defaults)) {
        const s = saved[tab] || [];
        const missing = defaults[tab].filter(k => !s.includes(k));

      }

}


const uid = () => { try { return crypto.randomUUID(); } catch(e) { return Math.random().toString(36).slice(2)+Date.now().toString(36); } };
const todayISO = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const getCur = t => t.currency || 'USD';

function formatMoney(n, cur='USD', compact=false) {
  if (isNaN(n)) n = 0;
  const opts = {style:'currency',currency:cur,maximumFractionDigits:0};
  if (compact) opts.notation = 'compact';
  return new Intl.NumberFormat(cur==='INR'?'en-IN':'en-US',opts).format(n);
}
function fmtDate(iso) { if (!iso) return ''; return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function computeEmi(principal, ratePct, years) {
  const n = years * 12; if (!n || !principal) return 0;
  if (!ratePct) return principal / n;
  const r = ratePct / 100 / 12, pow = Math.pow(1+r,n);
  return (principal * r * pow) / (pow - 1);

function monthsElapsed(startISO) {
  const start = new Date(startISO), now = new Date();
  let m = (now.getFullYear()-start.getFullYear())*12+(now.getMonth()-start.getMonth());
  if (now.getDate() < start.getDate()) m--;

}
function computeOutstanding(loan) {
  const {principal,startDate,tenureYears,interestRate} = loan;
  if (!startDate||!principal) return principal||0;
  const n = tenureYears*12, elapsed = Math.min(monthsElapsed(startDate),n);
  const emi = computeEmi(principal,interestRate,tenureYears), r = interestRate/100/12;
  const payments = (loan.partPayments||[]).slice().sort((a,b)=>a.date<b.date?-1:1);
  const start = new Date(startDate);
  let bal = principal;
  for (let i=1;i<=elapsed;i++) {
    const mDate = new Date(start); mDate.setMonth(mDate.getMonth()+i);
    const interest = bal*r, princ = Math.min(emi-interest, bal);
    bal = Math.max(0, bal-princ);
    // apply part payments whose date falls within this month
    const mStr = mDate.toISOString().slice(0,7); // "YYYY-MM"
    for (const p of payments) {
      if ((p.date||'').slice(0,7)===mStr) bal = Math.max(0, bal-p.amount);
    }
  }
  return bal;
}
function computeOutstandingAsOf(loan, mon) {
  const {principal, startDate, tenureYears, interestRate} = loan;
  if (!startDate || !principal) return principal || 0;
  const n = tenureYears * 12;
  const [sy, sm] = startDate.split('-').map(Number);
  const [ey, em] = mon.split('-').map(Number);
  const elapsed = Math.min(Math.max(0, (ey - sy) * 12 + (em - sm)), n);
  const emi = computeEmi(principal, interestRate, tenureYears), r = interestRate / 100 / 12;
  const payments = (loan.partPayments || []).slice().sort((a, b) => a.date < b.date ? -1 : 1);
  const start = new Date(startDate);
  let bal = principal;
  for (let i = 1; i <= elapsed; i++) {
    const mDate = new Date(start); mDate.setMonth(mDate.getMonth() + i);
    const interest = bal * r, princ = Math.min(emi - interest, bal);

  if (item.months?.[thisMonth()]?.paid) { item.endMonth = thisMonth(); }

  item.closed = false; delete item.closedDate; delete item.endMonth;

    const mDate = new Date(start); mDate.setMonth(mDate.getMonth()+i);
    const interest=bal*r, princ=Math.min(emi-interest,bal);
    bal = Math.max(0,bal-princ);
    const mStr = mDate.toISOString().slice(0,7);
    let partPaid = 0;
    for (const p of payments) {
      if ((p.date||'').slice(0,7)===mStr) { partPaid+=p.amount; bal=Math.max(0,bal-p.amount); }
    }
    rows.push({month:i,date:mDate.toLocaleDateString('en-US',{month:'short',year:'2-digit'}),interest,principal:princ,emi,balance:bal,partPaid:partPaid||0});
  }
  return rows;
}
function computeGoldLoanInterest(loan) {
  const {principal,interestRate,startDate} = loan; if (!principal||!interestRate) return 0;
  const start = startDate ? new Date(startDate) : new Date();
  const days = Math.min(365,Math.max(0,Math.floor((Date.now()-start.getTime())/86400000)));
  return (principal*interestRate*days)/(100*365);
}
function computeGoldSchedule(loan) {
  const {principal,interestRate,startDate} = loan; if (!principal||!interestRate||!startDate) return [];
  const start = new Date(startDate);
  const days = Math.min(365,Math.max(0,Math.floor((Date.now()-start.getTime())/86400000)));
  const dailyRate = (principal*interestRate)/(100*365); const rows = [];
  for (let i=1;i<=days;i++) {
    if (i%30===0||i===days) { const d=new Date(start); d.setDate(d.getDate()+i); rows.push({day:i,date:d.toLocaleDateString('en-US',{month:'short',day:'numeric'}),daily:dailyRate,total:principal+dailyRate*i}); }
  }
  return rows;
}

  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'USD';
}

function getMonthlyTotals(cur, numMonths) {
  const result = [];
  for (let i = numMonths - 1; i >= 0; i--) {
    const mon = shiftMonth(S.selectedMonth, -i);
    const label = new Date(mon+'-15').toLocaleDateString('en',{month:'short'});
    let income = 0, expense = 0;
    const recurTxIds = new Set();
    for (const item of (S.recurring?.items||[])) { const ms=item.months?.[mon]; if (ms?.txId) recurTxIds.add(ms.txId); }
    for (const card of (S.recurring?.creditCards||[])) { const ms=card.months?.[mon]; if (ms?.txId) recurTxIds.add(ms.txId); }
    for (const t of S.transactions) {
      if (!t.date || localTxMonth(t.date)!==mon || recurTxIds.has(t.id)) continue;
      if (t.type==='transfer') { if (t.fromCurrency===cur) expense+=t.fromAmount; if (t.toCurrency===cur) income+=t.toAmount; continue; }
      if (getCur(t)!==cur) continue;
      if (t.type==='income') income+=t.amount; else expense+=t.amount;
    }
    for (const item of (S.recurring?.items||[])) {
      if ((item.currency||'USD')!==cur) continue;
      const ms=item.months?.[mon]; if (ms?.paid&&ms.amount>0) { if (item.type==='income') income+=ms.amount; else expense+=ms.amount; }
    }
    for (const card of (S.recurring?.creditCards||[])) {
      if ((card.currency||'USD')!==cur) continue;
      const ms=card.months?.[mon]; if (ms?.paid&&ms.amount>0) expense+=ms.amount;
    }
    for (const loan of S.portfolio.loans) { if (getCur(loan)!==cur) continue; for (const p of (loan.partPayments||[])) { if (p.date&&localTxMonth(p.date)===mon) expense+=p.amount; } }
    for (const loan of S.portfolio.goldLoans) { if (getCur(loan)!==cur) continue; for (const p of (loan.payments||[])) { if (p.date&&localTxMonth(p.date)===mon) expense+=p.amount; } }
    result.push({month:mon, label, income, expense});
  }
  return result;
}

function formatInsights(txt) {
  const lines = txt.split('\n');
  let html = '';
  for (const raw of lines) {
    const line = raw.trim();
    if (!line) { html += '<div style="height:8px"></div>'; continue; }
    let s = esc(line);
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(?<!\*)\*([^*]+?)\*(?!\*)/g, '<em>$1</em>');
    if (/^#{1,3}\s/.test(line)) {
      const t = s.replace(/^#{1,3}\s+/, '');
      html += `<div style="font-weight:700;font-size:13px;margin:10px 0 4px;color:var(--text)">${t}</div>`;
    } else if (/^[*\-•]\s+/.test(line)) {
      const t = s.replace(/^[*\-•]\s+/, '');
      html += `<div style="padding-left:12px;margin:2px 0">• ${t}</div>`;
    } else {
      html += `<div style="margin:2px 0">${s}</div>`;
    }
  }
  return html;
}

async function fetchWithRetry(url, opts) {
  for (let i = 0; i < 3; i++) {
    const resp = await fetch(url, opts);
    if (resp.status === 503 && i < 2) { await new Promise(r => setTimeout(r, (i + 1) * 2000)); continue; }
    return resp;
  }
}

function buildPortfolioSummary() {

  for (const cur of allCurs) {

    if (sav) lines.push(`Savings: ${formatMoney(sav,cur)}`);

    let txInc=0, txExp=0;
    const mon = thisMonth();
    S.transactions.filter(t=>t.type!=='transfer'&&getCur(t)===cur&&localTxMonth(t.date)===mon).forEach(t=>{
      if(t.type==='income') txInc+=t.amount; else txExp+=t.amount;
    });
    if (txInc||txExp) lines.push(`This month: Income ${formatMoney(txInc,cur)}, Expenses ${formatMoney(txExp,cur)}`);

    const recInc = (S.recurring?.items||[]).filter(i=>i.type==='income'&&getCur(i)===cur);
    if (recInc.length) lines.push(`Recurring income: ${recInc.map(i=>`${i.name} ${formatMoney(i.amount,cur)}`).join(', ')}`);

    const recExp = (S.recurring?.items||[]).filter(i=>i.type==='expense'&&getCur(i)===cur);
    if (recExp.length) lines.push(`Recurring bills: ${recExp.map(i=>`${i.name} ${formatMoney(i.amount||0,cur)}`).join(', ')}`);

    const loans = S.portfolio.loans.filter(i=>getCur(i)===cur);
    if (loans.length) lines.push(`Loans: ${loans.map(l=>`${l.name} outstanding ${formatMoney(computeOutstanding(l),cur)} @ ${l.interestRate}%`).join(', ')}`);

    const gold = S.portfolio.goldLoans.filter(i=>getCur(i)===cur&&!i.closed);
    if (gold.length) lines.push(`Gold loans: ${gold.map(g=>`${g.name} principal ${formatMoney(g.principal,cur)} @ ${g.interestRate}%`).join(', ')}`);

    const inv = S.portfolio.investments.filter(i=>getCur(i)===cur);
    if (inv.length) lines.push(`Investments: ${inv.map(i=>`${i.name} (${i.type||'Other'}) invested ${formatMoney(i.amountInvested,cur)} current ${formatMoney(i.currentValue,cur)}`).join(', ')}`);

    const ins = (S.portfolio.insurance||[]).filter(i=>getCur(i)===cur);
    if (ins.length) lines.push(`Insurance: ${ins.map(i=>`${i.name} (${i.type||''}) sum assured ${formatMoney(i.sumAssured,cur)}`).join(', ')}`);
  }
  return lines.join('\n');
}

// ── Transactions ───────────────────────────────────────────────────────────────
const thisMonth = () => todayISO().slice(0,7);
const localTxMonth = iso => { const d=new Date(iso); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };

function fmtMonth(mon) {
  return new Date(parseInt(mon),parseInt(mon.slice(5))-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
}

function shiftMonth(mon, delta) {
  const [y,m] = mon.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

// ISO date for a new transaction within `mon`: now if it's the current month, else the last day of `mon`
function dateInMonth(mon) {
  if (mon === thisMonth()) return new Date().toISOString();
  const [y,m] = mon.split('-').map(Number);
  return new Date(y, m, 0, 12).toISOString();
}

function renderReports() {
  const isOpen = S.secOpen.reports;
  const now = todayISO();
  const year = now.slice(0,4);
  const ranges = { ytd: 'Year to Date', '3m': 'Last 3 Months', '6m': 'Last 6 Months', '12m': 'Last 12 Months', custom: 'Custom Range' };
  let fromDate, toDate;
  if (S.reportRange === 'custom') {
    fromDate = S.reportFrom || `${year}-01-01`;
    toDate = S.reportTo || now;
  } else if (S.reportRange === 'ytd') {
    fromDate = `${year}-01-01`; toDate = now;
  } else {
    const months = parseInt(S.reportRange);
    const d = new Date(); d.setMonth(d.getMonth() - months);
    fromDate = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    toDate = now;
  }
  const rangeChips = Object.entries(ranges).map(([k,v]) =>
    `<button class="toggle-chip${S.reportRange===k?' active':''}" data-action="set-report-range" data-range="${k}">${v}</button>`).join('');
  const customInputs = S.reportRange==='custom' ? `<div class="form-row-2" style="padding:6px 16px 0"><div><label class="form-label">From</label><input class="input" type="date" value="${fromDate}" data-action="report-from" style="font-size:12px;padding:5px 8px"></div><div><label class="form-label">To</label><input class="input" type="date" value="${toDate}" data-action="report-to" style="font-size:12px;padding:5px 8px"></div></div>` : '';
  const hdr = `<div class="sec-hdr" data-action="toggle-section" data-sec="reports" style="cursor:pointer${isOpen?'':';padding-bottom:14px'}">
    <div><div class="sec-title-row"><span class="sec-dot blue"></span><span class="sec-title">Reports</span></div><div class="sec-sub">${fmtDate(fromDate)} — ${fmtDate(toDate)}</div></div></div>`;
  if (!isOpen) return `<div class="card">${hdr}</div>`;

  const byCur = {};
  const addCur = (cur, type, amt, cat) => {
    if (!byCur[cur]) byCur[cur] = { income: 0, expense: 0, cats: {} };
    byCur[cur][type] += amt;
    if (cat && type === 'expense') byCur[cur].cats[cat] = (byCur[cur].cats[cat]||0) + amt;
  };
  for (const t of S.transactions) {
    if (!t.date) continue;
    const d = t.date.slice(0,10);
    if (d < fromDate || d > toDate) continue;
    if (t.type === 'transfer') { addCur(t.fromCurrency, 'expense', t.fromAmount); addCur(t.toCurrency, 'income', t.toAmount); continue; }
    addCur(getCur(t), t.type === 'income' ? 'income' : 'expense', t.amount, t.category || 'Other');
  }
  const fromMon = fromDate.slice(0,7), toMon = toDate.slice(0,7);
  for (let mon = fromMon; mon <= toMon; mon = shiftMonth(mon, 1)) {
    for (const item of (S.recurring?.items||[])) {
      const ms = item.months?.[mon]; if (!ms?.paid || !ms.amount) continue;
      const c = item.currency||'USD';
      if (item.type==='income') addCur(c,'income',ms.amount);
      else addCur(c,'expense',ms.amount, item.category||'Bills');
    }
    for (const card of (S.recurring?.creditCards||[])) {
      const ms = card.months?.[mon]; if (!ms?.paid || !ms.amount) continue;
      addCur(card.currency||'USD','expense',ms.amount,'Bills');
    }
  }
  if (!Object.keys(byCur).length) return `<div class="card">${hdr}<div class="toggle-chip-row" style="padding:4px 16px 8px;flex-wrap:wrap">${rangeChips}</div>${customInputs}<div class="empty"><p>No data in this range</p></div></div>`;

  let body = '';
  for (const [cur, data] of Object.entries(byCur)) {
    const net = data.income - data.expense;
    const topCats = Object.entries(data.cats).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const totalExp = data.expense || 1;
    body += `<div style="padding:8px 16px 12px;${Object.keys(byCur).length>1?'border-top:1px solid var(--border)':''}">
      <div style="font-weight:700;font-size:13px;margin-bottom:8px">${cur}</div>
      <div style="display:flex;gap:16px;margin-bottom:10px">
        <div><div style="font-size:10px;color:var(--muted-fg)">Income</div><div style="font-size:14px;font-weight:700;color:var(--income)">${formatMoney(data.income,cur)}</div></div>
        <div><div style="font-size:10px;color:var(--muted-fg)">Expenses</div><div style="font-size:14px;font-weight:700;color:var(--expense)">${formatMoney(data.expense,cur)}</div></div>
        <div><div style="font-size:10px;color:var(--muted-fg)">Net</div><div style="font-size:14px;font-weight:700;color:${net>=0?'var(--income)':'var(--expense)'}">${formatMoney(net,cur)}</div></div>
      </div>
      ${topCats.length?`<div style="font-size:10px;color:var(--muted-fg);margin-bottom:4px">Top Expenses</div>${topCats.map(([cat,amt])=>`<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span>${esc(cat)}</span><span style="font-weight:600">${formatMoney(amt,cur)} <span style="color:var(--muted-fg)">(${Math.round(amt/totalExp*100)}%)</span></span></div>`).join('')}`:''}
    </div>`;
  }
  return `<div class="card">${hdr}<div class="toggle-chip-row" style="padding:4px 16px 8px;flex-wrap:wrap">${rangeChips}</div>${customInputs}${body}</div>`;
}

async function getGoalPlan(goalId) {
  const goal = S.goals.find(g => g.id === goalId);
  if (!goal) return;
  const deadlineDate = new Date(goal.deadline);
  const now = new Date();
  const monthsLeft = Math.max(0, (deadlineDate.getFullYear()-now.getFullYear())*12 + deadlineDate.getMonth()-now.getMonth());
  const remaining = Math.max(0, goal.targetAmount - goal.savedSoFar);
  const summary = buildPortfolioSummary();
  const prompt = `You are a personal finance advisor. Create a monthly savings plan to reach this goal. Include: monthly amount needed, where to cut spending, and which savings/investment vehicle to use. Be specific to the numbers. Keep it to 5-6 bullet points.\n\nGoal: ${goal.name}\nTarget: ${formatMoney(goal.targetAmount, goal.currency)}\nSaved so far: ${formatMoney(goal.savedSoFar, goal.currency)}\nRemaining: ${formatMoney(remaining, goal.currency)}\nDeadline: ${goal.deadline} (${monthsLeft} months left)\n\nPortfolio context:\n${summary}`;
  await callAI(prompt, v => { goal.aiPlan = v; save(); }, v => { goal.aiPlanLoading = v; }, `mmc.goalPlan.${goalId}`);
}

function getDueBadge(dueDay, isPaid, mon) {
  if (!dueDay || isPaid) return '';
  const cur = thisMonth();
  if (mon < cur) return '<span class="rec-badge overdue">Overdue</span>';
  if (mon > cur) return '';
  const today = new Date().getDate();
  if (dueDay === today) return '<span class="rec-badge due-today">Due Today</span>';
  if (dueDay < today) return '<span class="rec-badge overdue">Overdue</span>';
  if (dueDay <= today + 3) return '<span class="rec-badge due-soon">Due Soon</span>';
  return '';
}

function getCalendarEvents(mon) {
  const events = new Map();
  const add = (day, ev) => {
    if (!day || day < 1 || day > 31) return;
    if (!events.has(day)) events.set(day, []);
    events.get(day).push(ev);
  };
  const inRange = i => (!i.startMonth || mon >= i.startMonth) && (!i.endMonth || mon <= i.endMonth);

  for (const item of S.recurring.items) {
    if (item.closed || !inRange(item)) continue;
    const paid = item.months?.[mon]?.paid;
    const amt = item.months?.[mon]?.amount ?? item.amount;
    const cur = item.currency || S.txCurrency;
    if (item.type === 'income') {
      add(item.dayOfMonth, {type:'income', name:item.name, amount:amt, cur, paid, color:'var(--income)'});
    } else {
      add(item.dueDay, {type:'bill', name:item.name, amount:item.isVariable?(item.months?.[mon]?.amount||0):amt, cur, paid, color: paid ? 'var(--muted-fg)' : 'var(--expense)'});
    }
  }
  for (const card of S.recurring.creditCards) {
    if (card.closed || !inRange(card)) continue;
    const paid = card.months?.[mon]?.paid;
    const cur = card.currency || S.txCurrency;
    add(card.dueDay, {type:'card', name:card.name, amount:card.months?.[mon]?.amount||0, cur, paid, color: paid ? 'var(--muted-fg)' : '#f59e0b'});
  }
  for (const loan of S.portfolio.loans || []) {
    if (loan.closed || !loan.startDate) continue;
    const emiDay = new Date(loan.startDate+'T00:00:00').getDate();
    const cur = loan.currency || S.txCurrency;
    add(emiDay, {type:'emi', name:loan.name+' EMI', amount:computeEmi(loan.principal,loan.interestRate,loan.tenureYears), cur, color:'#3b82f6'});
  }
  for (const tx of S.transactions) {
    if (!tx.date || localTxMonth(tx.date) !== mon) continue;
    const day = new Date(tx.date).getDate();
    const isInc = tx.type === 'income';
    add(day, {type:'tx', name:tx.note||tx.category||tx.type, amount:tx.amount, cur:tx.currency||S.txCurrency, color: isInc ? 'var(--income)' : 'var(--expense)'});
  }
  return events;
}

function renderFinancialCalendar() {
  const mon = S.selectedMonth;
  const [year, month] = mon.split('-').map(Number);
  const firstDay = new Date(year, month-1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const isCurrentMonth = mon === thisMonth();
  const todayDay = isCurrentMonth ? new Date().getDate() : -1;
  const sel = S.calendarSelectedDay;
  const events = getCalendarEvents(mon);

  const dayHdrs = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
    .map(d => `<div class="cal-day-hdr">${d}</div>`).join('');

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const cellsHtml = cells.map(d => {
    if (!d) return `<div class="cal-day" style="cursor:default"></div>`;
    const evs = events.get(d) || [];
    const isToday = d === todayDay;
    const isSel = d === sel;
    const bgStyle = isToday ? 'background:var(--accent)' : isSel ? 'background:var(--muted)' : '';
    const numStyle = isToday ? 'color:#fff;font-weight:700' : '';
    const dotColors = evs.map(e => e.color);
    const visibleDots = dotColors.slice(0,3).map(c => `<span class="cal-dot" style="background:${c}"></span>`).join('');
    const moreHtml = evs.length > 3 ? `<span class="cal-dot-more">+${evs.length-3}</span>` : '';
    return `<div class="cal-day" data-action="select-calendar-day" data-day="${d}" style="${bgStyle}">
      <span class="cal-day-num" style="${numStyle}">${d}</span>
      <div class="cal-dots">${visibleDots}${moreHtml}</div>
    </div>`;
  }).join('');

  let detailHtml = '';
  if (sel && sel >= 1 && sel <= daysInMonth) {
    const evs = events.get(sel) || [];
    const selDate = new Date(year, month-1, sel).toLocaleDateString('en-US',{month:'long',day:'numeric'});
    const typeLabel = {income:'Income',bill:'Bill',card:'Credit Card',emi:'Loan EMI',tx:'Transaction'};
    const rows = evs.length
      ? evs.map(e => {
          const status = e.paid ? '<span class="rec-badge" style="background:#d1fae5;color:#065f46">Paid</span>'
            : e.type==='tx' ? '' : '<span class="rec-badge" style="background:#fee2e2;color:#991b1b">Unpaid</span>';
          const amtStr = e.amount ? formatMoney(e.amount, e.cur) : '';
          return `<div class="p-row" style="padding:8px 14px">
            <div class="p-row-meta">
              <div class="p-row-name" style="font-size:13px">${esc(e.name)}</div>
              <div class="p-row-sub">${typeLabel[e.type]||e.type}${status?' · '+status:''}</div>
            </div>
            ${amtStr ? `<div class="p-row-right" style="color:${e.color};font-weight:600">${amtStr}</div>` : ''}
          </div>`;
        }).join('')
      : `<div style="padding:14px;color:var(--muted-fg);font-size:12px;text-align:center">No events</div>`;
    detailHtml = `<div style="margin:0 12px 12px;border-radius:10px;overflow:hidden;border:1px solid var(--border)">
      <div style="padding:8px 14px;background:var(--accent);color:#fff;font-size:12px;font-weight:700">${selDate}</div>
      ${rows}
    </div>`;
  }

  const isOpen = S.secOpen.financialCalendar !== false;
  return `<div class="card">
    <div class="sec-hdr" data-action="toggle-section" data-sec="financialCalendar" style="cursor:pointer${isOpen?'':';padding-bottom:14px'}">
      <div><div class="sec-title-row"><span class="sec-dot" style="background:#6366f1"></span><span class="sec-title">Financial Calendar</span></div><div class="sec-sub">${fmtMonth(mon)} · ${events.size} day${events.size!==1?'s':''} with events</div></div>
    </div>
    ${isOpen ? `<div class="cal-grid">${dayHdrs}${cellsHtml}</div>${detailHtml}` : ''}
  </div>`;
}

function renderRecurringSummary() {
  const mon = S.selectedMonth;
  const byCur = {};
  const ensure = (cur) => { if (!byCur[cur]) byCur[cur] = {expectedIncome:0, expectedBills:0, expectedCC:0, incomeCount:0, incomePaid:0, billsCount:0, billsPaid:0}; };

  // Income items
  for (const item of S.recurring.items) {
    if (item.type !== 'income' || item.closed) continue;
    if (item.startMonth && mon < item.startMonth) continue;
    if (item.endMonth && mon > item.endMonth) continue;
    const cur = item.currency || S.txCurrency;
    ensure(cur);
    byCur[cur].expectedIncome += (item.months?.[mon]?.amount ?? item.amount) || 0;
    byCur[cur].incomeCount++;
    if (item.months?.[mon]?.paid) byCur[cur].incomePaid++;
  }

  // Bill items
  for (const item of S.recurring.items) {
    if (item.type !== 'expense' || item.closed) continue;
    if (item.startMonth && mon < item.startMonth) continue;
    if (item.endMonth && mon > item.endMonth) continue;
    const cur = item.currency || S.txCurrency;
    ensure(cur);
    if (item.isVariable) {
      let sum = 0, cnt = 0;
      for (let d = 1; d <= 3; d++) {
        const pm = shiftMonth(mon, -d);
        const a = item.months?.[pm]?.amount;
        if (a) { sum += a; cnt++; }
      }
      byCur[cur].expectedBills += cnt ? sum / cnt : 0;
    } else {
      byCur[cur].expectedBills += (item.months?.[mon]?.amount ?? item.amount) || 0;
    }
    byCur[cur].billsCount++;
    if (item.months?.[mon]?.paid) byCur[cur].billsPaid++;
  }

  // Credit cards
  for (const card of S.recurring.creditCards) {
    if (card.closed) continue;
    if (card.startMonth && mon < card.startMonth) continue;
    if (card.endMonth && mon > card.endMonth) continue;
    const cur = card.currency || S.txCurrency;
    ensure(cur);
    byCur[cur].expectedCC += card.months?.[mon]?.amount || 0;
    byCur[cur].billsCount++;
    if (card.months?.[mon]?.paid) byCur[cur].billsPaid++;
  }

  const curs = Object.keys(byCur);
  if (!curs.length) return '';

  let totalIncomePaid = 0, totalIncomeAll = 0, totalBillsPaid = 0, totalBillsAll = 0;
  for (const d of Object.values(byCur)) {
    totalIncomePaid += d.incomePaid; totalIncomeAll += d.incomeCount;
    totalBillsPaid += d.billsPaid; totalBillsAll += d.billsCount;
  }

  const rows = curs.map(cur => {
    const d = byCur[cur];
    const expectedBills = d.expectedBills + d.expectedCC;
    const incPct = d.incomeCount ? Math.round(d.incomePaid / d.incomeCount * 100) : 0;
    const billPct = d.billsCount ? Math.round(d.billsPaid / d.billsCount * 100) : 0;
    return `<div style="padding:4px 16px 10px">
      ${curs.length > 1 ? `<div style="font-size:10px;font-weight:700;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${cur}</div>` : ''}
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
        <span style="color:var(--income);font-weight:700">Income ${formatMoney(d.expectedIncome,cur)}</span>
        <span style="color:var(--muted-fg);font-size:10px">${d.incomePaid}/${d.incomeCount} done</span>
      </div>
      <div class="bar-bg" style="height:5px;border-radius:3px;margin-bottom:8px"><div class="bar-fill inc" style="width:${incPct}%;border-radius:3px"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
        <span style="color:var(--expense);font-weight:700">Bills ${formatMoney(expectedBills,cur)}</span>
        <span style="color:var(--muted-fg);font-size:10px">${d.billsPaid}/${d.billsCount} done</span>
      </div>
      <div class="bar-bg" style="height:5px;border-radius:3px"><div class="bar-fill" style="width:${billPct}%;border-radius:3px"></div></div>
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="sec-hdr"><div><div class="sec-title-row"><span class="sec-dot" style="background:#8b5cf6"></span><span class="sec-title">Monthly Overview</span></div><div class="sec-sub">${fmtMonth(mon)} · Income ${totalIncomePaid}/${totalIncomeAll} · Bills ${totalBillsPaid}/${totalBillsAll}</div></div></div>
    ${rows}
  </div>`;
}

function renderMonthPicker() {
  const cur = S.selectedMonth;
  const today = thisMonth();
  const maxMonth = S.tab === 'recurring' ? shiftMonth(today, 1) : today;
  const months = [];
  for (let i = 11; i >= -1; i--) {
    const m = shiftMonth(today, -i);
    if (m > maxMonth) continue;
    months.push(m);
  }
  const MNAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let lastYr = '', html = '<div class="month-picker-backdrop" data-action="close-month-picker"></div><div class="month-picker"><div class="month-picker-grid">';
  for (const m of months) {
    const [y, mo] = m.split('-');
    if (y !== lastYr) { html += `<div class="month-picker-yr">${y}</div>`; lastYr = y; }
    const cls = m === cur ? 'active' : m === today ? 'today' : '';
    html += `<button class="mp-btn ${cls}" data-action="select-month" data-month="${m}">${MNAMES[+mo-1]}</button>`;
  }
  html += '</div></div>';
  return html;
}

function updateHeaderMonthNav() {
  const el = document.getElementById('header-month-nav');
  if (!el) return;
  const label = fmtMonth(S.selectedMonth);
  const isCurrent = S.selectedMonth === thisMonth();
  const showPicker = ['dashboard','recurring','portfolio'].includes(S.tab);
  if (showPicker) {
    el.innerHTML = `<span class="month-label" data-action="toggle-month-picker">${label}</span>${isCurrent ? '' : '<button class="link-btn" data-action="goto-current-month">Today</button>'}`;
    if (S.monthPickerOpen) el.innerHTML += renderMonthPicker();
  } else {
    S.monthPickerOpen = false;
    el.innerHTML = `<span>${label}</span>`;
  }
  el.classList.add('visible');
}


function switchTab(tab) {
  const tabMap = { transactions: 'dashboard', investments: 'portfolio' };
  if (tabMap[tab]) tab = tabMap[tab];
  if (!['dashboard','portfolio','recurring','settings','insights'].includes(tab)) tab = 'dashboard';
  S.tab = tab;
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+S.tab).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===S.tab));
  if (S.tab==='dashboard') renderDashboard();
  else if (S.tab==='portfolio') renderPortfolio();
  else if (S.tab==='recurring') renderRecurring();
  else if (S.tab==='insights') renderInsights();
  else if (S.tab==='settings') renderSettings();
  updateHeaderMonthNav();
  const fab = document.getElementById('fab'); if(fab) fab.classList.toggle('hidden', !['dashboard','portfolio','recurring'].includes(S.tab));
}

function renderTrendChart() {
  const cur = getPrimaryCurrency();
  const data = getMonthlyTotals(cur, 6);
  const maxVal = Math.max(...data.flatMap(d=>[d.income,d.expense]), 1);
  const isOpen = S.secOpen.trendChart;
  const chartH = 140, padTop = 25, padBot = 20, barW = 16, gap = 4;
  const groupW = 360 / data.length;
  let bars = '', labels = '';
  for (let i = 0; i < data.length; i++) {
    const d = data[i];
    const cx = groupW * i + groupW / 2;
    const ih = d.income ? (d.income / maxVal) * (chartH - padTop - padBot) : 0;
    const eh = d.expense ? (d.expense / maxVal) * (chartH - padTop - padBot) : 0;
    const iy = chartH - padBot - ih, ey = chartH - padBot - eh;
    bars += `<rect x="${cx-barW-gap/2}" y="${iy}" width="${barW}" height="${ih}" rx="3" fill="var(--income)" opacity=".85"/>`;
    bars += `<rect x="${cx+gap/2}" y="${ey}" width="${barW}" height="${eh}" rx="3" fill="var(--expense)" opacity=".85"/>`;
    if (ih > 0) bars += `<text x="${cx-barW/2-gap/2}" y="${iy-4}" text-anchor="middle" font-size="8" fill="var(--income)" font-weight="600">${formatMoney(d.income,cur,true)}</text>`;
    if (eh > 0) bars += `<text x="${cx+barW/2+gap/2}" y="${ey-4}" text-anchor="middle" font-size="8" fill="var(--expense)" font-weight="600">${formatMoney(d.expense,cur,true)}</text>`;
    labels += `<text x="${cx}" y="${chartH}" text-anchor="middle" font-size="10" fill="var(--muted-fg)">${d.label}</text>`;
  }
  const svg = `<svg viewBox="0 0 360 ${chartH}" width="100%" preserveAspectRatio="xMidYMid meet" style="padding:0 8px">${bars}${labels}</svg>`;
  return `<div class="card chart-card">
    <div class="sec-hdr" data-action="toggle-section" data-sec="trendChart" style="cursor:pointer${isOpen?'':';padding-bottom:14px'}"><div><div class="sec-title-row"><span class="sec-dot" style="background:var(--accent)"></span><span class="sec-title">Monthly Trend</span></div><div class="sec-sub">${cur} · Last 6 months</div></div></div>
    ${isOpen ? `<div style="padding:8px 8px 0">${svg}</div>
    <div class="chart-legend"><div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--income)"></div>Income</div><div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--expense)"></div>Expenses</div></div>` : ''}
  </div>`;
}

function renderCategoryDonut() {
  const cur = getPrimaryCurrency();
  const mon = S.selectedMonth;
  const isOpen = S.secOpen.categoryDonut;
  const colors = ['#e11d48','#0284c7','#d97706','#059669','#7c3aed','#db2777','#64748b','#0d9488'];
  const catTotals = {};
  for (const t of S.transactions) {
    if (!t.date || localTxMonth(t.date)!==mon || t.type!=='expense' || getCur(t)!==cur) continue;
    const cat = t.category || 'Other';
    catTotals[cat] = (catTotals[cat]||0) + t.amount;
  }
  for (const item of (S.recurring?.items||[])) {
    if (item.type==='income' || (item.currency||'USD')!==cur) continue;
    const ms = item.months?.[mon]; if (ms?.paid && ms.amount>0) { catTotals[item.category||'Bills'] = (catTotals[item.category||'Bills']||0) + ms.amount; }
  }
  for (const card of (S.recurring?.creditCards||[])) {
    if ((card.currency||'USD')!==cur) continue;
    const ms = card.months?.[mon]; if (ms?.paid && ms.amount>0) { catTotals['Bills'] = (catTotals['Bills']||0) + ms.amount; }
  }
  const total = Object.values(catTotals).reduce((a,b)=>a+b, 0);
  const sorted = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  if (!sorted.length) return `<div class="card chart-card">
    <div class="sec-hdr" data-action="toggle-section" data-sec="categoryDonut" style="cursor:pointer${isOpen?'':';padding-bottom:14px'}"><div><div class="sec-title-row"><span class="sec-dot" style="background:#7c3aed"></span><span class="sec-title">Spending Breakdown</span></div><div class="sec-sub">${cur} · ${fmtMonth(mon)}</div></div></div>
    ${isOpen ? '<div class="empty"><p>No expenses this month</p></div>' : ''}
  </div>`;
  const r = 70, sw = 28, circ = 2 * Math.PI * r;
  let offset = 0, circles = '';
  sorted.forEach(([cat, amt], i) => {
    const seg = (amt / total) * circ;
    circles += `<circle cx="100" cy="100" r="${r}" fill="none" stroke="${colors[i%colors.length]}" stroke-width="${sw}" stroke-dasharray="${seg} ${circ-seg}" stroke-dashoffset="${-offset}" transform="rotate(-90 100 100)"/>`;
    offset += seg;
  });
  const svg = `<svg viewBox="0 0 200 200" width="180" height="180" style="display:block;margin:0 auto">
    <circle cx="100" cy="100" r="${r}" fill="none" stroke="var(--muted)" stroke-width="${sw}" opacity=".15"/>
    ${circles}
    <text x="100" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="var(--fg)">${formatMoney(total,cur,true)}</text>
    <text x="100" y="112" text-anchor="middle" font-size="9" fill="var(--muted-fg)">Total Expenses</text>
  </svg>`;
  const legend = sorted.map(([cat,amt],i)=> `<div class="chart-legend-item"><div class="chart-legend-dot" style="background:${colors[i%colors.length]}"></div>${esc(cat)} <span style="color:var(--muted-fg)">${Math.round(amt/total*100)}%</span></div>`).join('');
  return `<div class="card chart-card">
    <div class="sec-hdr" data-action="toggle-section" data-sec="categoryDonut" style="cursor:pointer${isOpen?'':';padding-bottom:14px'}"><div><div class="sec-title-row"><span class="sec-dot" style="background:#7c3aed"></span><span class="sec-title">Spending Breakdown</span></div><div class="sec-sub">${cur} · ${fmtMonth(mon)}</div></div></div>
    ${isOpen ? `<div style="padding:12px 8px 4px">${svg}</div><div class="chart-legend">${legend}</div>` : ''}
  </div>`;
}

function getMonthlySpending() {
  const mon = S.selectedMonth;
  const totals = {}; // { USD: { _total: 500, Food: 200, Transport: 100, ... } }
  const recurTxIds = new Set();
  for (const item of (S.recurring?.items||[])) { const ms=item.months?.[mon]; if (ms?.txId) recurTxIds.add(ms.txId); }
  for (const card of (S.recurring?.creditCards||[])) { const ms=card.months?.[mon]; if (ms?.txId) recurTxIds.add(ms.txId); }
  for (const t of S.transactions) {
    if (!t.date || localTxMonth(t.date)!==mon || recurTxIds.has(t.id)) continue;
    if (t.type==='expense') { const c=getCur(t), cat=t.category||'Other'; if(!totals[c]) totals[c]={_total:0}; totals[c]._total+=t.amount; totals[c][cat]=(totals[c][cat]||0)+t.amount; }
    if (t.type==='transfer') { const c=t.fromCurrency; if(!totals[c]) totals[c]={_total:0}; totals[c]._total+=t.fromAmount; }
  }
  for (const item of (S.recurring?.items||[])) {
    if (item.type==='income') continue; const c=item.currency||'USD', cat=item.category||'Bills';
    const ms=item.months?.[mon]; if (ms?.paid&&ms.amount>0) { if(!totals[c]) totals[c]={_total:0}; totals[c]._total+=ms.amount; totals[c][cat]=(totals[c][cat]||0)+ms.amount; }
  }
  for (const card of (S.recurring?.creditCards||[])) {
    const c=card.currency||'USD'; const ms=card.months?.[mon];
    if (ms?.paid&&ms.amount>0) { if(!totals[c]) totals[c]={_total:0}; totals[c]._total+=ms.amount; totals[c]['Bills']=(totals[c]['Bills']||0)+ms.amount; }
  }
  return totals;
}

function detectAnomalies() {
  const mon = S.selectedMonth, alerts = [];
  const today = new Date().getDate();
  const daysInMonth = new Date(parseInt(mon.slice(0,4)), parseInt(mon.slice(5,7)), 0).getDate();
  const spending = getMonthlySpending();

  // Category spike: compare each category vs 3-month average
  for (const cur of Object.keys(spending)) {
    const curSpending = spending[cur];
    for (const cat of Object.keys(curSpending)) {
      if (cat === '_total') continue;
      const catAmt = curSpending[cat];
      if (catAmt < 10) continue;
      const prevAmts = [];
      for (let i = 1; i <= 3; i++) {
        const prevMon = shiftMonth(mon, -i);
        const saved = S.selectedMonth; S.selectedMonth = prevMon;
        const prev = getMonthlySpending(); S.selectedMonth = saved;
        if (prev[cur]?.[cat]) prevAmts.push(prev[cur][cat]);
      }
      if (prevAmts.length >= 2) {
        const avg = prevAmts.reduce((a,b)=>a+b,0) / prevAmts.length;
        if (avg > 0 && catAmt >= avg * 1.5) {
          alerts.push({type:'category-spike', severity:'warning', message:`${cat} spending is ${Math.round(catAmt/avg*100)}% of average`, detail:`${formatMoney(catAmt,cur)} vs avg ${formatMoney(avg,cur)} (${cur})`});
        }
      }
    }
  }

  // Overdue bills
  if (mon === thisMonth()) {
    for (const item of (S.recurring?.items||[])) {
      if (item.type !== 'expense' || item.closed) continue;
      if (item.startMonth && mon < item.startMonth) continue;
      if (item.endMonth && mon > item.endMonth) continue;
      const paid = item.months?.[mon]?.paid;
      if (!paid && item.dayOfMonth && item.dayOfMonth < today) {
        alerts.push({type:'overdue', severity:'alert', message:`${item.name} is overdue`, detail:`Due on ${ordinal(item.dayOfMonth)}, not yet paid`});
      }
    }
  }

  // Bill spike: paid amount vs historical average
  for (const item of (S.recurring?.items||[])) {
    if (item.type !== 'expense' || item.closed) continue;
    const ms = item.months || {};
    const curPaid = ms[mon];
    if (!curPaid?.paid || !curPaid.amount) continue;
    const prevAmts = Object.entries(ms).filter(([m,v]) => m !== mon && v.paid && v.amount > 0).map(([,v]) => v.amount);
    if (prevAmts.length >= 2) {
      const avg = prevAmts.reduce((a,b)=>a+b,0) / prevAmts.length;
      if (curPaid.amount >= avg * 1.5) {
        const c = item.currency || 'USD';
        alerts.push({type:'bill-spike', severity:'warning', message:`${item.name} bill is unusually high`, detail:`${formatMoney(curPaid.amount,c)} vs avg ${formatMoney(avg,c)}`});
      }
    }
  }

  // Spending velocity
  if (mon === thisMonth() && today >= 5) {
    for (const cur of Object.keys(spending)) {
      const pace = (spending[cur]._total / today) * daysInMonth;
      const prevMon = shiftMonth(mon, -1);
      const saved = S.selectedMonth; S.selectedMonth = prevMon;
      const prev = getMonthlySpending(); S.selectedMonth = saved;
      const lastTotal = prev[cur]?._total || 0;
      if (lastTotal > 0 && pace > lastTotal * 1.2) {
        alerts.push({type:'velocity', severity:'warning', message:`${cur} spending on pace to exceed last month`, detail:`Projected ${formatMoney(Math.round(pace),cur)} vs last month ${formatMoney(lastTotal,cur)}`});
      }
    }
  }

  return alerts;
}

function renderHeroCards() {
  const mon = S.selectedMonth;
  const monthLabel = fmtMonth(mon);
  const byCur = {};
  const add = (cur, type, amt) => { if (!byCur[cur]) byCur[cur]={income:0,expense:0}; byCur[cur][type]+=amt; };

  // Carry-forward balance: net of all activity before the selected month
  const prevBal = {};
  for (const t of S.transactions) {
    if (!t.date || localTxMonth(t.date) >= mon) continue;
    if (t.type==='transfer') {
      prevBal[t.fromCurrency] = (prevBal[t.fromCurrency]||0) - t.fromAmount;
      prevBal[t.toCurrency] = (prevBal[t.toCurrency]||0) + t.toAmount;
      continue;
    }
    if (!t.currency) continue;
    prevBal[t.currency] = (prevBal[t.currency]||0) + (t.type==='income' ? t.amount : -t.amount);
  }

  for (const t of S.transactions) {
    if (!t.date || localTxMonth(t.date) !== mon) continue;
    if (t.type==='transfer') { add(t.fromCurrency,'expense',t.fromAmount); add(t.toCurrency,'income',t.toAmount); continue; }
    if (!t.currency) continue;
    add(t.currency, t.type==='income'?'income':'expense', t.amount);
  }

  // Ensure currencies with prior balance but no current-month activity show up
  for (const c of Object.keys(prevBal)) { if (!byCur[c]) byCur[c] = {income:0, expense:0}; }

  if (!Object.keys(byCur).length) byCur['USD'] = {income:0,expense:0};
  return Object.entries(byCur).map(([cur,{income,expense}]) => {
    const prev = prevBal[cur] || 0;
    const net = prev + income - expense;
    // Top 3 expense categories for this currency this month
    const catTotals = {};
    for (const t of S.transactions) {
      if (!t.date || localTxMonth(t.date) !== mon || t.type !== 'expense' || !t.currency || t.currency !== cur) continue;
      const cat = t.category || 'Other';
      catTotals[cat] = (catTotals[cat] || 0) + t.amount;
    }
    const totalExp = Object.values(catTotals).reduce((a, b) => a + b, 0);
    const topCats = Object.entries(catTotals).sort((a, b) => b[1] - a[1]).slice(0, 3);
    const catChips = topCats.length ? `<div class="chips" style="margin-top:6px">${topCats.map(([cat, amt]) => {
      const pct = totalExp ? Math.round(amt / totalExp * 100) : 0;
      return `<div class="chip" style="flex:none"><span style="font-size:9px;font-weight:700">${esc(cat)} ${pct}%</span></div>`;
    }).join('')}</div>` : '';
    return `<div class="card-hero">
    <div class="eyebrow">${cur} · ${monthLabel}</div>
    <div class="amount">${formatMoney(net,cur)}</div>
    <div class="chips">
      ${prev?`<div class="chip"><div class="chip-lbl">Prev Bal</div><div class="chip-val${prev>=0?' inc':' exp'}">${formatMoney(prev,cur)}</div></div>`:''}
      <div class="chip"><div class="chip-lbl">Income</div><div class="chip-val inc">${formatMoney(income,cur)}</div></div>
      <div class="chip"><div class="chip-lbl">Expenses</div><div class="chip-val exp">${formatMoney(expense,cur)}</div></div>
    </div>
    ${catChips}
  </div>`;
  }).join('');
}

function renderCatBreakdown() {
  const mon = S.selectedMonth;
  const expByCur = {};
  const incByCur = {};
  const transfers = [];
  const addExp = (cur, cat, amt, subName) => {
    if (!expByCur[cur]) expByCur[cur] = {};
    if (!expByCur[cur][cat]) expByCur[cur][cat] = {amt:0, sub:{}};
    expByCur[cur][cat].amt += amt;
    if (subName) expByCur[cur][cat].sub[subName] = (expByCur[cur][cat].sub[subName]||0) + amt;
  };
  const addInc = (cur, cat, amt) => { if (!incByCur[cur]) incByCur[cur]={}; incByCur[cur][cat]=(incByCur[cur][cat]||0)+amt; };

  const recurTxIds = new Set();
  for (const item of (S.recurring?.items||[])) { const ms=item.months?.[mon]; if (ms?.txId) recurTxIds.add(ms.txId); }
  for (const card of (S.recurring?.creditCards||[])) { const ms=card.months?.[mon]; if (ms?.txId) recurTxIds.add(ms.txId); }

  for (const t of S.transactions) {
    if (!t.date || localTxMonth(t.date)!==mon) continue;
    if (recurTxIds.has(t.id)) continue;
    if (t.type==='transfer') { transfers.push(t); continue; }
    if (t.type==='income') { addInc(getCur(t), t.category, t.amount); continue; }
    if (t.category==='Bills' && t.note) {
      if (/ CC Bill$/.test(t.note)) addExp(getCur(t), 'Credit Card', t.amount, t.note.replace(/ CC Bill$/, ''));
      else addExp(getCur(t), 'Bills', t.amount, t.note);
    } else {
      addExp(getCur(t), t.category, t.amount);
    }
  }

  const curs = [...new Set([...Object.keys(expByCur), ...Object.keys(incByCur)])];
  const monthLabel = fmtMonth(mon);
  const isOpen = S.secOpen.catBreak;
  const hdr = `<div class="sec-hdr" data-action="toggle-section" data-sec="catBreak" style="cursor:pointer${isOpen?'':';padding-bottom:14px'}">
      <div><div class="sec-title-row"><span class="sec-dot blue"></span><span class="sec-title">By Category</span></div><div class="sec-sub">${monthLabel}</div></div>
    </div>`;
  if (!curs.length && !transfers.length) return `<div class="card">${hdr}${isOpen?`<div class="empty" style="padding-top:8px"><p>No activity yet</p></div>`:''}</div>`;
  if (!isOpen) return `<div class="card">${hdr}</div>`;

  const sections = curs.map(cur => {
    let html = curs.length>1 ? `<div class="cur-section-label">${cur}</div>` : '';
    const cats = expByCur[cur];
    if (cats) {
      const total = Object.values(cats).reduce((a,c)=>a+c.amt,0);
      html += Object.entries(cats).sort((a,b)=>b[1].amt-a[1].amt).map(([cat,{amt,sub}])=>{
        const pct = Math.round(amt/total*100);
        const subRows = Object.entries(sub).sort((a,b)=>b[1]-a[1]).map(([name,subAmt])=>
          `<div class="cat-subrow"><span>${esc(name)}</span><span>${formatMoney(subAmt,cur)}</span></div>`).join('');
        return `<div class="cat-row">
          <div class="cat-hdr"><span class="cat-name">${esc(cat)}</span><span><span class="cat-amt">${formatMoney(amt,cur)}</span><span class="cat-pct">${pct}%</span></span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
          ${subRows}
        </div>`;
      }).join('');
    }
    const incCats = incByCur[cur];
    if (incCats) {
      const incTotal = Object.values(incCats).reduce((a,b)=>a+b,0);
      html += `<div class="rec-sub-hdr">Income</div>` + Object.entries(incCats).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
        const pct = Math.round(amt/incTotal*100);
        return `<div class="cat-row">
          <div class="cat-hdr"><span class="cat-name">${esc(cat)}</span><span><span class="cat-amt grn">${formatMoney(amt,cur)}</span><span class="cat-pct">${pct}%</span></span></div>
          <div class="bar-bg"><div class="bar-fill inc" style="width:${pct}%"></div></div>
        </div>`;
      }).join('');
    }
    return html;
  }).join('');

  let transferSection = '';
  if (transfers.length) {
    transferSection = `<div class="rec-sub-hdr">Transfers</div>` + transfers.map(t =>
      `<div class="cat-row"><div class="cat-hdr"><span class="cat-name">Transfer</span><span class="cat-amt">${formatMoney(t.fromAmount,t.fromCurrency)} → ${formatMoney(t.toAmount,t.toCurrency)}</span></div></div>`
    ).join('');
  }

  return `<div class="card">${hdr}<div class="cat-wrap">${sections}${transferSection}</div></div>`;
}

function monthsUntil(isoDate) {
  if (!isoDate) return 0;
  const d = new Date(isoDate+'T00:00:00'), now = new Date();
  return Math.max(0, (d.getFullYear()-now.getFullYear())*12 + d.getMonth()-now.getMonth());
}

function simulateLoanPrepayment(loan, extraMonthly) {
  const {principal, startDate, tenureYears, interestRate} = loan;
  if (!principal || !startDate) return null;
  const r = (interestRate || 0) / 100 / 12;
  const emi = computeEmi(principal, interestRate, tenureYears);
  const outstanding = computeOutstanding(loan);
  if (outstanding <= 0) return null;

  // Original: months remaining at standard EMI
  let bal = outstanding, origMonths = 0, origInterest = 0;
  while (bal > 0 && origMonths < 1200) {
    const interest = bal * r;
    const princ = Math.min(emi - interest, bal);
    origInterest += interest;
    bal = Math.max(0, bal - princ);
    origMonths++;
  }

  // With extra payment
  bal = outstanding;
  let newMonths = 0, newInterest = 0;
  const totalPayment = emi + extraMonthly;
  while (bal > 0 && newMonths < 1200) {
    const interest = bal * r;
    const princ = Math.min(totalPayment - interest, bal);
    newInterest += interest;
    bal = Math.max(0, bal - princ);
    newMonths++;
  }

  const cur = loan.currency || 'USD';
  const now = new Date();
  const origPayoff = new Date(now); origPayoff.setMonth(origPayoff.getMonth() + origMonths);
  const newPayoff = new Date(now); newPayoff.setMonth(newPayoff.getMonth() + newMonths);
  return {
    origMonths, newMonths,
    monthsSaved: Math.max(0, origMonths - newMonths),
    interestSaved: Math.max(0, origInterest - newInterest),
    origPayoff: origPayoff.toLocaleDateString('en-US',{month:'short',year:'numeric'}),
    newPayoff: newPayoff.toLocaleDateString('en-US',{month:'short',year:'numeric'}),
    cur
  };
}

function simulateGoalTopup(goal, extraMonthly) {
  const remaining = Math.max(0, (goal.targetAmount || 0) - (goal.savedSoFar || 0));
  const origMonths = monthsUntil(goal.deadline);
  const currentPerMonth = origMonths > 0 ? remaining / origMonths : remaining;
  const newPerMonth = currentPerMonth + extraMonthly;
  const newMonths = newPerMonth > 0 ? Math.ceil(remaining / newPerMonth) : origMonths;
  return {
    origMonths, newMonths,
    monthsSaved: Math.max(0, origMonths - newMonths),
    currentPerMonth, newPerMonth,
    remaining, cur: goal.currency || 'USD'
  };
}

function simulateSIPGrowth(currentValue, monthlyAdd, annualRatePct, years) {
  const r = annualRatePct / 100 / 12;
  const n = years * 12;
  const fvLump = currentValue * Math.pow(1 + r, n);
  const fvSIP = monthlyAdd > 0
    ? (r > 0 ? monthlyAdd * ((Math.pow(1 + r, n) - 1) / r) : monthlyAdd * n)
    : 0;
  return fvLump + fvSIP;
}
