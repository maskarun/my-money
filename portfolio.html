function computeProjections() {
  const curMonth = thisMonth();
  const past3 = [1,2,3].map(d => shiftMonth(curMonth, -d));
  const recurTxIds = new Set();
  for (const item of (S.recurring?.items||[])) for (const mon of Object.keys(item.months||{})) { if (item.months[mon]?.txId) recurTxIds.add(item.months[mon].txId); }
  for (const card of (S.recurring?.creditCards||[])) for (const mon of Object.keys(card.months||{})) { if (card.months[mon]?.txId) recurTxIds.add(card.months[mon].txId); }
  const allCurs = new Set();
  S.transactions.forEach(t => allCurs.add(getCur(t)));
  (S.recurring?.items||[]).forEach(i => allCurs.add(getCur(i)));
  (S.recurring?.creditCards||[]).forEach(c => allCurs.add(getCur(c)));
  const results = {};
  for (const cur of allCurs) {
    let incTotal = 0, expTotal = 0, monthsWithData = 0;
    for (const mon of past3) {
      let hadData = false;
      for (const t of S.transactions.filter(t => localTxMonth(t.date)===mon && getCur(t)===cur && !recurTxIds.has(t.id))) {
        if (t.type==='income') { incTotal += t.amount; hadData = true; }
        else if (t.type==='expense') { expTotal += t.amount; hadData = true; }
      }
      if (hadData) monthsWithData++;
    }
    const divisor = monthsWithData || 1;
    const txAvgInc = incTotal/divisor, txAvgExp = expTotal/divisor;
    let recIncome = 0, recExpense = 0;
    for (const item of (S.recurring?.items||[])) {
      if (getCur(item) !== cur) continue;
      if (item.type === 'income') { recIncome += item.amount || 0; }
      else {
        if (item.isVariable) {
          let sum = 0, cnt = 0;
          for (const mon of past3) { const a = item.months?.[mon]?.amount; if (a) { sum+=a; cnt++; } }
          recExpense += cnt ? sum/cnt : 0;
        } else { recExpense += item.amount || 0; }
      }
    }
    for (const card of (S.recurring?.creditCards||[])) {
      if (getCur(card) !== cur) continue;
      let sum = 0, cnt = 0;
      for (const mon of past3) { const a = card.months?.[mon]?.amount; if (a) { sum+=a; cnt++; } }
      recExpense += cnt ? sum/cnt : 0;
    }
    const mInc = recIncome + txAvgInc, mExp = recExpense + txAvgExp;
    if (mInc || mExp) {
      results[cur] = { monthlyIncome: mInc, monthlyExpense: mExp };
    }
  }
  return results;
}

async function getAIProjections() {
  const proj = computeProjections();
  const projText = Object.entries(proj).map(([cur, p]) =>
    `${cur}: Monthly Income ${formatMoney(p.monthlyIncome, cur)}, Monthly Expense ${formatMoney(p.monthlyExpense, cur)}, Surplus ${formatMoney(p.monthlyIncome - p.monthlyExpense, cur)}`
  ).join('\n');
  const summary = buildPortfolioSummary();
  const prompt = `You are a personal finance analyst. Based on these projections and portfolio data, provide:\n\n1. **Spending Trend Analysis** - what patterns do you see?\n2. **3 Scenarios** (Optimistic / Realistic / Pessimistic) - projected savings in 6 and 12 months\n3. **Top 3 Savings Opportunities** - specific areas to cut or optimize\n4. **Investment Allocation Advice** - where to put the surplus\n\nKeep each section to 2-3 bullet points. Be specific to the numbers.\n\nCurrent monthly projections:\n${projText}\n\nPortfolio context:\n${summary}`;
  await callAI(prompt, v => { projectionAIResult = v; }, v => { projectionAILoading = v; renderInsights(); }, 'mmc.aiProjections');
  renderInsights();
}

function renderProjections() {
  const proj = computeProjections();
  const curs = Object.keys(proj);
  if (!curs.length) return '';
  const hdr = `<div class="sec-hdr" data-action="toggle-section" data-sec="projections" style="cursor:pointer"><div><div class="sec-title-row"><span class="sec-dot" style="background:#8b5cf6"></span><span class="sec-title">Projections</span></div><div class="sec-sub">Estimated income & expenses</div></div></div>`;
  if (S.secOpen && S.secOpen.projections === false) return `<div class="card">${hdr}</div>`;
  let body = '';
  for (const cur of curs) {
    const p = proj[cur];
    const periods = [3,6,12];
    const fmtRow = (label, color, valFn) => `<div class="p-row" style="gap:0">
      <div class="p-row-meta" style="flex:0 0 70px"><div class="p-row-name" style="color:${color};font-size:11px">${label}</div></div>
      ${periods.map(m => `<div style="flex:1;text-align:right;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;color:${color};padding:0 4px">${valFn(m)}</div>`).join('')}
    </div>`;
    const hdrRow = `<div class="p-row" style="gap:0;border-top:none;padding-top:12px">
      <div class="p-row-meta" style="flex:0 0 70px"><div class="p-row-name" style="font-size:12px">${cur}</div></div>
      ${periods.map(m => `<div style="flex:1;text-align:right;font-size:10px;font-weight:500;color:var(--muted-fg);padding:0 4px">${m} Months</div>`).join('')}
    </div>`;
    body += hdrRow;
    body += fmtRow('Income', 'var(--income)', m => formatMoney(p.monthlyIncome*m, cur));
    body += fmtRow('Expense', 'var(--expense)', m => formatMoney(p.monthlyExpense*m, cur));
    body += fmtRow('Surplus', '', m => {
      const s = p.monthlyIncome*m - p.monthlyExpense*m;
      return `<span style="color:${s>=0?'var(--income)':'var(--expense)'}">${s<0?'−':''}${formatMoney(Math.abs(s), cur)}</span>`;
    });
  }
  const hasKey = !!localStorage.getItem('mmc.apiKey');
  let aiSection = '';
  if (hasKey) {
    const aiBody = projectionAILoading
      ? `<div class="empty"><p>Analyzing projections...</p></div>`
      : projectionAIResult
        ? `<div style="padding:12px 16px;font-size:12px;line-height:1.6">${formatInsights(projectionAIResult)}</div>`
        : '';
    aiSection = `${aiBody}<div class="add-form-btns" style="padding:12px 16px">
      <button class="btn btn-accent" data-action="get-ai-projections" ${projectionAILoading?'disabled':''}>✨ AI Analysis</button>
    </div>`;
  }
  return `<div class="card">${hdr}${body}${aiSection}</div>`;
}

function renderActivity() {
  const mon = S.selectedMonth;
  const entries = [];

  for (const t of S.transactions) {
    if (!t.date || localTxMonth(t.date) !== mon) continue;
    if (t.type==='transfer') {
      entries.push({ date: t.date, icon: 'transfer', iconSvg: svgTransfer, name: 'Transfer', meta: t.note ? esc(t.note) + ' · ' + fmtDate(t.date) : fmtDate(t.date), amtHtml: `<span class="tx-amount transfer">${formatMoney(t.fromAmount,t.fromCurrency)} → ${formatMoney(t.toAmount,t.toCurrency)}</span>`, delBtn: `<button class="tx-del" data-action="del-tx" data-id="${t.id}" title="Delete">${svgTrash}</button>`, badge: '', currencies: [t.fromCurrency, t.toCurrency], source: 'txn', txId: t.id, category: 'Transfer', rawNote: t.note||'' });
    } else {
      const isIncome = t.type==='income';
      const isBill = t.category==='Bills' && t.note;
      const dispName = isBill ? t.note : t.category;
      const dispMeta = isBill ? fmtDate(t.date) : (t.note ? esc(t.note) + ' · ' + fmtDate(t.date) : fmtDate(t.date));
      const noCur = !t.currency;
      const amtHtml = noCur
        ? `<span class="tx-amount expense" style="color:var(--expense)">⚠ No currency</span>`
        : `<span class="tx-amount ${t.type}">${isIncome?'+':'−'}${formatMoney(t.amount,t.currency)}</span>`;
      entries.push({ date: t.date, icon: t.type, iconSvg: isIncome ? svgArrowUp : svgArrowDown, name: dispName, meta: dispMeta, amtHtml, delBtn: `<button class="tx-del" data-action="del-tx" data-id="${t.id}" title="Delete">${svgTrash}</button>`, badge: t.currency||'', source: 'txn', txId: t.id, category: t.category||'Other', rawNote: t.note||'', rowStyle: noCur ? 'opacity:.65;border-left:3px solid var(--expense)' : '' });
    }
  }

  for (const loan of S.portfolio.loans) {
    for (const p of (loan.partPayments || [])) {
      if (localTxMonth(p.date) !== mon) continue;
      entries.push({ date: p.date, icon: 'expense', iconSvg: svgArrowDown, name: 'Part Payment: ' + loan.name, meta: (p.note ? esc(p.note) + ' · ' : '') + fmtDate(p.date), amtHtml: `<span class="tx-amount expense">−${formatMoney(p.amount, getCur(loan))}</span>`, delBtn: '', badge: getCur(loan), source: 'loan' });
    }
  }

  for (const loan of S.portfolio.goldLoans) {
    for (const p of (loan.payments || [])) {
      if (localTxMonth(p.date) !== mon) continue;
      entries.push({ date: p.date, icon: 'expense', iconSvg: svgArrowDown, name: 'Gold Loan Payment: ' + loan.name, meta: (p.note ? esc(p.note) + ' · ' : '') + fmtDate(p.date), amtHtml: `<span class="tx-amount expense">−${formatMoney(p.amount, getCur(loan))}</span>`, delBtn: '', badge: getCur(loan), source: 'gold' });
    }
  }

  const allCurs = [...new Set(entries.flatMap(e => e.currencies || (e.badge ? [e.badge] : [])))];
  const allCats = [...new Set(entries.map(e => e.category).filter(Boolean))];
  const curFilter = S.activityCurFilter;
  const catFilter = S.activityCatFilter;
  let filtered = entries;
  if (curFilter) filtered = filtered.filter(e => e.currencies ? e.currencies.includes(curFilter) : e.badge === curFilter);
  if (catFilter) filtered = filtered.filter(e => e.category === catFilter);

  const isOpen = S.secOpen.tx;
  const hdr = `<div class="sec-hdr" data-action="toggle-section" data-sec="tx" style="cursor:pointer${isOpen?'':';padding-bottom:14px'}">
      <div><div class="sec-title-row"><span class="sec-dot blue"></span><span class="sec-title">All Activity</span></div><div class="sec-sub">${filtered.length?`${filtered.length} this month`:'Recent activity'}</div></div>
    </div>`;
  const hasFilters = allCurs.length > 1 || allCats.length > 1;
  const filterUI = hasFilters ? `<div class="toggle-chip-row" style="padding:4px 16px 8px;flex-wrap:wrap">
    ${allCurs.length > 1 ? `<button class="toggle-chip${!curFilter?' active':''}" data-action="filter-activity-cur" data-cur="">All</button>${allCurs.map(c=>`<button class="toggle-chip${curFilter===c?' active':''}" data-action="filter-activity-cur" data-cur="${c}">${c}</button>`).join('')}` : ''}
    ${allCurs.length > 1 && allCats.length > 1 ? '<span style="width:1px;height:16px;background:var(--border);margin:0 4px"></span>' : ''}
    ${allCats.length > 1 ? `<button class="toggle-chip${!catFilter?' active':''}" data-action="filter-activity-cat" data-cat="">All Categories</button>${allCats.map(c=>`<button class="toggle-chip${catFilter===c?' active':''}" data-action="filter-activity-cat" data-cat="${c}">${c}</button>`).join('')}` : ''}
  </div>` : '';
  if (!isOpen) return `<div class="card">${hdr}</div>`;
  if (!filtered.length) return `<div class="card">${hdr}${filterUI}<div class="empty"><p>No matching activity</p></div></div>`;

  filtered.sort((a, b) => b.date.localeCompare(a.date));

  const sourceColors = { txn: '', loan: '#ef4444', saving: '#10b981', gold: '#f59e0b' };
  const sourceLabels = { txn: '', loan: 'Loan', saving: 'Savings', gold: 'Gold Loan' };

  const todayStr = todayISO();
  const yesterdayDate = new Date(); yesterdayDate.setDate(yesterdayDate.getDate() - 1);
  const yesterdayStr = `${yesterdayDate.getFullYear()}-${String(yesterdayDate.getMonth()+1).padStart(2,'0')}-${String(yesterdayDate.getDate()).padStart(2,'0')}`;
  let lastDateGroup = '';
  const rows = filtered.map(e => {
    const srcPill = e.source !== 'txn' ? `<span class="tx-badge" style="background:${sourceColors[e.source]}20;color:${sourceColors[e.source]}">${sourceLabels[e.source]}</span>` : '';
    const entryDate = e.date.slice(0, 10);
    let dateHdr = '';
    if (entryDate !== lastDateGroup) {
      lastDateGroup = entryDate;
      let dateLabel;
      if (entryDate === todayStr) dateLabel = 'Today';
      else if (entryDate === yesterdayStr) dateLabel = 'Yesterday';
      else dateLabel = new Date(entryDate + 'T12:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric'});
      dateHdr = `<li class="tx-date-hdr">${dateLabel}</li>`;
    }
    const rowStyle = e.rowStyle ? ` style="${e.rowStyle}"` : '';
    return `${dateHdr}${e.delBtn ? `<li class="swipe-wrap" style="--swipe-w:-48px${e.rowStyle?';'+e.rowStyle:''}">
      <div class="swipe-back"><button class="sb-del" data-action="del-tx" data-id="${e.txId}" title="Delete">${svgTrash}</button></div>
      <div class="swipe-front"><div class="tx-row" ${e.txId?`data-action="edit-tx" data-id="${e.txId}"`:''}>
        <div class="tx-icon ${e.icon}">${e.iconSvg}</div>
        <div class="tx-body"><div class="tx-cat">${esc(e.name)}${e.badge?`<span class="tx-badge">${e.badge}</span>`:''}${srcPill}</div><div class="tx-meta">${e.meta}</div></div>
        <div class="tx-right">${e.amtHtml}</div>
      </div></div>
    </li>` : `<li class="tx-row"${rowStyle} ${e.txId?`data-action="edit-tx" data-id="${e.txId}"`:''}>
      <div class="tx-icon ${e.icon}">${e.iconSvg}</div>
      <div class="tx-body"><div class="tx-cat">${esc(e.name)}${e.badge?`<span class="tx-badge">${e.badge}</span>`:''}${srcPill}</div><div class="tx-meta">${e.meta}</div></div>
      <div class="tx-right">${e.amtHtml}</div>
    </li>`}`;
  }).join('');
  return `<div class="card">${hdr}${filterUI}<ul class="tx-list">${rows}</ul></div>`;
}

function getPortfolioCurrencies() {
  const curs = new Set();
  for (const i of [...S.portfolio.savings,...S.portfolio.loans,...S.portfolio.goldLoans]) curs.add(getCur(i));
  for (const i of S.recurring.items.filter(r=>r.portfolioTag&&!r.closed)) curs.add(getCur(i));
  if (!curs.size) curs.add('USD');
  return [...curs];
}

function renderPortfolioSummary() {
  const hasRecTagged = S.recurring.items.some(i=>i.portfolioTag&&!i.closed);
  if (!S.portfolio.savings.length && !S.portfolio.loans.length && !S.portfolio.goldLoans.length && !hasRecTagged) return '';

    const mon = S.selectedMonth;
    const sav = S.portfolio.savings.filter(i=>getCur(i)===cur).reduce((a,i)=>a+i.amount,0)
      + getTaggedRecurring('savings').filter(i=>getCur(i)===cur).reduce((a,i)=>a+getRecurringPaidTotalAsOf(i,mon),0);
    const loans = S.portfolio.loans.filter(i=>getCur(i)===cur&&!i.closed).reduce((a,i)=>a+computeOutstandingAsOf(i,mon),0);

function getRecurringPaidTotal(item) {
  const ms = item.months||{};
  return Object.values(ms).filter(m=>m.paid).reduce((s,m)=>s+(m.amount||item.amount||0),0);
}

function getTaggedRecurring(tag) {
  return S.recurring.items.filter(i=>i.portfolioTag===tag&&!i.closed);
}

          <div class="p-row-right">
            <div><div class="p-row-amt-lbl">Invested · Current</div><div class="p-row-amt grn">${formatMoney(effectiveInvested,c)}</div><div class="p-row-sub">${formatMoney(item.currentValue,c)} current</div></div>

function renderInsuranceCard() {

  const rows = items.map(item => {
    const c = getCur(item);
    if (S.editingId===item.id && S.editSection==='insurance') return `<div class="add-form">${insuranceForm(item)}</div>`;
    const dateRange = fmtD(item.startDate) + (item.endDate ? ' – '+fmtD(item.endDate) : ' – ongoing');
    const sub = [item.type, dateRange, item.premium?`${formatMoney(item.premium,c)} ${(item.premiumFreq||'Yearly').toLowerCase()}`:''].filter(Boolean).join(' · ');
    const insRec = S.recurring.items.find(r => r.linkedInsuranceId === item.id && !r.closed);
    const insRecTotal = insRec ? getRecurringPaidTotalAsOf(insRec, S.selectedMonth) : 0;
    const insRecMonths = insRec ? Object.entries(insRec.months||{}).filter(([m,v])=>m<=S.selectedMonth&&v.paid).length : 0;
    const isExpanded = S.expandedInsuranceRec === item.id;
    const insRecStrip = (insRec && isExpanded) ? `<div style="border-top:1px solid var(--border);margin:0 12px;padding:6px 4px 6px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:11px;color:var(--muted-fg)"><span class="cur-pill purple" style="margin-right:4px">Recurring</span>${formatMoney(insRec.amount||0,getCur(insRec))}/mo · ${insRecMonths} month${insRecMonths!==1?'s':''} paid</span>
      <span style="font-size:11px;font-weight:600;color:var(--income)">${formatMoney(insRecTotal,getCur(insRec))} total</span>
    </div>` : '';
    return `<div class="swipe-wrap" style="--swipe-w:-144px">
      <div class="swipe-back">
        <button class="sb-add" data-action="add-recurring-from-insurance" data-id="${item.id}" title="${insRec?'Already added as recurring bill':'Add as recurring bill'}" style="background:${insRec?'var(--muted-fg)':'var(--accent)'}">+</button>
        <button class="sb-edit" data-action="edit-insurance" data-id="${item.id}" title="Edit">${svgEdit}</button>
        <button class="sb-del" data-action="del-insurance" data-id="${item.id}" title="Delete">${svgTrash}</button>

        <div class="p-row" data-action="toggle-insurance-rec" data-id="${item.id}" style="cursor:pointer">

          <div class="p-row-right">
            <div><div class="p-row-amt-lbl">Sum Assured</div><div class="p-row-amt grn">${formatMoney(item.sumAssured,c)}</div></div>

}

  const keyPlaceholder = aiProvider === 'gemini' ? 'AIza...' : 'sk-ant-...';
  const aiCard = `<div class="card">
    <div class="sec-hdr"><div><div class="sec-title-row"><span class="sec-dot" style="background:#8b5cf6"></span><span class="sec-title">AI Insights</span></div><div class="sec-sub">Connect to AI for recommendations</div></div></div>
    <div style="padding:10px 16px">

        <input class="input" type="password" name="apiKey" value="${esc(apiKey)}" style="font-size:12px;padding:6px 8px;flex:1;min-width:0;width:0" placeholder="${keyPlaceholder}">
        <div style="width:100%;margin-top:6px">
          <div class="p-row-name" style="margin-bottom:6px">API URL <span style="color:var(--muted);font-weight:400">(optional)</span></div>
          <input class="input" type="url" name="apiUrl" value="${esc(apiUrl)}" style="font-size:12px;padding:6px 8px;width:100%" placeholder="${defaultApiUrl}">

function renderLoans() {
  const items = S.portfolio.loans;
  const totals = {};
  const mon = S.selectedMonth;
  for (const l of items) { if (l.closed) continue; const c=getCur(l); totals[c]=(totals[c]||0)+computeOutstandingAsOf(l,mon); }
  const rows = items.map(loan => {
    const c = getCur(loan);
    if (S.editingId===loan.id && S.editSection==='loan') return `<div class="add-form">${loanForm(loan)}</div>`;
    const emi = computeEmi(loan.principal,loan.interestRate,loan.tenureYears);
    const outstanding = computeOutstandingAsOf(loan, mon);
    const payoff = new Date(loan.startDate); payoff.setFullYear(payoff.getFullYear()+loan.tenureYears);
    const isExpanded = S.expandedLoan===loan.id;
    const schedule = isExpanded ? computeScheduleToDate(loan) : [];
    const partPayments = loan.partPayments||[];
    const ppFormOpen = S.showingPPForm===loan.id;
    const loanRec = S.recurring.items.find(r => r.linkedLoanRecId === loan.id && !r.closed);
    const loanRecTotal = loanRec ? getRecurringPaidTotalAsOf(loanRec, mon) : 0;
    const loanRecMonths = loanRec ? Object.entries(loanRec.months||{}).filter(([m,v])=>m<=mon&&v.paid).length : 0;
    const loanRecStrip = (loanRec && isExpanded) ? `<div style="border-top:1px solid var(--border);margin:0 12px;padding:6px 4px 6px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:11px;color:var(--muted-fg)"><span class="cur-pill red" style="margin-right:4px">EMI</span>${formatMoney(loanRec.amount||0,getCur(loanRec))}/mo · ${loanRecMonths} month${loanRecMonths!==1?'s':''} paid</span>
      <span style="font-size:11px;font-weight:600;color:var(--income)">${formatMoney(loanRecTotal,getCur(loanRec))} total</span>
    </div>` : '';
    const partHtml = `<div class="pp-section">
      <div class="pp-hdr-row">
        <span class="pp-hdr-title">Part Payments${partPayments.length?` <span class="pp-count">${partPayments.length}</span>`:''}</span>
      </div>
      ${partPayments.length?`<div class="pp-tbl-wrap"><table class="pp-tbl"><thead><tr><th>Date</th><th>Amount</th><th>Note</th><th></th></tr></thead><tbody>${partPayments.map(p=>`<tr><td>${p.date}</td><td class="pp-tbl-amt">${formatMoney(p.amount,c)}</td><td>${p.note?esc(p.note):''}</td><td><button class="ibtn del" data-action="del-part-payment" data-loan-id="${loan.id}" data-payment-id="${p.id}" title="Delete">${svgTrash}</button></td></tr>`).join('')}</tbody><tfoot><tr><td colspan="4" class="pp-tbl-footer">Total paid: <strong>${formatMoney(partPayments.reduce((s,p)=>s+p.amount,0),c)}</strong></td></tr></tfoot></table></div>`:''}
      ${ppFormOpen?`<form class="pp-form add-form" data-action="add-part-payment" data-id="${loan.id}">
        <div class="add-form-title">Record Part Payment</div>
        <div class="form-row-2">
          <div><label class="form-label">Date</label><input class="input" type="date" name="date" value="${todayISO()}"></div>
          <div><label class="form-label">Amount *</label><input class="input" type="number" name="amount" inputmode="decimal" min="0.01" step="0.01" placeholder="0.00" required></div>
        </div>
        <div class="form-row" style="margin-top:6px"><label class="form-label">Note</label><input class="input" type="text" name="note" placeholder="Optional"></div>
        <div class="add-form-btns"><button type="button" class="btn btn-outline" data-action="toggle-pp-form" data-id="${loan.id}">Cancel</button><button type="submit" class="btn btn-accent">Record</button></div>
      </form>`:`<button class="add-row-btn" data-action="toggle-pp-form" data-id="${loan.id}">${svgPlus} Record Part Payment</button>`}
      ${!loan.closed?`<button class="add-row-btn" style="color:var(--expense)" data-action="close-loan" data-id="${loan.id}">✓ Mark as Closed</button>`:''}
    </div>`;
    const schedHtml = isExpanded ? `<div class="schedule-wrap">
      <div class="text-sm text-muted" style="margin-bottom:6px">${schedule.length} months amortised · Interest: ${formatMoney(schedule.reduce((a,r)=>a+r.interest,0),c)}</div>
      ${schedule.length?(()=>{const hasPP=schedule.some(r=>r.partPaid>0);return`<div class="schedule-tbl-wrap"><table class="schedule-tbl"><thead><tr><th>Month</th><th>Interest</th><th>Principal</th>${hasPP?'<th>Part Paid</th>':''}<th>Balance</th></tr></thead><tbody>${schedule.map(r=>`<tr${r.partPaid>0?' class="sched-pp-row"':''}><td>${r.date}</td><td>${formatMoney(r.interest,c)}</td><td>${formatMoney(r.principal,c)}</td>${hasPP?`<td>${r.partPaid>0?'<span class="sched-pp-amt">−'+formatMoney(r.partPaid,c)+'</span>':''}</td>`:''}<td>${formatMoney(r.balance,c)}</td></tr>`).join('')}</tbody></table></div>`;})():'<p class="text-sm text-muted">No payments yet</p>'}
      ${partHtml}
    </div>` : '';
    const curPillClass = c==='USD'?'':''; // default blue pill for all
    return `<div>
      <div class="swipe-wrap" style="--swipe-w:-144px">
        <div class="swipe-back">
          ${loan.closed
            ? `<button class="sb-undo" data-action="reopen-loan" data-id="${loan.id}" title="Reopen">${svgUndo}</button>`
            : `<button class="sb-add" data-action="add-recurring-from-loan" data-id="${loan.id}" title="${loanRec?'Recurring EMI already set up':'Add as recurring EMI'}" style="background:${loanRec?'var(--muted-fg)':'var(--accent)'}">+</button>`}
          <button class="sb-edit" data-action="edit-loan" data-id="${loan.id}" title="Edit">${svgEdit}</button>
          <button class="sb-del" data-action="del-loan" data-id="${loan.id}" title="Delete">${svgTrash}</button>
        </div>
        <div class="swipe-front">
          <div class="p-row" data-action="toggle-loan" data-id="${loan.id}" style="cursor:pointer${loan.closed?';opacity:0.5':''}">
            <div class="p-row-icon loan">${svgHome.replace('stroke="currentColor"','stroke="#e11d48"')}</div>
            <div class="p-row-meta"><div class="p-row-name">${esc(loan.name)}<span class="cur-pill red">${c}</span>${loanRec?`<span class="cur-pill red">EMI</span>`:''}</div><div class="p-row-sub">${loan.lender?esc(loan.lender)+' · ':''}${formatMoney(loan.principal,c)} · ${loan.tenureYears}yr · ${loan.interestRate}% · EMI ${formatMoney(emi,c)}</div></div>
            <div class="p-row-right">
              ${loan.closed
                ? `<span class="rec-badge paid">✓ Closed</span>`
                : `<div><div class="p-row-amt-lbl">Outstanding</div><div class="p-row-amt red">${formatMoney(outstanding,c)}</div></div>`}
            </div>
          </div>${loanRecStrip}
        </div>
      </div>
      ${loan.closed?'':schedHtml}
    </div>`;
  }).join('');
  const isOpen = S.secOpen.loans;
  const hdr = `<div class="sec-hdr" data-action="toggle-section" data-sec="loans" style="cursor:pointer">
      <div><div class="sec-title-row"><span class="sec-dot red"></span><span class="sec-title">Loans</span></div><div class="sec-sub">EMI-based amortising loans</div></div>
      ${Object.keys(totals).length?`<div class="sec-totals"><div class="sec-total-lbl">Outstanding Today</div>${Object.entries(totals).map(([c,v])=>`<div class="sec-total-amt red">${formatMoney(v,c)}</div>`).join('')}</div>`:''}
    </div>`;
  if (!isOpen) return `<div class="card">${hdr}</div>`;
  return `<div class="card">${hdr}${rows}</div>`;
}

      <div><label class="form-label">Interest % *</label><input class="input" type="number" name="interestRate" value="${isEdit?loan.interestRate:''}" inputmode="decimal" min="0" step="0.01" required data-loan-preview></div>

function renderGoldLoans() {
  const items = S.portfolio.goldLoans;
  const totals = {};
  for (const g of items) { if (g.closed) continue; const c=getCur(g); totals[c]=(totals[c]||0)+g.principal+computeGoldLoanInterest(g); }
  const sorted = [...items].sort((a,b) => (a.closed?1:0) - (b.closed?1:0));
  const rows = sorted.map(loan => {
    const c = getCur(loan);
    if (S.editingId===loan.id && S.editSection==='goldLoan') return `<div class="add-form">${goldLoanForm(loan)}</div>`;
    const interest = computeGoldLoanInterest(loan);
    const totalOwed = loan.principal + interest;
    const payoff = loan.startDate ? new Date(new Date(loan.startDate).getTime()+365*86400000) : null;
    const isExpanded = S.expandedGoldLoan===loan.id;
    const schedule = isExpanded ? computeGoldSchedule(loan) : [];
    const goldPayments = loan.payments||[];
    const goldPayFormOpen = S.showingGoldPayForm===loan.id;
    const goldRec = S.recurring.items.find(r => r.linkedGoldLoanRecId === loan.id && !r.closed);
    const goldRecTotal = goldRec ? getRecurringPaidTotalAsOf(goldRec, S.selectedMonth) : 0;
    const goldRecMonths = goldRec ? Object.entries(goldRec.months||{}).filter(([m,v])=>m<=S.selectedMonth&&v.paid).length : 0;
    const goldRecStrip = (goldRec && isExpanded) ? `<div style="border-top:1px solid var(--border);margin:0 12px;padding:6px 4px 6px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:11px;color:var(--muted-fg)"><span class="cur-pill amb" style="margin-right:4px">Monthly</span>${formatMoney(goldRec.amount||0,getCur(goldRec))}/mo · ${goldRecMonths} month${goldRecMonths!==1?'s':''} paid</span>
      <span style="font-size:11px;font-weight:600;color:var(--income)">${formatMoney(goldRecTotal,getCur(goldRec))} total</span>
    </div>` : '';
    const goldPayHtml = `<div class="pp-section">
      <div class="pp-hdr-row"><span class="pp-hdr-title">Payments${goldPayments.length?` <span class="pp-count">${goldPayments.length}</span>`:''}</span></div>
      ${goldPayments.length?`<div class="pp-tbl-wrap"><table class="pp-tbl"><thead><tr><th>Date</th><th>Amount</th><th>Note</th><th></th></tr></thead><tbody>${goldPayments.map(p=>`<tr><td>${p.date}</td><td class="pp-tbl-amt">${formatMoney(p.amount,c)}</td><td>${p.note?esc(p.note):''}</td><td><button class="ibtn del" data-action="del-gold-payment" data-gold-id="${loan.id}" data-payment-id="${p.id}" title="Delete">${svgTrash}</button></td></tr>`).join('')}</tbody><tfoot><tr><td colspan="4" class="pp-tbl-footer">Total paid: <strong>${formatMoney(goldPayments.reduce((s,p)=>s+p.amount,0),c)}</strong></td></tr></tfoot></table></div>`:''}
      ${goldPayFormOpen?`<form class="pp-form add-form" data-action="add-gold-payment" data-id="${loan.id}">
        <div class="add-form-title">Record Payment</div>
        <div class="form-row-2">
          <div><label class="form-label">Date</label><input class="input" type="date" name="date" value="${todayISO()}"></div>
          <div><label class="form-label">Amount *</label><input class="input" type="number" name="amount" inputmode="decimal" min="0.01" step="0.01" placeholder="0.00" required></div>
        </div>
        <div class="form-row" style="margin-top:6px"><label class="form-label">Note</label><input class="input" type="text" name="note" placeholder="Optional"></div>
        <div class="add-form-btns"><button type="button" class="btn btn-outline" data-action="toggle-gold-pay-form" data-id="${loan.id}">Cancel</button><button type="submit" class="btn btn-accent">Record</button></div>
      </form>`:`<button class="add-row-btn" data-action="toggle-gold-pay-form" data-id="${loan.id}">${svgPlus} Record Payment</button>`}
      ${!loan.closed?`<button class="add-row-btn" style="color:var(--expense)" data-action="close-gold" data-id="${loan.id}">✓ Mark as Closed</button>`:''}
    </div>`;
    const schedHtml = isExpanded ? `<div class="schedule-wrap">
      <div class="text-sm text-muted" style="margin-bottom:6px">Interest accrued: ${formatMoney(interest,c)}</div>
      ${schedule.length?`<div class="schedule-tbl-wrap"><table class="schedule-tbl"><thead><tr><th>Day</th><th>Date</th><th>Daily</th><th>Total Owed</th></tr></thead><tbody>${schedule.map(r=>`<tr><td>${r.day}</td><td>${r.date}</td><td>${formatMoney(r.daily,c)}</td><td>${formatMoney(r.total,c)}</td></tr>`).join('')}</tbody></table></div>`:'<p class="text-sm text-muted">No interest accrued yet</p>'}

      <div class="swipe-wrap" style="--swipe-w:-144px">

            ? `<button class="sb-undo" data-action="reopen-gold" data-id="${loan.id}" title="Reopen">${svgUndo}</button>`
            : `<button class="sb-add" data-action="add-recurring-from-gold" data-id="${loan.id}" title="${goldRec?'Recurring payment already set up':'Add as recurring payment'}" style="background:${goldRec?'var(--muted-fg)':'var(--accent)'}">+</button>`}
          <button class="sb-edit" data-action="edit-gold" data-id="${loan.id}" title="Edit">${svgEdit}</button>
          <button class="sb-del" data-action="del-gold" data-id="${loan.id}" title="Delete">${svgTrash}</button>
        </div>
        <div class="swipe-front">
          <div class="p-row" data-action="toggle-gold" data-id="${loan.id}" style="cursor:pointer${loan.closed?';opacity:0.5':''}">
            <div class="p-row-icon gold">${svgGold.replace('stroke="currentColor"','stroke="#d97706"')}</div>
            <div class="p-row-meta"><div class="p-row-name">${esc(loan.name)}<span class="cur-pill amb">${c}</span>${goldRec?`<span class="cur-pill amb">Monthly</span>`:''}</div><div class="p-row-sub">${loan.lender?esc(loan.lender)+' · ':''}${formatMoney(loan.principal,c)} · ${loan.interestRate}% p.a.${loan.startDate?' · Started '+fmtDate(loan.startDate):''}</div></div>
            <div class="p-row-right">
              ${loan.closed
                ? `<span class="rec-badge paid">✓ Closed</span>`
                : `<div><div class="p-row-amt-lbl">${payoff?'Payoff '+fmtDate(payoff.toISOString()):'Total Owed'}</div><div class="p-row-amt amb">${formatMoney(totalOwed,c)}</div></div>`}
            </div>
          </div>${goldRecStrip}
        </div>
      </div>
      ${schedHtml}
    </div>`;
  }).join('');
  const isOpen = S.secOpen.goldLoans;
  const hdr = `<div class="sec-hdr" data-action="toggle-section" data-sec="goldLoans" style="cursor:pointer">
      <div><div class="sec-title-row"><span class="sec-dot amber"></span><span class="sec-title">Gold Loans</span></div><div class="sec-sub">Bullet repayment, daily interest</div></div>
      ${Object.keys(totals).length?`<div class="sec-totals"><div class="sec-total-lbl">Total Owed</div>${Object.entries(totals).map(([c,v])=>`<div class="sec-total-amt amb">${formatMoney(v,c)}</div>`).join('')}</div>`:''}
    </div>`;
  if (!isOpen) return `<div class="card">${hdr}</div>`;
  return `<div class="card">${hdr}${rows}</div>`;
}

      <div><label class="form-label">Interest % (annual) *</label><input class="input" type="number" name="interestRate" value="${isEdit?loan.interestRate:''}" inputmode="decimal" min="0" step="0.01" required data-gold-preview></div>

      <div class="preview-cell"><div class="plabel">Interest (1yr)</div><div class="pval" id="gprev-i">—</div></div>

// ── Actions ───────────────────────────────────────────────────────────────────
function formData(form) { const o={}; for (const [k,v] of new FormData(form).entries()) o[k]=v; return o; }

function handleSubmit(e) {
  const form = e.target, action = form.dataset.action;
  if (!action) return; e.preventDefault();
  const d = formData(form);

  if (action==='save-recurring-from-savings') {
    const saving = S.portfolio.savings.find(i => i.id === form.dataset.id);
    if (!saving) return;
    if (!d.currency) return toast('Select a currency');
    S.recurring.items.push({
      id: uid(), type: 'expense', name: (d.name||'').trim() || saving.name,
      amount: parseFloat(d.amount) || 0, currency: d.currency,
      dueDay: d.dueDay ? parseInt(d.dueDay) : null,
      isVariable: false, category: 'Savings', portfolioTag: 'savings',
      linkedSavingsId: saving.id, months: {}, createdAt: todayISO()
    });
    if (d.currency) { S.txCurrency = d.currency; localStorage.setItem('mmc.lastCurrency.v1', d.currency); }
    document.getElementById('bottom-sheet').style.display = 'none';
    save(); renderPortfolio(); renderRecurring(); toast('Recurring deposit added'); return;
  }
  if (action==='save-recurring-from-insurance') {
    const ins = S.portfolio.insurance.find(i => i.id === form.dataset.id);
    if (!ins) return;
    if (!d.currency) return toast('Select a currency');
    S.recurring.items.push({
      id: uid(), type: 'expense', name: (d.name||'').trim() || ins.name,
      amount: parseFloat(d.amount) || 0, currency: d.currency,
      dueDay: d.dueDay ? parseInt(d.dueDay) : null,
      isVariable: false, category: 'Insurance', linkedInsuranceId: ins.id,
      months: {}, createdAt: todayISO()
    });
    if (d.currency) { S.txCurrency = d.currency; localStorage.setItem('mmc.lastCurrency.v1', d.currency); }
    document.getElementById('bottom-sheet').style.display = 'none';
    save(); renderPortfolio(); renderRecurring(); toast('Added as recurring bill'); return;
  }
  if (action==='save-recurring-from-loan') {
    const loan = S.portfolio.loans.find(i => i.id === form.dataset.id); if (!loan) return;
    if (!d.currency) return toast('Select a currency');
    S.recurring.items.push({
      id: uid(), type: 'expense', name: (d.name||'').trim() || loan.name,
      amount: parseFloat(d.amount) || 0, currency: d.currency,
      dueDay: d.dueDay ? parseInt(d.dueDay) : null,
      isVariable: false, category: 'Loans', linkedLoanRecId: loan.id,
      months: {}, createdAt: todayISO()
    });
    if (d.currency) { S.txCurrency = d.currency; localStorage.setItem('mmc.lastCurrency.v1', d.currency); }
    document.getElementById('bottom-sheet').style.display = 'none';
    save(); renderPortfolio(); renderRecurring(); toast('Recurring EMI added'); return;
  }
  if (action==='save-recurring-from-gold') {
    const loan = S.portfolio.goldLoans.find(i => i.id === form.dataset.id); if (!loan) return;
    if (!d.currency) return toast('Select a currency');
    S.recurring.items.push({
      id: uid(), type: 'expense', name: (d.name||'').trim() || loan.name,
      amount: parseFloat(d.amount) || 0, currency: d.currency,
      dueDay: d.dueDay ? parseInt(d.dueDay) : null,
      isVariable: false, category: 'Gold Loans', linkedGoldLoanRecId: loan.id,
      months: {}, createdAt: todayISO()
    });
    if (d.currency) { S.txCurrency = d.currency; localStorage.setItem('mmc.lastCurrency.v1', d.currency); }
    document.getElementById('bottom-sheet').style.display = 'none';
    save(); renderPortfolio(); renderRecurring(); toast('Recurring payment added'); return;
  }
  if (action==='save-sip-from-investment') {
    const inv = S.portfolio.investments.find(i => i.id === form.dataset.id);
    if (!inv) return;
    if (!d.currency) return toast('Select a currency');
    S.recurring.items.push({
      id: uid(), type: 'expense',
      name: (d.name||'').trim() || inv.name,
      amount: parseFloat(d.amount) || 0,
      currency: d.currency,
      dueDay: d.dueDay ? parseInt(d.dueDay) : null,
      isVariable: false, category: 'Investment',
      portfolioTag: 'investment', linkedInvestmentId: inv.id,
      months: {}, createdAt: todayISO()
    });
    if (d.currency) { S.txCurrency = d.currency; localStorage.setItem('mmc.lastCurrency.v1', d.currency); }
    document.getElementById('bottom-sheet').style.display = 'none';
    save(); renderPortfolio(); renderRecurring(); toast('SIP added to Recurring'); return;
  }
  if (action==='calc-whatif') {
    const itemId = d.itemId, val = parseFloat(d.value);
    if (!itemId || isNaN(val) || val < 0) return;
    S.whatIfItemId = itemId;
    const type = S.whatIfType;
    if (type === 'loan') {
      const loan = (S.portfolio.loans || []).find(l => l.id === itemId);
      whatIfResult = loan ? simulateLoanPrepayment(loan, val) : null;
    } else if (type === 'goal') {
      const goal = (S.goals || []).find(g => g.id === itemId);
      whatIfResult = goal ? simulateGoalTopup(goal, val) : null;
    } else if (type === 'sip') {
      const inv = (S.portfolio.investments || []).find(i => i.id === itemId);
      if (inv) {
        const cur = inv.currency || S.txCurrency;
        const cv = inv.currentValue || 0;
        const sipItems = S.recurring.items.filter(r => r.portfolioTag === 'investment' && r.name === inv.name);
        const monthlyAdd = sipItems.reduce((s, r) => s + (r.amount || 0), 0);
        const rows = [1,3,5,10].map(years => ({
          years,
          value: simulateSIPGrowth(cv, monthlyAdd, val, years),
          invested: cv + monthlyAdd * years * 12
        }));
        whatIfResult = {rows, cur, cagr: val};
      }
    }
    document.getElementById('bottom-sheet-content').innerHTML = renderWhatIfSheet();
    return;
  }
  if (action==='save-budgets') {
    const budgets = { overall: {} };
    for (const [k,v] of Object.entries(d)) {
      const val = parseFloat(v); if (!val || val <= 0) continue;
      if (k.startsWith('overall_')) { budgets.overall[k.slice(8)] = val; }
    }
    localStorage.setItem('mmc.budgets', JSON.stringify(budgets));
    toast('Budgets saved'); renderDashboard(); return;
  }
  if (action==='save-api-key') {
    const key = (d.apiKey||'').trim();
    if (key) { localStorage.setItem('mmc.apiKey', key); toast('API key saved'); }
    else { localStorage.removeItem('mmc.apiKey'); toast('API key removed'); }
    const url = (d.apiUrl||'').trim();
    if (url) { localStorage.setItem('mmc.apiUrl', url); }
    else { localStorage.removeItem('mmc.apiUrl'); }
    return;
  }

  if (action==='add-goal') {
    S.goals.push({ id: uid(), name: d.name, targetAmount: parseFloat(d.targetAmount), currency: (d.currency||'USD').toUpperCase(), deadline: d.deadline, savedSoFar: parseFloat(d.savedSoFar)||0, aiPlan: '', createdAt: todayISO() });
    S.addingGoal = false; save(); renderInsights(); toast('Goal added'); return;
  }
  if (action==='submit-goal-progress') {
    const goal = S.goals.find(g=>g.id===form.dataset.id);
    if (goal) { goal.savedSoFar += parseFloat(d.amount)||0; S.updatingGoalId = null; save(); renderInsights(); toast('Progress updated'); }
    return;
  }
  if (action==='smart-add') {
    const text = (d.smartText||'').trim();
    if (!text) return toast('Type something to parse');
    parseNaturalEntry(text);
    return;
  }
  if (action==='add-tx') {
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    if (!d.currency) return toast('Select a currency');
    const type = S.addEntryType==='tx-income' ? 'income' : 'expense';
    const txDate = d.date ? new Date(d.date+'T12:00:00').toISOString() : new Date().toISOString();
    S.transactions.unshift({id:uid(),type,amount,category:d.category,note:d.note||undefined,date:txDate,currency:d.currency});
    if (d.currency) { S.txCurrency=d.currency; localStorage.setItem('mmc.lastCurrency.v1',d.currency); }
    S.addEntryType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderDashboard(); toast('Transaction added');
    const budgets = JSON.parse(localStorage.getItem('mmc.budgets')||'{}'); const spending = getMonthlySpending();
    const bc = d.currency, bcat = d.category;
    if (budgets.overall?.[bc]) { const pct=Math.round((spending[bc]?._total||0)/budgets.overall[bc]*100); if(pct>=90) toast(`⚠ Overall ${bc} budget: ${pct}% used`); }
    const anomalies = detectAnomalies(); if (anomalies.some(a=>a.severity==='alert'||a.type==='category-spike')) toast('⚠ Unusual spending detected');
    return;
  }
  if (action==='update-tx') {
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    const t = S.transactions.find(x=>x.id===form.dataset.id); if (!t) return;
    t.amount = amount; t.category = d.category; t.note = d.note||undefined; t.currency = d.currency;
    t.date = d.date ? new Date(d.date+'T12:00:00').toISOString() : t.date;
    S.editingId=null; S.addEntryType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderDashboard(); toast('Transaction updated'); return;
  }
  if (action==='update-transfer') {
    const fromAmount = parseFloat(d.fromAmount), toAmount = parseFloat(d.toAmount);
    if (!fromAmount||fromAmount<=0||!toAmount||toAmount<=0) return toast('Enter valid amounts');
    if (d.fromCurrency===d.toCurrency) return toast('Choose two different currencies');
    const t = S.transactions.find(x=>x.id===form.dataset.id); if (!t) return;
    t.fromCurrency=d.fromCurrency; t.fromAmount=fromAmount; t.toCurrency=d.toCurrency; t.toAmount=toAmount;
    t.currency=d.fromCurrency; t.note=d.note||undefined;
    t.date = d.date ? new Date(d.date+'T12:00:00').toISOString() : t.date;
    S.editingId=null; S.addEntryType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderDashboard(); toast('Transfer updated'); return;
  }
  if (action==='add-recurring-income') {
    if (!d.name.trim()) return toast('Name is required');
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    S.recurring.items.push({id:uid(),name:d.name.trim(),type:'income',category:d.category||'Salary',amount,currency:d.currency,dayOfMonth:d.dayOfMonth?parseInt(d.dayOfMonth):undefined,months:{},createdAt:todayISO()});
    if (d.currency) { S.txCurrency=d.currency; localStorage.setItem('mmc.lastCurrency.v1',d.currency); }
    S.recurringAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderDashboard(); renderRecurring(); toast('Recurring income added'); return;
  }
  if (action==='add-bill') {
    if (!d.name.trim()) return toast('Name is required');
    const isVariable = d.isVariable==='1';
    const amount = isVariable ? 0 : (parseFloat(d.amount)||0);
    S.recurring.items.push({id:uid(),name:d.name.trim(),type:'expense',isVariable,amount,currency:d.currency,category:d.category||'Bills',dayOfMonth:d.dayOfMonth?parseInt(d.dayOfMonth):undefined,portfolioTag:d.portfolioTag||null,months:{},createdAt:todayISO()});
    if (d.currency) { S.txCurrency=d.currency; localStorage.setItem('mmc.lastCurrency.v1',d.currency); }
    S.recurringAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderDashboard(); renderRecurring(); toast('Bill added'); return;
  }
  if (action==='add-credit-card') {
    if (!d.name.trim()) return toast('Card name is required');
    const dueDay = parseInt(d.dueDay); if (!dueDay||dueDay<1||dueDay>31) return toast('Enter a valid due day');
    S.recurring.creditCards.push({id:uid(),name:d.name.trim(),currency:d.currency,dueDay,months:{},createdAt:todayISO()});
    if (d.currency) { S.txCurrency=d.currency; localStorage.setItem('mmc.lastCurrency.v1',d.currency); }
    S.recurringAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderDashboard(); renderRecurring(); toast('Card added'); return;
  }
  if (action==='add-transfer') {
    const fromAmount = parseFloat(d.fromAmount), toAmount = parseFloat(d.toAmount);
    if (!fromAmount||fromAmount<=0||!toAmount||toAmount<=0) return toast('Enter valid amounts');
    if (d.fromCurrency===d.toCurrency) return toast('Choose two different currencies');
    const txDate = d.date ? new Date(d.date+'T12:00:00').toISOString() : new Date().toISOString();
    S.transactions.unshift({id:uid(),type:'transfer',fromCurrency:d.fromCurrency,fromAmount,toCurrency:d.toCurrency,toAmount,currency:d.fromCurrency,note:d.note||undefined,date:txDate});
    S.txCurrency=d.fromCurrency; localStorage.setItem('mmc.lastCurrency.v1',d.fromCurrency);
    S.addEntryType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderDashboard(); toast('Transfer recorded'); return;
  }
  if (action==='add-savings-fund') {
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    const saving = S.portfolio.savings.find(s=>s.id===d.savingId);
    if (!saving) return;
    if (!saving.payments) saving.payments = [];
    const txDate = d.date ? new Date(d.date+'T12:00:00').toISOString() : new Date().toISOString();
    if (!saving.currency) return toast('Savings account has no currency — edit it first');
    saving.payments.unshift({id:uid(), date:d.date||todayISO(), amount, type:d.type||'deposit', note:d.note||undefined});
    if (d.type==='deposit') { saving.amount += amount; S.transactions.unshift({id:uid(),type:'expense',amount,category:'Saving',note:saving.name+(d.note?' - '+d.note:''),date:txDate,currency:saving.currency}); }
    else { saving.amount = Math.max(0, saving.amount - amount); S.transactions.unshift({id:uid(),type:'income',amount,category:'Saving',note:saving.name+(d.note?' - '+d.note:''),date:txDate,currency:saving.currency}); }
    S.addEntryType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderDashboard(); renderPortfolio(); toast((d.type==='deposit'?'Deposit':'Withdrawal')+' recorded'); return;
  }
  if (action==='save-card-amount') {
    const card = S.recurring.creditCards.find(c=>c.id===form.dataset.id); if (!card) return;
    const amount = parseFloat(d.amount); if (isNaN(amount)||amount<0) return toast('Enter a valid amount');
    const mon = S.selectedMonth; if (!card.months) card.months = {};
    const prev = card.months[mon] || {};
    card.months[mon] = {...prev, amount, amountSaved: true, prevAmount: prev.amount};
    save(); renderRecurring(); toast(card.name+' bill amount saved'); return;
  }
  if (action==='save-recurring-edit') {
    const item = S.recurring.items.find(i=>i.id===form.dataset.id); if (!item) return;
    if (!d.name.trim()) return toast('Name is required');
    const mon = S.selectedMonth;
    item.name = d.name.trim();
    if (d.dayOfMonth) item.dayOfMonth = parseInt(d.dayOfMonth); else delete item.dayOfMonth;
    if (d.category) item.category = d.category;
    if (d.amount !== undefined && d.amount !== '') {
      const amount = parseFloat(d.amount); if (isNaN(amount)||amount<0) return toast('Enter a valid amount');
      if (!item.months) item.months = {};
      if (!item.months[mon]) item.months[mon] = {};
      item.amount = amount;
      delete item.months[mon].amount;
      if (item.months[mon]?.paid && item.months[mon]?.txId) {
        const tx = S.transactions.find(t=>t.id===item.months[mon].txId);
        if (tx) tx.amount = amount;
      }
    }
    S.editingRecurringId = null;
    save(); renderDashboard(); renderRecurring(); toast(item.name+' updated'); return;
  }
  if (action==='save-variable-bill') {
    const item = S.recurring.items.find(i=>i.id===form.dataset.id); if (!item) return;
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    const mon = S.selectedMonth; if (!item.months) item.months = {};
    const prev = item.months[mon] || {};
    item.months[mon] = {...prev, amount, amountSaved: true, prevAmount: prev.amount};
    save(); renderRecurring(); toast(item.name+' bill amount saved'); return;
  }
  if (action==='add-saving') {
    if (!d.name.trim()) return toast('Name is required');
    const amount = parseFloat(d.amount); if (!amount||amount<0) return toast('Enter a valid amount');
    S.portfolio.savings.unshift({id:uid(),name:d.name.trim(),institution:d.institution||undefined,amount,interestRate:d.interestRate?parseFloat(d.interestRate):undefined,note:d.note||undefined,currency:d.currency,createdAt:todayISO()});
    S.portfolioAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderPortfolio(); toast('Saving added'); return;
  }
  if (action==='update-saving') {
    const amount = parseFloat(d.amount);
    S.portfolio.savings = S.portfolio.savings.map(i=>i.id===form.dataset.id?{...i,name:d.name.trim(),institution:d.institution||undefined,amount,interestRate:d.interestRate?parseFloat(d.interestRate):undefined,note:d.note||undefined,currency:d.currency}:i);
    S.editingId=null; S.editSection=null; save(); renderPortfolio(); toast('Saving updated'); return;
  }
  if (action==='add-investment') {
    if (!d.name.trim()) return toast('Name is required');
    const amountInvested = parseFloat(d.amountInvested); const currentValue = parseFloat(d.currentValue);
    if (!(amountInvested>=0) || !(currentValue>=0)) return toast('Enter valid amounts');
    S.portfolio.investments.unshift({id:uid(),name:d.name.trim(),type:d.type||undefined,amountInvested,currentValue,note:d.note||undefined,currency:d.currency,createdAt:todayISO()});
    S.addingInvestment=false; S.portfolioAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderPortfolio(); toast('Investment added'); return;
  }
  if (action==='update-investment') {
    const amountInvested = parseFloat(d.amountInvested); const currentValue = parseFloat(d.currentValue);
    S.portfolio.investments = S.portfolio.investments.map(i=>i.id===form.dataset.id?{...i,name:d.name.trim(),type:d.type||undefined,amountInvested,currentValue,note:d.note||undefined,currency:d.currency}:i);
    S.editingId=null; S.editSection=null; save(); renderPortfolio(); toast('Investment updated'); return;
  }
  if (action==='add-insurance') {
    if (!d.name.trim()) return toast('Name is required');
    const sumAssured = parseFloat(d.sumAssured);
    if (!(sumAssured>=0)) return toast('Enter valid sum assured');
    if (!d.startDate) return toast('Start date is required');
    const premium = d.premium ? parseFloat(d.premium) : undefined;
    S.portfolio.insurance.unshift({id:uid(),name:d.name.trim(),type:d.type||undefined,sumAssured,premium,premiumFreq:d.premiumFreq||'Yearly',startDate:d.startDate,endDate:d.endDate||undefined,note:d.note||undefined,currency:d.currency,createdAt:todayISO()});
    S.addingInsurance=false; S.portfolioAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderPortfolio(); toast('Policy added'); return;
  }
  if (action==='update-insurance') {
    const sumAssured = parseFloat(d.sumAssured);
    const premium = d.premium ? parseFloat(d.premium) : undefined;
    S.portfolio.insurance = S.portfolio.insurance.map(i=>i.id===form.dataset.id?{...i,name:d.name.trim(),type:d.type||undefined,sumAssured,premium,premiumFreq:d.premiumFreq||'Yearly',startDate:d.startDate,endDate:d.endDate||undefined,note:d.note||undefined,currency:d.currency}:i);
    S.editingId=null; S.editSection=null; save(); renderPortfolio(); toast('Policy updated'); return;
  }
  if (action==='add-loan') {
    if (!d.name.trim()) return toast('Name is required');
    const emi = computeEmi(parseFloat(d.principal), parseFloat(d.interestRate), parseFloat(d.tenureYears));
    const loanId = uid();
    const recurId = uid();
    const loan = {id:loanId,name:d.name.trim(),lender:d.lender||undefined,principal:parseFloat(d.principal),startDate:d.startDate,tenureYears:parseFloat(d.tenureYears),interestRate:parseFloat(d.interestRate),note:d.note||undefined,currency:d.currency,partPayments:[],createdAt:todayISO()};
    if (emi > 0) { loan.linkedRecurringId = recurId; S.recurring.items.push({id:recurId,name:d.name.trim(),type:'expense',amount:Math.round(emi*100)/100,currency:d.currency,months:{},createdAt:todayISO(),linkedLoanId:loanId}); }
    S.portfolio.loans.unshift(loan);
    S.portfolioAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderPortfolio(); renderRecurring(); toast('Loan added'); return;
  }
  if (action==='update-loan') {
    S.portfolio.loans = S.portfolio.loans.map(i=>i.id===form.dataset.id?{...i,name:d.name.trim(),lender:d.lender||undefined,principal:parseFloat(d.principal),startDate:d.startDate,tenureYears:parseFloat(d.tenureYears),interestRate:parseFloat(d.interestRate),note:d.note||undefined,currency:d.currency}:i);
    S.editingId=null; S.editSection=null; save(); renderPortfolio(); toast('Loan updated'); return;
  }
  if (action==='add-part-payment') {
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    const loan = S.portfolio.loans.find(l=>l.id===form.dataset.id);
    if (!loan) return;
    if (!loan.currency) return toast('Loan has no currency set — edit the loan to add one');
    if (!loan.partPayments) loan.partPayments = [];
    const txId = uid();
    S.transactions.unshift({id:txId, type:'expense', amount, category:'Loans', note:(loan.name||'Loan')+' – Part Payment', date:d.date||todayISO(), currency:loan.currency});
    loan.partPayments.unshift({id:uid(), date:d.date||todayISO(), amount, note:d.note||undefined, txId});
    S.showingPPForm=null; save(); renderPortfolio(); renderDashboard(); toast('Part payment recorded'); return;
  }
  if (action==='add-gold-payment') {
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    const loan = S.portfolio.goldLoans.find(l=>l.id===form.dataset.id);
    if (!loan) return;
    if (!loan.currency) return toast('Loan has no currency set — edit the loan to add one');
    if (!loan.payments) loan.payments = [];
    const txId = uid();
    S.transactions.unshift({id:txId, type:'expense', amount, category:'Loans', note:(loan.name||'Gold Loan')+' – Payment', date:d.date||todayISO(), currency:loan.currency});
    loan.payments.unshift({id:uid(), date:d.date||todayISO(), amount, note:d.note||undefined, txId});
    loan.principal = Math.max(0, loan.principal - amount);
    S.showingGoldPayForm=null; save(); renderPortfolio(); renderDashboard(); toast('Payment recorded'); return;
  }
  if (action==='add-gold') {
    if (!d.name.trim()) return toast('Name is required');
    const principal = parseFloat(d.principal), rate = parseFloat(d.interestRate);
    const loanId = uid();
    const recurId = uid();
    const loan = {id:loanId,name:d.name.trim(),lender:d.lender||undefined,principal,interestRate:rate,startDate:d.startDate||undefined,note:d.note||undefined,currency:d.currency,createdAt:todayISO()};
    const monthlyInterest = (principal && rate) ? Math.round(principal * rate / 100 / 12 * 100) / 100 : 0;
    if (monthlyInterest > 0) {
      const startMon = d.startDate ? d.startDate.slice(0,7) : thisMonth();
      const endMon = shiftMonth(startMon, 11);
      loan.linkedRecurringId = recurId;
      S.recurring.items.push({id:recurId,name:d.name.trim(),type:'expense',amount:monthlyInterest,currency:d.currency,months:{},createdAt:todayISO(),startMonth:startMon,endMonth:endMon,linkedLoanId:loanId});
    }
    S.portfolio.goldLoans.unshift(loan);
    S.portfolioAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderPortfolio(); renderRecurring(); toast('Gold loan added'); return;
  }
  if (action==='update-gold') {
    S.portfolio.goldLoans = S.portfolio.goldLoans.map(i=>i.id===form.dataset.id?{...i,name:d.name.trim(),lender:d.lender||undefined,principal:parseFloat(d.principal),interestRate:parseFloat(d.interestRate),startDate:d.startDate||undefined,note:d.note||undefined,currency:d.currency}:i);
    S.editingId=null; S.editSection=null; save(); renderPortfolio(); toast('Gold loan updated'); return;
  }
}

function handleClick(e) {

    const day = parseInt(btn.dataset.day);

    if (sec) sec.innerHTML = '<span class="drag-handle" data-drag-grip="1">⠿</span>' + renderFinancialCalendar();
    return;
  }

  if (action==='filter-activity-cat') { S.activityCatFilter = btn.dataset.cat || null; renderDashboard(); return; }
  if (action==='toggle-theme') { document.body.classList.toggle('dark'); localStorage.setItem('mmc.theme', document.body.classList.contains('dark')?'dark':'light'); renderSettings(); return; }
  if (action==='set-report-range') { S.reportRange = btn.dataset.range; renderDashboard(); return; }
  if (action==='toggle-add-entry') { S.addEntryType = S.addEntryType ? null : 'tx-expense'; renderQuickAddContent(); return; }
  if (action==='set-entry-type') { S.addEntryType=btn.dataset.type; const bs=document.getElementById('bottom-sheet'); if(bs.style.display!=='none'){document.getElementById('bottom-sheet-content').innerHTML=renderQuickAdd();}else{renderDashboard();} return; }

    S.editingId = t.id;

    const bs=document.getElementById('bottom-sheet'), bsc=document.getElementById('bottom-sheet-content');
    bsc.innerHTML = renderQuickAdd(); bs.style.display=''; return;
  }
  if (action==='toggle-fab') {
    S.editingId=null;
    const bs=document.getElementById('bottom-sheet'), bsc=document.getElementById('bottom-sheet-content');

    else if (S.tab==='recurring') { if(!S.recurringAddType) S.recurringAddType='recurring-income'; bsc.innerHTML=renderRecurringQuickAdd(); }
    else { if(!S.addEntryType && !localStorage.getItem('mmc.apiKey')) S.addEntryType='tx-expense'; bsc.innerHTML=renderQuickAdd(); }
    bs.style.display=''; return;
  }
  if (action==='close-fab-backdrop') { if (btn.id==='bottom-sheet') { S.addEntryType=null; S.editingId=null; S.whatIfType=null; whatIfResult=null; btn.style.display='none'; } return; }

  if (action==='cancel-recurring-add') { S.recurringAddType=null; document.getElementById('bottom-sheet').style.display='none'; renderRecurring(); return; }
  if (action==='edit-recurring-item') {
    S.editingRecurringId = btn.dataset.id; renderRecurring(); return;
  }
  if (action==='cancel-recurring-edit') {
    S.editingRecurringId = null; renderRecurring(); return;
  }
  if (action==='confirm-recurring') {
    const item = S.recurring.items.find(i=>i.id===btn.dataset.id); if (!item) return;
    if (!item.currency) return toast('Recurring item has no currency — edit it first');
    const mon = S.selectedMonth;
    if (!item.months) item.months = {};
    const effAmt = item.months[mon]?.amount ?? item.amount;
    const txId = uid();
    S.transactions.unshift({id:txId,type:'income',amount:effAmt,category:item.category||'Salary',note:item.name,date:dateInMonth(mon),currency:item.currency});
    item.months[mon] = {...(item.months[mon]||{}), paid:true, amount:effAmt, txId};
    save(); renderDashboard(); renderRecurring(); toast(item.name+' credited'); return;
  }
  if (action==='unmark-recurring-item') {
    const item = S.recurring.items.find(i=>i.id===btn.dataset.id); if (!item) return;
    const mon = S.selectedMonth; const ms = item.months?.[mon]; if (!ms) return;
    if (ms.txId) S.transactions = S.transactions.filter(t=>t.id!==ms.txId);
    ms.paid = false; ms.txId = undefined;
    save(); renderDashboard(); renderRecurring(); toast(item.name+' marked unpaid'); return;
  }
  if (action==='pay-variable-bill') {
    const item = S.recurring.items.find(i=>i.id===btn.dataset.id); if (!item) return;

    save(); renderDashboard(); renderRecurring(); toast(card.name+' bill paid'); return;
  }

    ms.amount = ms.prevAmount; ms.amountSaved = false; delete ms.prevAmount;
    save(); renderRecurring(); return;
  }
  if (action==='unmark-card') {
    const card = S.recurring.creditCards.find(c=>c.id===btn.dataset.id); if (!card) return;

    if (ms.txId) S.transactions = S.transactions.filter(t=>t.id!==ms.txId);
    ms.paid = false; ms.txId = undefined;
    save(); renderDashboard(); renderRecurring(); toast(card.name+' marked unpaid'); return;
  }
  if (action==='del-recurring-item') {
    const item = S.recurring.items.find(i=>i.id===btn.dataset.id); if (!item) return;
    const mon = S.selectedMonth;
    if (item.startMonth && mon <= item.startMonth) {
      if (!confirm('Delete this recurring entry permanently?')) return;
      S.recurring.items = S.recurring.items.filter(i=>i.id!==btn.dataset.id);
    } else {
      if (!confirm('Stop this recurring entry from ' + fmtMonth(mon) + '?')) return;

      item.closed = true;
    }
    save(); renderDashboard(); renderRecurring(); return;

    item.months[mon] = {...(item.months[mon]||{}), paid:true, amount:effAmt, txId};

  }
  if (action==='del-saving-payment') {

    if (saving) {
      const pay = (saving.payments||[]).find(p=>p.id===btn.dataset.paymentId);
      if (pay) { if (pay.type==='deposit') saving.amount = Math.max(0, saving.amount - pay.amount); else saving.amount += pay.amount; }
      saving.payments = (saving.payments||[]).filter(p=>p.id!==btn.dataset.paymentId);

  }

    const goldRec = S.recurring.items.find(r=>r.linkedGoldLoanRecId===loan.id&&!r.closed&&!r.endMonth); if (goldRec) closeLinkedRec(goldRec, loan.closedDate);
    save(); renderPortfolio(); renderRecurring(); toast(loan.name + ' closed'); return;
  }
  if (action==='reopen-gold') {
    const loan = S.portfolio.goldLoans.find(l=>l.id===btn.dataset.id); if (!loan) return;
    loan.closed = false; delete loan.closedDate;
    const _gri2 = (S.recurring?.items||[]).find(i=>i.id===loan.linkedRecurringId); if (_gri2 && (_gri2.closed||_gri2.endMonth)) reopenLinkedRec(_gri2);
    const goldRec2 = S.recurring.items.find(r=>r.linkedGoldLoanRecId===loan.id&&(r.closed||r.endMonth)); if (goldRec2) reopenLinkedRec(goldRec2);
    save(); renderPortfolio(); renderRecurring(); toast(loan.name + ' reopened'); return;
  }
  if (action==='del-gold') {

function copyToClipboard(text) {
  if (navigator.clipboard?.writeText) {
    return navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  }
  return fallbackCopy(text);
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(ta); ta.select();
  document.execCommand('copy');
  ta.remove();
}

function showSyncModal(title, bodyHtml) {
  const existing = document.getElementById('sync-modal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'sync-modal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px';
  modal.innerHTML = `<div style="position:absolute;inset:0;background:rgba(0,0,0,.35)" data-action="close-sync-modal"></div>

      <div style="font-weight:700;font-size:15px;margin-bottom:12px">${title}</div>
      ${bodyHtml}
    </div>`;
  document.body.appendChild(modal);
  return modal;
}

async function copySyncCode() {
  try {
    const budgets = JSON.parse(localStorage.getItem('mmc.budgets')||'{}');
    const payload = JSON.stringify({version:3, transactions:S.transactions, portfolio:S.portfolio, recurring:S.recurring, goals:S.goals, budgets, syncedAt:new Date().toISOString()});
    const blob = new Blob([payload]);
    const cs = new CompressionStream('gzip');
    const stream = blob.stream().pipeThrough(cs);
    const compressed = await new Response(stream).arrayBuffer();
    const bytes = new Uint8Array(compressed);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    const b64 = 'MMC:' + btoa(binary);
    const modal = showSyncModal('Copy Sync Code', `
      <textarea id="sync-copy-ta" readonly style="width:100%;height:100px;font-size:11px;font-family:monospace;word-break:break-all;resize:none;padding:8px;border:1px solid var(--muted);border-radius:8px;background:var(--bg)">${b64}</textarea>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-accent" style="flex:1" id="sync-copy-btn">Copy</button>
        <button class="btn btn-outline" style="flex:1" data-action="close-sync-modal">Close</button>
      </div>`);
    const ta = modal.querySelector('#sync-copy-ta');
    ta.focus(); ta.select();
    modal.querySelector('#sync-copy-btn').addEventListener('click', () => {
      ta.select();
      if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(b64).then(() => toast('Copied!')).catch(() => { document.execCommand('copy'); toast('Copied!'); });
      } else { document.execCommand('copy'); toast('Copied!'); }
    });
  } catch(e) { toast('Copy failed: ' + (e.message || e)); }
}

function pasteSyncCode() {
  const modal = showSyncModal('Paste Sync Code', `
    <textarea id="sync-paste-ta" placeholder="Paste your sync code here…" style="width:100%;height:100px;font-size:11px;font-family:monospace;word-break:break-all;resize:none;padding:8px;border:1px solid var(--muted);border-radius:8px;background:var(--bg)"></textarea>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-accent" style="flex:1" id="sync-restore-btn">Restore</button>
      <button class="btn btn-outline" style="flex:1" data-action="close-sync-modal">Close</button>
    </div>`);
  modal.querySelector('#sync-paste-ta').focus();
  modal.querySelector('#sync-restore-btn').addEventListener('click', async () => {
    const text = modal.querySelector('#sync-paste-ta').value.trim();
    if (!text) { toast('Please paste a sync code'); return; }
    try {
      if (!text.startsWith('MMC:')) { toast('Invalid sync code'); return; }
      const b64 = text.slice(4);
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const ds = new DecompressionStream('gzip');
      const stream = new Blob([bytes]).stream().pipeThrough(ds);
      const json = await new Response(stream).text();
      const data = JSON.parse(json);
      if (!data.version) { toast('Invalid sync data'); return; }
      const txCount = (data.transactions||[]).length;
      const goalCount = (data.goals||[]).length;
      const syncTime = data.syncedAt ? new Date(data.syncedAt).toLocaleString() : 'unknown';
      if (!confirm(`Restore sync from ${syncTime}?\n${txCount} transactions, ${goalCount} goals.\nThis will overwrite current data.`)) return;
      S.transactions = data.transactions || [];
      S.portfolio = Object.assign({savings:[],loans:[],goldLoans:[],investments:[],insurance:[]}, data.portfolio || {});
      S.recurring = Object.assign({items:[],creditCards:[]}, data.recurring || {});
      S.goals = data.goals || [];
      if (data.budgets) localStorage.setItem('mmc.budgets', JSON.stringify(data.budgets));
      save();
      modal.remove();
      renderDashboard(); renderPortfolio(); renderRecurring(); renderInsights(); renderSettings();
      toast('Data restored from sync code');
    } catch(e) { toast('Paste failed: ' + (e.message || e)); }
  });
}

// Swipe-to-reveal actions (bidirectional)
(function() {
  let active = null, startX = 0, startY = 0, dx = 0, swiping = false, suppressClick = false, dir = null;
  function getWrap(el) { while (el && !el.classList?.contains('swipe-wrap')) el = el.parentElement; return el; }
  function closeAll(except) { document.querySelectorAll('.swipe-wrap.swiped-right,.swipe-wrap.swiped-left').forEach(w => { if (w !== except) w.classList.remove('swiped-right','swiped-left'); }); }
  function onStart(e) {
    const wrap = getWrap(e.target);
    if (!wrap) return;
    if (e.target.closest('.swipe-back') || e.target.closest('.swipe-back-left') || e.target.closest('form') || e.target.closest('input')) return;
    const pt = e.touches ? e.touches[0] : e;
    startX = pt.clientX; startY = pt.clientY; dx = 0; swiping = false; dir = null; active = wrap;
  }
  function onMove(e) {
    if (!active) return;
    const pt = e.touches ? e.touches[0] : e;
    const deltaX = pt.clientX - startX, deltaY = pt.clientY - startY;
    if (!swiping && Math.abs(deltaY) > Math.abs(deltaX)) { active = null; return; }
    if (!swiping && Math.abs(deltaX) > 10) {
      swiping = true;
      dir = deltaX > 0 ? 'right' : 'left';
      if (dir === 'right' && !active.querySelector('.swipe-back-left')) { active = null; return; }
      active.classList.add(dir === 'right' ? 'swiping-right' : 'swiping-left');
    }
    if (!swiping) return;
    e.preventDefault();
    dx = deltaX;
    const front = active.querySelector('.swipe-front');
    let clamped;
    if (dir === 'left') {
      const maxL = parseInt(getComputedStyle(active).getPropertyValue('--swipe-w')) || -96;
      const base = active.classList.contains('swiped-left') ? maxL : 0;
      clamped = Math.max(maxL, Math.min(0, dx + base));
    } else {
      const maxR = parseInt(getComputedStyle(active).getPropertyValue('--swipe-wl')) || 72;
      clamped = Math.max(0, Math.min(maxR, dx));
    }
    front.style.transition = 'none';
    front.style.transform = `translateX(${clamped}px)`;
  }
  function onEnd() {
    if (!active || !swiping) {
      if (active && !swiping) {
        const was = active.classList.contains('swiped-right') || active.classList.contains('swiped-left');
        closeAll(null);
        if (was) { suppressClick = true; setTimeout(() => suppressClick = false, 50); }
      }
      active = null; return;
    }
    suppressClick = true; setTimeout(() => suppressClick = false, 50);
    active.classList.remove('swiping-right', 'swiping-left');
    const front = active.querySelector('.swipe-front');
    front.style.transition = ''; front.style.transform = '';
    if (dir === 'left') {
      const maxL = Math.abs(parseInt(getComputedStyle(active).getPropertyValue('--swipe-w')) || -96);
      const threshold = maxL * 0.3;
      if (active.classList.contains('swiped-left')) {
        if (dx > threshold) active.classList.remove('swiped-left');
      } else {
        if (Math.abs(dx) > threshold) { closeAll(active); active.classList.add('swiped-left'); }
      }
    } else {
      const maxR = parseInt(getComputedStyle(active).getPropertyValue('--swipe-wl')) || 72;
      if (dx > maxR * 0.5) {
        const btn = active.querySelector('.swipe-back-left button');
        if (btn) { active.classList.add('swiped-right'); setTimeout(() => { btn.click(); }, 200); }
      }
    }
    active = null; swiping = false; dir = null;
  }
  document.addEventListener('touchstart', onStart, {passive: true});
  document.addEventListener('touchmove', onMove, {passive: false});
  document.addEventListener('touchend', onEnd);
  document.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('click', function(e) {
    if (suppressClick && e.target.closest('.swipe-front')) { e.stopPropagation(); e.preventDefault(); }
  }, true);
})();

// Drag-and-drop section reordering
(function() {
  let dragEl = null, dragTab = null, longTimer = null, startY = 0;
  function getSecEl(el) { while (el && !el.classList?.contains('drag-sec')) el = el.parentElement; return el; }
  function onStart(e) {
    const grip = e.target.closest('[data-drag-grip]');
    if (!grip) return;
    const sec = getSecEl(grip);
    if (!sec) return;
    e.preventDefault();
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    startY = y;
    longTimer = setTimeout(() => {
      dragEl = sec;
      dragTab = sec.dataset.dragTab;
      sec.classList.add('dragging');
    }, 200);
  }
  function onMove(e) {
    if (longTimer && Math.abs((e.touches ? e.touches[0].clientY : e.clientY) - startY) > 10) { clearTimeout(longTimer); longTimer = null; }
    if (!dragEl) return;
    e.preventDefault();
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const siblings = [...dragEl.parentElement.querySelectorAll('.drag-sec')];
    siblings.forEach(s => s.classList.remove('drag-over'));
    for (const s of siblings) {
      if (s === dragEl) continue;
      const r = s.getBoundingClientRect();
      if (y > r.top && y < r.bottom) { s.classList.add('drag-over'); break; }
    }
  }
  function onEnd() {
    clearTimeout(longTimer); longTimer = null;
    if (!dragEl) return;
    const parent = dragEl.parentElement;
    const siblings = [...parent.querySelectorAll('.drag-sec')];
    const overEl = siblings.find(s => s.classList.contains('drag-over'));
    siblings.forEach(s => s.classList.remove('drag-over'));
    dragEl.classList.remove('dragging');
    if (overEl && overEl !== dragEl) {
      const dragIdx = siblings.indexOf(dragEl), overIdx = siblings.indexOf(overEl);
      if (dragIdx < overIdx) overEl.after(dragEl); else overEl.before(dragEl);
      const newOrder = [...parent.querySelectorAll('.drag-sec')].map(s => s.dataset.dragKey);
      S.sectionOrder[dragTab] = newOrder;
      localStorage.setItem('mmc.sectionOrder.v1', JSON.stringify(S.sectionOrder));
    }
    dragEl = null; dragTab = null;
  }
  document.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onEnd);
})();
