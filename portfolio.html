<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Money">
<meta name="theme-color" content="#f0f4ff">
<link id="ati" rel="apple-touch-icon" sizes="180x180">
<title>My Money</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --fg: #0f172a;
  --card: #ffffff;
  --border: #e0e7ff;
  --muted: #f0f4ff;
  --muted-fg: #94a3b8;
  --accent: #0284c7;
  --accent-fg: #ffffff;
  --income: #059669;
  --expense: #e11d48;
  --gold: #d97706;
  --radius: 16px;
  --radius-md: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 8px rgba(14,165,233,.07);
  --shadow-bold: 0 16px 48px -8px rgba(2,132,199,.35);
  --nav-h: 56px;
  --header-h: 52px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--fg); height: 100%;
  overflow: hidden; -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none; -webkit-font-smoothing: antialiased;
}
button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
input, select, textarea { font-family: inherit; color: var(--fg); }
a { color: inherit; text-decoration: none; }

/* Header */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(var(--safe-top) + 10px) 16px 10px;
  background: var(--card); border-bottom: 1px solid var(--border);
  height: calc(var(--header-h) + var(--safe-top));
  box-shadow: 0 1px 0 var(--border);
}
.header-title { font-size: 17px; font-weight: 900; letter-spacing: -.5px; }
.header-badge {
  font-size: 8px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase;
  background: var(--accent); color: #fff; border-radius: 4px; padding: 2px 6px; margin-left: 7px;
}
.header-actions { display: flex; gap: 5px; }
.hbtn {
  height: 26px; padding: 0 9px; border-radius: 6px; font-size: 10px; font-weight: 600;
  border: 1px solid var(--border); background: var(--bg); color: var(--fg);
  display: flex; align-items: center; gap: 3px;
}
#header-month-nav {
  display: none; align-items: center; gap: 8px; font-size: 13px; font-weight: 800;
}
#header-month-nav.visible { display: flex; }

/* Scroll */
#scroll {
  position: fixed; top: calc(var(--header-h) + var(--safe-top));
  left: 0; right: 0; bottom: calc(var(--nav-h) + var(--safe-bottom));
  overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 14px 20px;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Nav */
#nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + var(--safe-bottom)); padding-bottom: var(--safe-bottom);
  background: var(--card); border-top: 1px solid var(--border);
  display: flex; z-index: 100; box-shadow: 0 -2px 12px rgba(14,165,233,.06);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; font-size: 9px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
  color: var(--muted-fg); min-height: 44px; touch-action: manipulation;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 20px; height: 20px; stroke-width: 1.8; }

/* Hero card */
.card-hero {
  background: linear-gradient(135deg, #0369a1 0%, #0284c7 55%, #0ea5e9 100%);
  color: #fff; border-radius: var(--radius); padding: 12px 14px;
  box-shadow: var(--shadow-bold); margin-bottom: 10px;
}
.card-hero .eyebrow { font-size: 8px; font-weight: 700; letter-spacing: 1.4px; opacity: .6; text-transform: uppercase; }
.card-hero .amount { font-size: 22px; font-weight: 900; letter-spacing: -1px; margin-top: 2px; font-variant-numeric: tabular-nums; }
.card-hero .chips { display: flex; gap: 6px; margin-top: 8px; }
.card-hero .chip { background: rgba(255,255,255,.15); border-radius: 7px; padding: 4px 8px; flex: 1; }
.card-hero .chip-lbl { font-size: 8px; font-weight: 700; opacity: .6; letter-spacing: .8px; text-transform: uppercase; }
.card-hero .chip-val { font-size: 12px; font-weight: 800; margin-top: 1px; font-variant-numeric: tabular-nums; }
.card-hero .chip-val.inc { color: #d1fae5; }
.card-hero .chip-val.exp { color: #fee2e2; }

/* Summary stat cards */
.cards-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.stat-card { background: var(--card); border-radius: var(--radius-md); padding: 12px 14px; border: 1px solid var(--border); }
.stat-card .sc-label { font-size: 9px; font-weight: 700; color: var(--muted-fg); text-transform: uppercase; letter-spacing: .7px; }
.stat-card .sc-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.stat-card .sc-amount { font-size: 18px; font-weight: 800; margin-top: 4px; letter-spacing: -.4px; font-variant-numeric: tabular-nums; }
.stat-card .sc-amount.income { color: var(--income); }
.stat-card .sc-amount.expense { color: var(--expense); }

/* Section card */
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow); }
.sec-hdr { display: flex; align-items: flex-start; justify-content: space-between; padding: 14px 16px 10px; }
.sec-title-row { display: flex; align-items: center; gap: 7px; }
.sec-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sec-dot.green { background: #10b981; }
.sec-dot.red { background: #f43f5e; }
.sec-dot.amber { background: #f59e0b; }
.sec-dot.blue { background: #0284c7; }
.sec-title { font-size: 15px; font-weight: 800; letter-spacing: -.3px; }
.sec-sub { font-size: 10px; color: var(--muted-fg); margin-top: 2px; padding-left: 14px; }
.sec-totals { text-align: right; }
.sec-total-lbl { font-size: 8px; font-weight: 700; letter-spacing: 1px; color: var(--muted-fg); text-transform: uppercase; margin-bottom: 2px; }
.sec-total-amt { font-size: 13px; font-weight: 800; line-height: 1.5; font-variant-numeric: tabular-nums; }
.sec-total-amt.grn { color: var(--income); }
.sec-total-amt.red { color: var(--expense); }
.sec-total-amt.amb { color: var(--gold); }

/* Add transaction area (inside card, no border) */
.tx-form-wrap { padding: 0 16px 14px; }
.sec-hdr-pad { padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between; }

/* Toggle pill */
.toggle-pill { display: flex; gap: 3px; background: var(--muted); border-radius: 10px; padding: 3px; margin-bottom: 12px; }
.toggle-pill button { flex: 1; height: 28px; border-radius: 8px; font-size: 12px; font-weight: 700; letter-spacing: .1px; transition: background .18s, color .18s; touch-action: manipulation; color: var(--muted-fg); }
.toggle-pill button.active { background: var(--card); box-shadow: 0 1px 4px rgba(0,0,0,.1); color: var(--fg); }
.toggle-pill button.active.expense { color: var(--expense); }
.toggle-pill button.active.income { color: var(--income); }

/* Entry type chip row */
.toggle-chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.toggle-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; background: var(--muted); color: var(--muted-fg); border: none; cursor: pointer; touch-action: manipulation; transition: background .15s, color .15s; }
.toggle-chip.active { background: var(--accent); color: #fff; }

/* Form */
.form-row { margin-bottom: 10px; }
.form-label { display: block; font-size: 10px; font-weight: 700; color: var(--muted-fg); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .5px; }
.input {
  width: 100%; height: 40px; border: 1.5px solid var(--border);
  border-radius: var(--radius-md); padding: 0 12px;
  font-size: 16px; background: var(--bg);
  appearance: none; -webkit-appearance: none; outline: none; transition: border-color .15s;
  font-variant-numeric: tabular-nums;
}
.input:focus { border-color: var(--accent); }
textarea.input { height: 68px; padding: 10px 12px; resize: none; }
.select-wrap { position: relative; }
.select-wrap::after {
  content: ''; position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
  border-left: 4px solid transparent; border-right: 4px solid transparent;
  border-top: 5px solid var(--muted-fg); pointer-events: none;
}
.select-wrap select { padding-right: 30px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }

/* Buttons */
.btn {
  display: flex; align-items: center; justify-content: center;
  gap: 5px; min-height: 36px; border-radius: var(--radius-md);
  font-size: 13px; font-weight: 700; padding: 0 14px;
  touch-action: manipulation; transition: opacity .15s; width: 100%;
}
.btn:active { opacity: .75; }
.btn svg { width: 15px; height: 15px; flex-shrink: 0; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-outline { border: 1.5px solid var(--border); background: var(--card); color: var(--fg); }
.add-form-btns { display: flex; gap: 8px; margin-top: 12px; }
.add-form-btns .btn { flex: 1; }

/* Portfolio rows */
.p-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-top: 1px solid var(--muted); }
.p-row-icon { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.p-row-icon.sav { background: #e0f2fe; }
.p-row-icon.loan { background: #fff1f2; }
.p-row-icon.gold { background: #fef9c3; }
.p-row-icon.inv { background: #f3e8ff; }
.p-row-meta { flex: 1; min-width: 0; }
.p-row-name { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 5px; letter-spacing: -.1px; }
.cur-pill { font-size: 8px; font-weight: 800; background: #e0f2fe; color: var(--accent); padding: 1px 5px; border-radius: 4px; letter-spacing: .3px; }
.cur-pill.red { background: #fff1f2; color: var(--expense); }
.cur-pill.amb { background: #fef9c3; color: var(--gold); }
.p-row-sub { font-size: 10px; color: var(--muted-fg); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
.p-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.p-row-amt-lbl { font-size: 8px; font-weight: 600; letter-spacing: .7px; color: var(--muted-fg); text-transform: uppercase; }
.p-row-amt { font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -.2px; }
.p-row-amt.grn { color: var(--income); }
.p-row-amt.red { color: var(--expense); }
.p-row-amt.amb { color: var(--gold); }
.p-row-btns { display: flex; align-items: center; gap: 6px; }
.ibtn { width: 24px; height: 24px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: #cbd5e1; transition: color .15s, background .15s; flex-shrink: 0; }
.ibtn:hover { background: var(--muted); color: #64748b; }
.ibtn.del:hover { background: #fff1f2; color: var(--expense); }
.ibtn:disabled { opacity: .35; cursor: default; }
.ibtn:disabled:hover { background: transparent; color: #cbd5e1; }
.month-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; }
.month-nav-label { font-size: 13px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
.link-btn { font-size: 11px; font-weight: 700; color: var(--accent); background: none; border: none; padding: 0; cursor: pointer; text-decoration: underline; }
.p-chev { width: 20px; height: 20px; border-radius: 6px; background: var(--muted); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
.p-chev svg { transition: transform .2s; }
.p-chev.open svg { transform: rotate(90deg); }

/* Add row button */
.add-row-btn {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  width: calc(100% - 32px); margin: 6px 16px 12px; min-height: 30px; border-radius: 8px;
  border: 1.5px dashed #c7d2fe; background: transparent;
  font-size: 11px; font-weight: 600; color: var(--muted-fg); touch-action: manipulation;
}
.add-row-btn:active { background: var(--muted); }
.rec-sub-hdr { font-size: 10px; font-weight: 800; color: var(--muted-fg); text-transform: uppercase; letter-spacing: .08em; padding: 10px 16px 4px; }
.rec-badge { font-size: 10.5px; font-weight: 700; padding: 2px 7px; border-radius: 99px; white-space: nowrap; }
.rec-badge.paid { background: #d1fae5; color: #065f46; }
.rec-badge.pending { background: #fef9c3; color: #92400e; }
.rec-btn { font-size: 10.5px; padding: 4px 8px; height: auto; min-width: 54px; white-space: nowrap; }
.rec-amt-input { width: 72px; height: 32px; font-size: 13px; padding: 0 8px; flex-shrink: 0; }
.hist-note { font-size: 10px; color: var(--muted-fg); font-weight: 400; margin-top: 1px; }

/* Inline add form */
.add-form { border-top: 1px solid var(--muted); padding: 14px 16px; }
.add-form-title { font-size: 11px; font-weight: 800; margin-bottom: 12px; color: var(--muted-fg); text-transform: uppercase; letter-spacing: .6px; }

/* Schedule table */
.schedule-wrap { padding: 0 16px 12px; }
.schedule-tbl-wrap { max-height: 200px; overflow-y: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(--muted); border-radius: 8px; }
.schedule-tbl { width: 100%; border-collapse: collapse; font-size: 11px; font-variant-numeric: tabular-nums; }
.schedule-tbl thead th { position: sticky; top: 0; background: var(--muted); padding: 5px 8px; text-align: right; font-weight: 700; white-space: nowrap; color: var(--muted-fg); }
.schedule-tbl thead th:first-child { text-align: left; }
.schedule-tbl tbody td { padding: 5px 8px; text-align: right; border-bottom: 1px solid var(--muted); }
.schedule-tbl tbody td:first-child { text-align: left; color: var(--muted-fg); }
.schedule-tbl tbody tr:last-child td { border-bottom: none; }
.ledger-filters { display:flex; gap:8px; padding:8px 16px; flex-wrap:wrap; align-items:center; }
.ledger-filters select { font-size:12px; padding:4px 8px; border-radius:6px; border:1px solid var(--muted); background:var(--bg); color:var(--fg); }
.ledger-month-hdr { padding:10px 16px 4px; font-size:12px; font-weight:800; color:var(--muted-fg); }
.ledger-tbl-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.ledger-tbl { width:100%; border-collapse:collapse; font-size:11px; font-variant-numeric:tabular-nums; }
.ledger-tbl thead th { position:sticky; top:0; background:var(--muted); padding:5px 8px; text-align:right; font-weight:700; white-space:nowrap; color:var(--muted-fg); }
.ledger-tbl thead th:first-child, .ledger-tbl thead th:nth-child(2) { text-align:left; }
.ledger-tbl tbody td { padding:5px 8px; text-align:right; border-bottom:1px solid var(--muted); }
.ledger-tbl tbody td:first-child, .ledger-tbl tbody td:nth-child(2) { text-align:left; }
.ledger-tbl tbody tr:last-child td { border-bottom:none; }
.ledger-src { font-size:9px; padding:1px 5px; border-radius:4px; font-weight:600; }
.ledger-src.inc { background:#d1fae5; color:#047857; }
.ledger-src.exp { background:#fee2e2; color:#b91c1c; }
.ledger-src.xfr { background:#dbeafe; color:#1d4ed8; }
.ledger-src.loan { background:#fef3c7; color:#92400e; }
.sched-pp-row { background: #f0fdf4; }
.sched-pp-amt { color: #059669; font-weight: 700; font-size: 11px; }
.pp-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--muted); }
.pp-hdr-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.pp-hdr-title { font-size: 11px; font-weight: 700; color: var(--muted-fg); text-transform: uppercase; letter-spacing: .05em; }
.pp-count { background: var(--accent); color: #fff; border-radius: 99px; padding: 1px 6px; font-size: 10px; }
.pp-tbl-wrap { max-height: 200px; overflow-y: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(--muted); border-radius: 8px; margin-bottom: 4px; }
.pp-tbl { width: 100%; border-collapse: collapse; font-size: 11px; font-variant-numeric: tabular-nums; }
.pp-tbl thead th { position: sticky; top: 0; background: var(--muted); padding: 5px 8px; text-align: right; font-weight: 700; white-space: nowrap; color: var(--muted-fg); }
.pp-tbl thead th:first-child { text-align: left; }
.pp-tbl tbody td { padding: 5px 8px; text-align: right; border-bottom: 1px solid var(--muted); }
.pp-tbl tbody td:first-child { text-align: left; color: var(--muted-fg); }
.pp-tbl tbody tr:last-child td { border-bottom: none; }
.pp-tbl-amt { font-weight: 700; color: var(--income); }
.pp-tbl tfoot td { padding: 5px 8px; font-size: 11px; color: var(--muted-fg); background: var(--muted); text-align: right; }
.pp-form { margin-top: 2px; }

/* Preview row */
.preview-row { background: var(--muted); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.preview-cell .plabel { font-size: 9px; color: var(--muted-fg); font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }
.preview-cell .pval { font-size: 12px; font-weight: 800; margin-top: 2px; font-variant-numeric: tabular-nums; }

/* Transaction list */
.tx-list { list-style: none; }
.tx-row { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-top: 1px solid var(--muted); }
.tx-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tx-icon.income { background: rgba(5,150,105,.1); color: var(--income); }
.tx-icon.expense { background: rgba(225,29,72,.08); color: var(--expense); }
.tx-icon.transfer { background: rgba(2,132,199,.1); color: var(--accent); }
.tx-icon svg { width: 16px; height: 16px; stroke-width: 2; }
.tx-body { flex: 1; min-width: 0; }
.tx-cat { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
.tx-badge { font-size: 8px; font-weight: 800; background: var(--muted); border-radius: 3px; padding: 1px 4px; color: var(--muted-fg); letter-spacing: .3px; }
.tx-meta { font-size: 10px; color: var(--muted-fg); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-right { text-align: right; flex-shrink: 0; }
.tx-amount { font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; }
.tx-amount.income { color: var(--income); }
.tx-amount.expense { color: var(--expense); }
.tx-amount.transfer { color: var(--accent); font-size: 12px; }
.tx-del { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #cbd5e1; flex-shrink: 0; transition: color .15s; }
.tx-del:hover { color: var(--expense); }
.tx-del svg { width: 13px; height: 13px; stroke-width: 1.8; }
.tx-date-hdr {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
  color: var(--muted-fg); padding: 10px 16px 4px; list-style: none;
}

/* Category bars */
.cat-wrap { padding: 0 16px 14px; }
.cat-row { margin-bottom: 9px; }
.cat-hdr { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
.cat-name { font-size: 12px; font-weight: 600; }
.cat-amt { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
.cat-pct { font-size: 10px; color: var(--muted-fg); margin-left: 3px; }
.bar-bg { height: 5px; background: var(--muted); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #0284c7, #38bdf8); }
.bar-fill.inc { background: linear-gradient(90deg, var(--income), #34d399); }
.cat-amt.grn { color: var(--income); }
.cat-subrow { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--muted-fg); padding: 4px 0 0 10px; }

/* Empty state */
.empty { text-align: center; padding: 28px 16px; color: var(--muted-fg); }
.empty svg { width: 36px; height: 36px; margin: 0 auto 8px; display: block; opacity: .3; }
.empty p { font-size: 13px; }

/* Toast */
#toast-wrap {
  position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
  left: 50%; transform: translateX(-50%); z-index: 200;
  display: flex; flex-direction: column; gap: 6px; align-items: center;
}
.toast {
  background: var(--fg); color: #fff; border-radius: 20px; padding: 8px 16px;
  font-size: 12px; font-weight: 600; white-space: nowrap;

<script>
const EXPENSE_CATS = ['Food','Transport','Housing','Bills','Shopping','Health','Entertainment','Other'];
const INCOME_CATS  = ['Salary','Freelance','Investment','Gift','Other'];
const CURRENCIES   = ['USD','INR'];

const S = {
  tab: 'dashboard', transactions: [],
  portfolio: { savings: [], loans: [], goldLoans: [], investments: [], insurance: [] },
  recurring: { items: [], creditCards: [] },
  txCurrency: 'USD',
  addingInvestment: false, addingInsurance: false,
  addEntryType: null, portfolioAddType: null, recurringAddType: null, activityCurFilter: null,
  editingId: null, editSection: null, expandedLoan: null, expandedGoldLoan: null, expandedSaving: null, showingPPForm: null, showingGoldPayForm: null, selectedMonth: null,
  secOpen: { recIncome: true, bills: true, cards: true, tx: true, catBreak: false, savings: true, loans: true, goldLoans: true, investments: true, insurance: true, projections: true, netWorth: false },
};

function save() {
  try {
    localStorage.setItem('mmc.tx.v1', JSON.stringify(S.transactions));
    localStorage.setItem('mmc.portfolio.v1', JSON.stringify(S.portfolio));
    localStorage.setItem('mmc.recurring.v1', JSON.stringify(S.recurring));
    localStorage.setItem('mmc.lastCurrency.v1', S.txCurrency);
    const backup = JSON.stringify({version:3, transactions:S.transactions, portfolio:S.portfolio, recurring:S.recurring});
    localStorage.setItem('mmc.backup', backup);
    localStorage.setItem('mmc.backup.time', new Date().toISOString());
  } catch(e) {}
}

function load() {
  try { const tx = localStorage.getItem('mmc.tx.v1'); if (tx) S.transactions = JSON.parse(tx); } catch(e) { S.transactions = []; }
  try { const p = localStorage.getItem('mmc.portfolio.v1'); if (p) S.portfolio = Object.assign({savings:[],loans:[],goldLoans:[],investments:[],insurance:[]}, JSON.parse(p)); } catch(e) {}
  if (!S.portfolio.insurance) S.portfolio.insurance = [];
  S.portfolio.loans = S.portfolio.loans.map(l => ({partPayments:[], ...l}));
  S.portfolio.savings = S.portfolio.savings.map(s => ({payments:[], ...s}));
  S.portfolio.goldLoans = S.portfolio.goldLoans.map(g => ({payments:[], ...g}));
  try { const r = localStorage.getItem('mmc.recurring.v1'); if (r) S.recurring = JSON.parse(r); } catch(e) {}
  if (!S.recurring) S.recurring = {items:[], creditCards:[]};
  if (!S.recurring.items) S.recurring.items = [];
  if (!S.recurring.creditCards) S.recurring.creditCards = [];
  // also try old keys for migration
  if (!S.transactions.length) { try { const tx = localStorage.getItem('budget.tx.v1'); if (tx) S.transactions = JSON.parse(tx); } catch(e) {} }
  if (!S.portfolio.savings.length && !S.portfolio.loans.length) { try { const p = localStorage.getItem('budget.portfolio.v1'); if (p) S.portfolio = Object.assign({savings:[],loans:[],goldLoans:[],investments:[],insurance:[]}, JSON.parse(p)); } catch(e) {} }
  S.txCurrency = localStorage.getItem('mmc.lastCurrency.v1') || localStorage.getItem('budget.lastCurrency.v1') || 'USD';
  S.selectedMonth = thisMonth();
}


const uid = () => { try { return crypto.randomUUID(); } catch(e) { return Math.random().toString(36).slice(2)+Date.now().toString(36); } };
const todayISO = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const getCur = t => t.currency || 'USD';

function formatMoney(n, cur='USD') {
  if (isNaN(n)) n = 0;
  return new Intl.NumberFormat(cur==='INR'?'en-IN':'en-US',{style:'currency',currency:cur,maximumFractionDigits:0}).format(n);
}
function fmtDate(iso) { if (!iso) return ''; return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function computeEmi(principal, ratePct, years) {
  const n = years * 12; if (!n || !principal) return 0;
  if (!ratePct) return principal / n;
  const r = ratePct / 100 / 12, pow = Math.pow(1+r,n);
  return (principal * r * pow) / (pow - 1);
}
function monthsElapsed(startISO) {
  const start = new Date(startISO), now = new Date();
  let m = (now.getFullYear()-start.getFullYear())*12+(now.getMonth()-start.getMonth());
  if (now.getDate() < start.getDate()) m--;
  return Math.max(0, m);
}
function computeOutstanding(loan) {
  const {principal,startDate,tenureYears,interestRate} = loan;
  if (!startDate||!principal) return principal||0;
  const n = tenureYears*12, elapsed = Math.min(monthsElapsed(startDate),n);
  const emi = computeEmi(principal,interestRate,tenureYears), r = interestRate/100/12;
  const payments = (loan.partPayments||[]).slice().sort((a,b)=>a.date<b.date?-1:1);
  const start = new Date(startDate);
  let bal = principal;
  for (let i=1;i<=elapsed;i++) {
    const mDate = new Date(start); mDate.setMonth(mDate.getMonth()+i);
    const interest = bal*r, princ = Math.min(emi-interest, bal);
    bal = Math.max(0, bal-princ);
    // apply part payments whose date falls within this month
    const mStr = mDate.toISOString().slice(0,7); // "YYYY-MM"
    for (const p of payments) {
      if ((p.date||'').slice(0,7)===mStr) bal = Math.max(0, bal-p.amount);
    }
  }
  return bal;
}
function computeScheduleToDate(loan) {
  const {principal,startDate,tenureYears,interestRate} = loan;
  if (!startDate||!principal) return [];
  const n = tenureYears*12, elapsed = Math.min(monthsElapsed(startDate),n);
  const emi = computeEmi(principal,interestRate,tenureYears), r = interestRate/100/12;
  const payments = (loan.partPayments||[]).slice().sort((a,b)=>a.date<b.date?-1:1);
  const start = new Date(startDate);
  let bal = principal; const rows = [];
  for (let i=1;i<=elapsed;i++) {
    const mDate = new Date(start); mDate.setMonth(mDate.getMonth()+i);
    const interest=bal*r, princ=Math.min(emi-interest,bal);
    bal = Math.max(0,bal-princ);
    const mStr = mDate.toISOString().slice(0,7);
    let partPaid = 0;
    for (const p of payments) {
      if ((p.date||'').slice(0,7)===mStr) { partPaid+=p.amount; bal=Math.max(0,bal-p.amount); }
    }
    rows.push({month:i,date:mDate.toLocaleDateString('en-US',{month:'short',year:'2-digit'}),interest,principal:princ,emi,balance:bal,partPaid:partPaid||0});
  }
  return rows;
}
function computeGoldLoanInterest(loan) {
  const {principal,interestRate,startDate} = loan; if (!principal||!interestRate) return 0;
  const start = startDate ? new Date(startDate) : new Date();
  const days = Math.min(365,Math.max(0,Math.floor((Date.now()-start.getTime())/86400000)));
  return (principal*interestRate*days)/(100*365);
}
function computeGoldSchedule(loan) {
  const {principal,interestRate,startDate} = loan; if (!principal||!interestRate||!startDate) return [];
  const start = new Date(startDate);
  const days = Math.min(365,Math.max(0,Math.floor((Date.now()-start.getTime())/86400000)));
  const dailyRate = (principal*interestRate)/(100*365); const rows = [];
  for (let i=1;i<=days;i++) {
    if (i%30===0||i===days) { const d=new Date(start); d.setDate(d.getDate()+i); rows.push({day:i,date:d.toLocaleDateString('en-US',{month:'short',day:'numeric'}),daily:dailyRate,total:principal+dailyRate*i}); }
  }
  return rows;
}

function toast(msg) {
  const wrap = document.getElementById('toast-wrap'), el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg; wrap.appendChild(el);
  setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),220); },2500);
}

// SVG icons
const svgArrowUp   = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>`;
const svgArrowDown = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="7" y1="7" x2="17" y2="17"/><polyline points="17 7 17 17 7 17"/></svg>`;
const svgTrash     = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6m5 0V4h4v2"/></svg>`;
const svgPlus      = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
const svgChevron   = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>`;
const svgChevronLeft  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>`;
const svgChevronRight = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>`;
const svgEdit      = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg>`;
const svgBank      = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8L2 7h20l-6-4z"/></svg>`;
const svgHome      = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
const svgGold      = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 3"/></svg>`;
const svgChart     = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M21 7v6h-6"/></svg>`;
const svgCard      = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>`;
const svgUndo      = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M3 13a9 9 0 1 0 3-7.7L3 7"/></svg>`;
const svgTransfer  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>`;
const svgShield    = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`;

function curOptions(sel) { return CURRENCIES.map(c=>`<option value="${c}"${c===sel?' selected':''}>${c}</option>`).join(''); }
const otherCur = c => CURRENCIES.find(x=>x!==c) || CURRENCIES[0];
function catOptions(type, sel) { return (type==='income'?INCOME_CATS:EXPENSE_CATS).map(c=>`<option value="${c}"${c===sel?' selected':''}>${c}</option>`).join(''); }

// ── Dashboard Overview ─────────────────────────────────────────────────────────
function renderOverviewCards() {
  const allCurs = new Set();
  for (const t of S.transactions) allCurs.add(getCur(t));
  for (const i of [...S.portfolio.savings,...S.portfolio.loans,...S.portfolio.goldLoans]) allCurs.add(getCur(i));
  if (!allCurs.size) allCurs.add('USD');

  const isOpen = S.secOpen.netWorth;

  if (!isOpen) {
    // Compact collapsed view
    const compactCards = [...allCurs].map(cur => {
      const sav = S.portfolio.savings.filter(i=>getCur(i)===cur).reduce((a,i)=>a+i.amount,0);
      const inv = S.portfolio.investments.filter(i=>getCur(i)===cur).reduce((a,i)=>a+(i.currentValue||0),0);
      let txIncome=0, txExpense=0;
      for (const t of S.transactions) { if (t.type==='transfer') continue; if (getCur(t)!==cur) continue; if (t.type==='income') txIncome+=t.amount; else txExpense+=t.amount; }
      let transferNet = 0;
      for (const t of S.transactions) {
        if (t.type!=='transfer') continue;
        if (t.fromCurrency===cur) transferNet -= t.fromAmount;
        if (t.toCurrency===cur) transferNet += t.toAmount;
      }
      const txNet = txIncome - txExpense + transferNet;
      const credit = sav + inv + Math.max(0, txNet);
      const loans = S.portfolio.loans.filter(i=>getCur(i)===cur&&!i.closed).reduce((a,i)=>a+computeOutstanding(i),0);
      const gold  = S.portfolio.goldLoans.filter(i=>getCur(i)===cur&&!i.closed).reduce((a,i)=>a+i.principal+computeGoldLoanInterest(i),0);
      const debt  = loans + gold;
      const net = credit - debt;
      const netColor = net >= 0 ? 'var(--income)' : 'var(--expense)';
      return `<div class="card nw-compact" data-action="toggle-section" data-sec="netWorth" style="cursor:pointer">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="sec-dot" style="background:${netColor}"></span>
            <span style="font-size:13px;font-weight:800">Net Worth</span>
            <span style="font-size:11px;color:var(--muted-fg)">${cur}</span>
          </div>
          <span style="font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;color:${netColor}">${formatMoney(net, cur)}</span>
        </div>
      </div>`;
    }).join('');
    return compactCards;
  }

  // Expanded view (original)
  const cards = [...allCurs].map(cur => {
    const sav = S.portfolio.savings.filter(i=>getCur(i)===cur).reduce((a,i)=>a+i.amount,0);
    const inv = S.portfolio.investments.filter(i=>getCur(i)===cur).reduce((a,i)=>a+(i.currentValue||0),0);
    let txIncome=0, txExpense=0;
    for (const t of S.transactions) { if (t.type==='transfer') continue; if (getCur(t)!==cur) continue; if (t.type==='income') txIncome+=t.amount; else txExpense+=t.amount; }
    let transferNet = 0;
    for (const t of S.transactions) {
      if (t.type!=='transfer') continue;
      if (t.fromCurrency===cur) transferNet -= t.fromAmount;
      if (t.toCurrency===cur) transferNet += t.toAmount;
    }
    const txNet = txIncome - txExpense + transferNet;
    const credit = sav + inv + Math.max(0, txNet);
    const loans = S.portfolio.loans.filter(i=>getCur(i)===cur&&!i.closed).reduce((a,i)=>a+computeOutstanding(i),0);
    const gold  = S.portfolio.goldLoans.filter(i=>getCur(i)===cur&&!i.closed).reduce((a,i)=>a+i.principal+computeGoldLoanInterest(i),0);
    const debt  = loans + gold;
    const net = credit - debt;
    const netColor = net >= 0 ? 'var(--income)' : 'var(--expense)';

    const creditSubs = [
      sav>0?`Savings ${formatMoney(sav,cur)}`:'',
      inv>0?`Investments ${formatMoney(inv,cur)}`:'',
      txIncome>0?`Income ${formatMoney(txIncome,cur)}`:'',
      txExpense>0?`Expenses −${formatMoney(txExpense,cur)}`:'',
      txNet>0?`Surplus ${formatMoney(txNet,cur)}`:''
    ].filter(Boolean).join(' · ') || 'No savings, investments, or income surplus';

    const debtSubs = [
      loans>0?`Loans ${formatMoney(loans,cur)}`:'',
      gold>0?`Gold ${formatMoney(gold,cur)}`:''
    ].filter(Boolean).join(' · ') || 'No outstanding debt';

    return `<div class="card" data-action="toggle-section" data-sec="netWorth" style="cursor:pointer">
      <div class="sec-hdr"><div><div class="sec-title-row"><span class="sec-dot" style="background:${netColor}"></span><span class="sec-title">${cur}</span></div><div class="sec-sub">Net Worth</div></div></div>
      <div style="padding:0 16px 12px;font-size:26px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums;color:${netColor}">${formatMoney(net, cur)}</div>
      <div class="p-row">
        <div class="p-row-meta"><div class="p-row-name" style="color:var(--income)">Credit</div><div class="p-row-sub" style="max-width:none">${creditSubs}</div></div>
        <div class="p-row-right"><span class="p-row-amt grn">${formatMoney(credit, cur)}</span></div>
      </div>
      <div class="p-row">
        <div class="p-row-meta"><div class="p-row-name" style="color:var(--expense)">Debt</div><div class="p-row-sub" style="max-width:none">${debtSubs}</div></div>
        <div class="p-row-right"><span class="p-row-amt red">${formatMoney(debt, cur)}</span></div>
      </div>
    </div>`;
  }).join('');

  return cards + renderProjections();
}

function formatInsights(txt) {
  const lines = txt.split('\n');
  let html = '';
  for (const raw of lines) {
    const line = raw.trim();
    if (!line) { html += '<div style="height:8px"></div>'; continue; }
    let s = esc(line);
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(?<!\*)\*([^*]+?)\*(?!\*)/g, '<em>$1</em>');
    if (/^#{1,3}\s/.test(line)) {
      const t = s.replace(/^#{1,3}\s+/, '');
      html += `<div style="font-weight:700;font-size:13px;margin:10px 0 4px;color:var(--text)">${t}</div>`;
    } else if (/^[*\-•]\s+/.test(line)) {
      const t = s.replace(/^[*\-•]\s+/, '');
      html += `<div style="padding-left:12px;margin:2px 0">• ${t}</div>`;
    } else {
      html += `<div style="margin:2px 0">${s}</div>`;
    }
  }
  return html;
}


async function callAI(prompt, setResult, setLoading, cacheKey) {
  const apiKey = localStorage.getItem('mmc.apiKey');
  const provider = localStorage.getItem('mmc.aiProvider') || 'claude';
  if (!apiKey) { toast('Set your API key in Settings'); return; }

  setLoading(true); setResult('');
  renderInsights();

  try {
    let text;
    if (provider === 'gemini') {
      const resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-goog-api-key': apiKey },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });
      if (!resp.ok) {
        const err = await resp.text();
        throw new Error(resp.status === 400 ? 'Invalid API key. Check your key in Settings.' : `API error: ${resp.status} - ${err}`);
      }
      const data = await resp.json();
      text = data.candidates?.[0]?.content?.parts?.map(p => p.text).filter(Boolean).join('\n') || '';
    } else {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1024,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      if (!resp.ok) {
        const err = await resp.text();
        throw new Error(resp.status === 401 ? 'Invalid API key. Check your key in Settings.' : `API error: ${resp.status} - ${err}`);
      }
      const data = await resp.json();
      text = data.content?.[0]?.text;
    }
    const result = text || 'No response received';
    setResult(result);
    localStorage.setItem(cacheKey, result);
  } catch(e) {
    setResult('Error: ' + (e.message || String(e)));
  }
  setLoading(false);
  renderInsights();
}

function buildPortfolioSummary() {
  const lines = [];
  const allCurs = new Set();
  S.transactions.forEach(t => allCurs.add(getCur(t)));
  [...S.portfolio.savings,...S.portfolio.loans,...S.portfolio.goldLoans,...S.portfolio.investments,...(S.portfolio.insurance||[])].forEach(i => allCurs.add(getCur(i)));

  for (const cur of allCurs) {
    lines.push(`\n--- ${cur} ---`);
    const sav = S.portfolio.savings.filter(i=>getCur(i)===cur).reduce((a,i)=>a+i.amount,0);
    if (sav) lines.push(`Savings: ${formatMoney(sav,cur)}`);

    let txInc=0, txExp=0;
    const mon = thisMonth();
    S.transactions.filter(t=>t.type!=='transfer'&&getCur(t)===cur&&localTxMonth(t.date)===mon).forEach(t=>{
      if(t.type==='income') txInc+=t.amount; else txExp+=t.amount;
    });
    if (txInc||txExp) lines.push(`This month: Income ${formatMoney(txInc,cur)}, Expenses ${formatMoney(txExp,cur)}`);

    const recInc = (S.recurring?.items||[]).filter(i=>i.type==='income'&&getCur(i)===cur);
    if (recInc.length) lines.push(`Recurring income: ${recInc.map(i=>`${i.name} ${formatMoney(i.amount,cur)}`).join(', ')}`);

    const recExp = (S.recurring?.items||[]).filter(i=>i.type==='expense'&&getCur(i)===cur);
    if (recExp.length) lines.push(`Recurring bills: ${recExp.map(i=>`${i.name} ${formatMoney(i.amount||0,cur)}`).join(', ')}`);

    const loans = S.portfolio.loans.filter(i=>getCur(i)===cur);
    if (loans.length) lines.push(`Loans: ${loans.map(l=>`${l.name} outstanding ${formatMoney(computeOutstanding(l),cur)} @ ${l.interestRate}%`).join(', ')}`);

    const gold = S.portfolio.goldLoans.filter(i=>getCur(i)===cur&&!i.closed);
    if (gold.length) lines.push(`Gold loans: ${gold.map(g=>`${g.name} principal ${formatMoney(g.principal,cur)} @ ${g.interestRate}%`).join(', ')}`);

    const inv = S.portfolio.investments.filter(i=>getCur(i)===cur);
    if (inv.length) lines.push(`Investments: ${inv.map(i=>`${i.name} (${i.type||'Other'}) invested ${formatMoney(i.amountInvested,cur)} current ${formatMoney(i.currentValue,cur)}`).join(', ')}`);

    const ins = (S.portfolio.insurance||[]).filter(i=>getCur(i)===cur);
    if (ins.length) lines.push(`Insurance: ${ins.map(i=>`${i.name} (${i.type||''}) sum assured ${formatMoney(i.sumAssured,cur)}`).join(', ')}`);
  }
  return lines.join('\n');
}

// ── Transactions ───────────────────────────────────────────────────────────────
const thisMonth = () => todayISO().slice(0,7);
const localTxMonth = iso => { const d=new Date(iso); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };

function fmtMonth(mon) {
  return new Date(parseInt(mon),parseInt(mon.slice(5))-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
}

function shiftMonth(mon, delta) {
  const [y,m] = mon.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

// ISO date for a new transaction within `mon`: now if it's the current month, else the last day of `mon`
function dateInMonth(mon) {
  if (mon === thisMonth()) return new Date().toISOString();
  const [y,m] = mon.split('-').map(Number);
  return new Date(y, m, 0, 12).toISOString();
}

function renderHeroCards() {
  const mon = S.selectedMonth;
  const monthLabel = fmtMonth(mon);
  const byCur = {};
  const add = (cur, type, amt) => { if (!byCur[cur]) byCur[cur]={income:0,expense:0}; byCur[cur][type]+=amt; };

  // Outstanding balance from all past months (closing balance up to previous month)
  const prevBal = {};
  for (const t of S.transactions) {
    if (!t.date || localTxMonth(t.date) >= mon) continue;
    if (t.type==='transfer') {
      prevBal[t.fromCurrency] = (prevBal[t.fromCurrency]||0) - t.fromAmount;
      prevBal[t.toCurrency] = (prevBal[t.toCurrency]||0) + t.toAmount;
      continue;
    }
    const c = getCur(t);
    prevBal[c] = (prevBal[c]||0) + (t.type==='income' ? t.amount : -t.amount);
  }
  for (const loan of S.portfolio.loans) {
    for (const p of (loan.partPayments || [])) { if (p.date && localTxMonth(p.date) < mon) { const c=getCur(loan); prevBal[c]=(prevBal[c]||0)-p.amount; } }
  }
  for (const loan of S.portfolio.goldLoans) {
    for (const p of (loan.payments || [])) { if (p.date && localTxMonth(p.date) < mon) { const c=getCur(loan); prevBal[c]=(prevBal[c]||0)-p.amount; } }
  }

  // recurring-linked txIds for this month (avoid double counting with S.transactions)
  const recurTxIds = new Set();
  for (const item of (S.recurring?.items||[])) { const ms=item.months?.[mon]; if (ms?.txId) recurTxIds.add(ms.txId); }
  for (const card of (S.recurring?.creditCards||[])) { const ms=card.months?.[mon]; if (ms?.txId) recurTxIds.add(ms.txId); }

  for (const t of S.transactions) {
    if (!t.date || localTxMonth(t.date) !== mon) continue;
    if (recurTxIds.has(t.id)) continue;
    if (t.type==='transfer') { add(t.fromCurrency,'expense',t.fromAmount); add(t.toCurrency,'income',t.toAmount); continue; }
    add(getCur(t), t.type==='income'?'income':'expense', t.amount);
  }
  // confirmed recurring income / paid bills for this month
  for (const item of (S.recurring?.items||[])) {
    const ms = item.months?.[mon];
    if (ms?.paid && ms.amount>0) add(item.currency||'USD', item.type==='income'?'income':'expense', ms.amount);
  }
  // paid credit card bills for this month
  for (const card of (S.recurring?.creditCards||[])) {
    const ms = card.months?.[mon];
    if (ms?.paid && ms.amount>0) add(card.currency||'USD', 'expense', ms.amount);
  }
  // portfolio activity for this month
  for (const loan of S.portfolio.loans) {
    for (const p of (loan.partPayments || [])) { if (p.date && localTxMonth(p.date) === mon) add(getCur(loan), 'expense', p.amount); }
  }
  for (const loan of S.portfolio.goldLoans) {
    for (const p of (loan.payments || [])) { if (p.date && localTxMonth(p.date) === mon) add(getCur(loan), 'expense', p.amount); }
  }

  // Ensure currencies with prior balance but no current-month activity show up
  for (const c of Object.keys(prevBal)) { if (!byCur[c]) byCur[c] = {income:0, expense:0}; }

  if (!Object.keys(byCur).length) byCur['USD'] = {income:0,expense:0};
  return Object.entries(byCur).map(([cur,{income,expense}]) => {
    const prev = prevBal[cur] || 0;
    const net = prev + income - expense;
    // Top 3 expense categories for this currency this month
    const catTotals = {};
    for (const t of S.transactions) {
      if (!t.date || localTxMonth(t.date) !== mon || t.type !== 'expense' || getCur(t) !== cur) continue;
      const cat = t.category || 'Other';
      catTotals[cat] = (catTotals[cat] || 0) + t.amount;
    }
    const totalExp = Object.values(catTotals).reduce((a, b) => a + b, 0);
    const topCats = Object.entries(catTotals).sort((a, b) => b[1] - a[1]).slice(0, 3);
    const catChips = topCats.length ? `<div class="chips" style="margin-top:6px">${topCats.map(([cat, amt]) => {
      const pct = totalExp ? Math.round(amt / totalExp * 100) : 0;
      return `<div class="chip" style="flex:none"><span style="font-size:9px;font-weight:700">${esc(cat)} ${pct}%</span></div>`;
    }).join('')}</div>` : '';
    return `<div class="card-hero">
    <div class="eyebrow">${cur} · ${monthLabel}</div>
    <div class="amount">${formatMoney(net,cur)}</div>
    <div class="chips">
      ${prev?`<div class="chip"><div class="chip-lbl">Prev Bal</div><div class="chip-val${prev>=0?' inc':' exp'}">${formatMoney(prev,cur)}</div></div>`:''}
      <div class="chip"><div class="chip-lbl">Income</div><div class="chip-val inc">${formatMoney(income,cur)}</div></div>
      <div class="chip"><div class="chip-lbl">Expenses</div><div class="chip-val exp">${formatMoney(expense,cur)}</div></div>
    </div>
    ${catChips}
  </div>`;
  }).join('');
}

function renderCatBreakdown() {
  const mon = S.selectedMonth;
  const expByCur = {};
  const incByCur = {};
  const transfers = [];
  const addExp = (cur, cat, amt, subName) => {
    if (!expByCur[cur]) expByCur[cur] = {};
    if (!expByCur[cur][cat]) expByCur[cur][cat] = {amt:0, sub:{}};
    expByCur[cur][cat].amt += amt;
    if (subName) expByCur[cur][cat].sub[subName] = (expByCur[cur][cat].sub[subName]||0) + amt;
  };
  const addInc = (cur, cat, amt) => { if (!incByCur[cur]) incByCur[cur]={}; incByCur[cur][cat]=(incByCur[cur][cat]||0)+amt; };

  const recurTxIds = new Set();
  for (const item of (S.recurring?.items||[])) { const ms=item.months?.[mon]; if (ms?.txId) recurTxIds.add(ms.txId); }
  for (const card of (S.recurring?.creditCards||[])) { const ms=card.months?.[mon]; if (ms?.txId) recurTxIds.add(ms.txId); }

  for (const t of S.transactions) {
    if (!t.date || localTxMonth(t.date)!==mon) continue;
    if (recurTxIds.has(t.id)) continue;
    if (t.type==='transfer') { transfers.push(t); continue; }
    if (t.type==='income') { addInc(getCur(t), t.category, t.amount); continue; }
    if (t.category==='Bills' && t.note) {
      if (/ CC Bill$/.test(t.note)) addExp(getCur(t), 'Credit Card', t.amount, t.note.replace(/ CC Bill$/, ''));
      else addExp(getCur(t), 'Bills', t.amount, t.note);
    } else {
      addExp(getCur(t), t.category, t.amount);
    }
  }

  const curs = [...new Set([...Object.keys(expByCur), ...Object.keys(incByCur)])];
  const monthLabel = fmtMonth(mon);
  const isOpen = S.secOpen.catBreak;
  const hdr = `<div class="sec-hdr" data-action="toggle-section" data-sec="catBreak" style="cursor:pointer${isOpen?'':';padding-bottom:14px'}">
      <div><div class="sec-title-row"><span class="sec-dot blue"></span><span class="sec-title">By Category</span></div><div class="sec-sub">${monthLabel}</div></div>
    </div>`;
  if (!curs.length && !transfers.length) return `<div class="card">${hdr}${isOpen?`<div class="empty" style="padding-top:8px"><p>No activity yet</p></div>`:''}</div>`;
  if (!isOpen) return `<div class="card">${hdr}</div>`;

  const sections = curs.map(cur => {
    let html = curs.length>1 ? `<div class="cur-section-label">${cur}</div>` : '';
    const cats = expByCur[cur];
    if (cats) {
      const total = Object.values(cats).reduce((a,c)=>a+c.amt,0);
      html += Object.entries(cats).sort((a,b)=>b[1].amt-a[1].amt).map(([cat,{amt,sub}])=>{
        const pct = Math.round(amt/total*100);
        const subRows = Object.entries(sub).sort((a,b)=>b[1]-a[1]).map(([name,subAmt])=>
          `<div class="cat-subrow"><span>${esc(name)}</span><span>${formatMoney(subAmt,cur)}</span></div>`).join('');
        return `<div class="cat-row">
          <div class="cat-hdr"><span class="cat-name">${esc(cat)}</span><span><span class="cat-amt">${formatMoney(amt,cur)}</span><span class="cat-pct">${pct}%</span></span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
          ${subRows}
        </div>`;
      }).join('');
    }
    const incCats = incByCur[cur];
    if (incCats) {
      const incTotal = Object.values(incCats).reduce((a,b)=>a+b,0);
      html += `<div class="rec-sub-hdr">Income</div>` + Object.entries(incCats).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
        const pct = Math.round(amt/incTotal*100);
        return `<div class="cat-row">
          <div class="cat-hdr"><span class="cat-name">${esc(cat)}</span><span><span class="cat-amt grn">${formatMoney(amt,cur)}</span><span class="cat-pct">${pct}%</span></span></div>
          <div class="bar-bg"><div class="bar-fill inc" style="width:${pct}%"></div></div>
        </div>`;
      }).join('');
    }
    return html;
  }).join('');

  let transferSection = '';
  if (transfers.length) {
    transferSection = `<div class="rec-sub-hdr">Transfers</div>` + transfers.map(t =>
      `<div class="cat-row"><div class="cat-hdr"><span class="cat-name">Transfer</span><span class="cat-amt">${formatMoney(t.fromAmount,t.fromCurrency)} → ${formatMoney(t.toAmount,t.toCurrency)}</span></div></div>`
    ).join('');
  }

  return `<div class="card">${hdr}<div class="cat-wrap">${sections}${transferSection}</div></div>`;
}

function computeProjections() {
  const curMonth = thisMonth();
  const past3 = [1,2,3].map(d => shiftMonth(curMonth, -d));
  const recurTxIds = new Set();
  for (const item of (S.recurring?.items||[])) for (const mon of Object.keys(item.months||{})) { if (item.months[mon]?.txId) recurTxIds.add(item.months[mon].txId); }
  for (const card of (S.recurring?.creditCards||[])) for (const mon of Object.keys(card.months||{})) { if (card.months[mon]?.txId) recurTxIds.add(card.months[mon].txId); }
  const allCurs = new Set();
  S.transactions.forEach(t => allCurs.add(getCur(t)));
  (S.recurring?.items||[]).forEach(i => allCurs.add(getCur(i)));
  (S.recurring?.creditCards||[]).forEach(c => allCurs.add(getCur(c)));
  const results = {};
  for (const cur of allCurs) {
    let incTotal = 0, expTotal = 0;
    for (const mon of past3) {
      for (const t of S.transactions.filter(t => localTxMonth(t.date)===mon && getCur(t)===cur && !recurTxIds.has(t.id))) {
        if (t.type==='income') incTotal += t.amount;
        else if (t.type==='expense') expTotal += t.amount;
      }
    }
    const txAvgInc = incTotal/3, txAvgExp = expTotal/3;
    let recIncome = 0, recExpense = 0;
    for (const item of (S.recurring?.items||[])) {
      if (getCur(item) !== cur) continue;
      if (item.type === 'income') { recIncome += item.amount || 0; }
      else {
        if (item.isVariable) {
          let sum = 0, cnt = 0;
          for (const mon of past3) { const a = item.months?.[mon]?.amount; if (a) { sum+=a; cnt++; } }
          recExpense += cnt ? sum/cnt : 0;
        } else { recExpense += item.amount || 0; }
      }
    }
    for (const card of (S.recurring?.creditCards||[])) {
      if (getCur(card) !== cur) continue;
      let sum = 0, cnt = 0;
      for (const mon of past3) { const a = card.months?.[mon]?.amount; if (a) { sum+=a; cnt++; } }
      recExpense += cnt ? sum/cnt : 0;
    }
    const mInc = recIncome + txAvgInc, mExp = recExpense + txAvgExp;
    if (mInc || mExp) {
      results[cur] = { monthlyIncome: mInc, monthlyExpense: mExp };
    }
  }
  return results;
}

function renderProjections() {
  const proj = computeProjections();
  const curs = Object.keys(proj);
  if (!curs.length) return '';
  const hdr = `<div class="sec-hdr" data-action="toggle-section" data-sec="projections" style="cursor:pointer"><div><div class="sec-title-row"><span class="sec-dot" style="background:#8b5cf6"></span><span class="sec-title">Projections</span></div><div class="sec-sub">Estimated income & expenses</div></div></div>`;
  if (S.secOpen && S.secOpen.projections === false) return `<div class="card">${hdr}</div>`;
  let body = '';
  for (const cur of curs) {
    const p = proj[cur];
    const periods = [3,6,12];
    const fmtRow = (label, color, valFn) => `<div class="p-row" style="gap:0">
      <div class="p-row-meta" style="flex:0 0 70px"><div class="p-row-name" style="color:${color};font-size:11px">${label}</div></div>
      ${periods.map(m => `<div style="flex:1;text-align:right;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;color:${color};padding:0 4px">${valFn(m)}</div>`).join('')}
    </div>`;
    const hdrRow = `<div class="p-row" style="gap:0;border-top:none;padding-top:12px">
      <div class="p-row-meta" style="flex:0 0 70px"><div class="p-row-name" style="font-size:12px">${cur}</div></div>
      ${periods.map(m => `<div style="flex:1;text-align:right;font-size:10px;font-weight:500;color:var(--muted-fg);padding:0 4px">${m} Months</div>`).join('')}
    </div>`;
    body += hdrRow;
    body += fmtRow('Income', 'var(--income)', m => formatMoney(p.monthlyIncome*m, cur));
    body += fmtRow('Expense', 'var(--expense)', m => formatMoney(p.monthlyExpense*m, cur));
    body += fmtRow('Surplus', '', m => {
      const s = p.monthlyIncome*m - p.monthlyExpense*m;
      return `<span style="color:${s>=0?'var(--income)':'var(--expense)'}">${s<0?'−':''}${formatMoney(Math.abs(s), cur)}</span>`;
    });
  }
  return `<div class="card">${hdr}${body}</div>`;
}

function renderActivity() {
  const mon = S.selectedMonth;
  const entries = [];

  for (const t of S.transactions) {
    if (!t.date || localTxMonth(t.date) !== mon) continue;
    if (t.type==='transfer') {
      entries.push({ date: t.date, icon: 'transfer', iconSvg: svgTransfer, name: 'Transfer', meta: t.note ? esc(t.note) + ' · ' + fmtDate(t.date) : fmtDate(t.date), amtHtml: `<span class="tx-amount transfer">${formatMoney(t.fromAmount,t.fromCurrency)} → ${formatMoney(t.toAmount,t.toCurrency)}</span>`, delBtn: `<button class="tx-del" data-action="del-tx" data-id="${t.id}" title="Delete">${svgTrash}</button>`, badge: '', currencies: [t.fromCurrency, t.toCurrency], source: 'txn' });
    } else {
      const isIncome = t.type==='income';
      const isBill = t.category==='Bills' && t.note;
      const dispName = isBill ? t.note : t.category;
      const dispMeta = isBill ? fmtDate(t.date) : (t.note ? esc(t.note) + ' · ' + fmtDate(t.date) : fmtDate(t.date));
      entries.push({ date: t.date, icon: t.type, iconSvg: isIncome ? svgArrowUp : svgArrowDown, name: dispName, meta: dispMeta, amtHtml: `<span class="tx-amount ${t.type}">${isIncome?'+':'−'}${formatMoney(t.amount,getCur(t))}</span>`, delBtn: `<button class="tx-del" data-action="del-tx" data-id="${t.id}" title="Delete">${svgTrash}</button>`, badge: getCur(t), source: 'txn' });
    }
  }

  for (const loan of S.portfolio.loans) {
    for (const p of (loan.partPayments || [])) {
      if (localTxMonth(p.date) !== mon) continue;
      entries.push({ date: p.date, icon: 'expense', iconSvg: svgArrowDown, name: 'Part Payment: ' + loan.name, meta: (p.note ? esc(p.note) + ' · ' : '') + fmtDate(p.date), amtHtml: `<span class="tx-amount expense">−${formatMoney(p.amount, getCur(loan))}</span>`, delBtn: '', badge: getCur(loan), source: 'loan' });
    }
  }

  for (const loan of S.portfolio.goldLoans) {
    for (const p of (loan.payments || [])) {
      if (localTxMonth(p.date) !== mon) continue;
      entries.push({ date: p.date, icon: 'expense', iconSvg: svgArrowDown, name: 'Gold Loan Payment: ' + loan.name, meta: (p.note ? esc(p.note) + ' · ' : '') + fmtDate(p.date), amtHtml: `<span class="tx-amount expense">−${formatMoney(p.amount, getCur(loan))}</span>`, delBtn: '', badge: getCur(loan), source: 'gold' });
    }
  }

  const allCurs = [...new Set(entries.flatMap(e => e.currencies || (e.badge ? [e.badge] : [])))];
  const filter = S.activityCurFilter;
  const filtered = filter ? entries.filter(e => e.currencies ? e.currencies.includes(filter) : e.badge === filter) : entries;

  const isOpen = S.secOpen.tx;
  const hdr = `<div class="sec-hdr" data-action="toggle-section" data-sec="tx" style="cursor:pointer${isOpen?'':';padding-bottom:14px'}">
      <div><div class="sec-title-row"><span class="sec-dot blue"></span><span class="sec-title">All Activity</span></div><div class="sec-sub">${filtered.length?`${filtered.length} this month`:'Recent activity'}</div></div>
    </div>`;
  const filterChips = allCurs.length > 1 ? `<div class="toggle-chip-row" style="padding:4px 16px 8px">
    <button class="toggle-chip${!filter?' active':''}" data-action="filter-activity-cur" data-cur="">All</button>
    ${allCurs.map(c=>`<button class="toggle-chip${filter===c?' active':''}" data-action="filter-activity-cur" data-cur="${c}">${c}</button>`).join('')}
  </div>` : '';
  if (!isOpen) return `<div class="card">${hdr}</div>`;
  if (!filtered.length) return `<div class="card">${hdr}${filterChips}<div class="empty"><p>No activity this month</p></div></div>`;

  filtered.sort((a, b) => b.date.localeCompare(a.date));

  const sourceColors = { txn: '', loan: '#ef4444', saving: '#10b981', gold: '#f59e0b' };
  const sourceLabels = { txn: '', loan: 'Loan', saving: 'Savings', gold: 'Gold Loan' };

  const todayStr = todayISO();
  const yesterdayDate = new Date(); yesterdayDate.setDate(yesterdayDate.getDate() - 1);
  const yesterdayStr = `${yesterdayDate.getFullYear()}-${String(yesterdayDate.getMonth()+1).padStart(2,'0')}-${String(yesterdayDate.getDate()).padStart(2,'0')}`;
  let lastDateGroup = '';
  const rows = filtered.map(e => {
    const srcPill = e.source !== 'txn' ? `<span class="tx-badge" style="background:${sourceColors[e.source]}20;color:${sourceColors[e.source]}">${sourceLabels[e.source]}</span>` : '';
    const entryDate = e.date.slice(0, 10);
    let dateHdr = '';
    if (entryDate !== lastDateGroup) {
      lastDateGroup = entryDate;
      let dateLabel;
      if (entryDate === todayStr) dateLabel = 'Today';
      else if (entryDate === yesterdayStr) dateLabel = 'Yesterday';
      else dateLabel = new Date(entryDate + 'T12:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric'});
      dateHdr = `<li class="tx-date-hdr">${dateLabel}</li>`;
    }
    return `${dateHdr}<li class="tx-row">
      <div class="tx-icon ${e.icon}">${e.iconSvg}</div>
      <div class="tx-body"><div class="tx-cat">${esc(e.name)}${e.badge?`<span class="tx-badge">${e.badge}</span>`:''}${srcPill}</div><div class="tx-meta">${e.meta}</div></div>
      <div class="tx-right">${e.amtHtml}</div>
      ${e.delBtn}
    </li>`;
  }).join('');
  return `<div class="card">${hdr}${filterChips}<ul class="tx-list">${rows}</ul></div>`;
}

function renderPortfolio() {
  document.getElementById('tab-portfolio').innerHTML =
    renderPortfolioSummary() + renderSavings() + renderLoans() + renderGoldLoans() + renderInvestmentsCard() + renderInsuranceCard();
}

function getPortfolioCurrencies() {
  const curs = new Set();
  for (const i of [...S.portfolio.savings,...S.portfolio.loans,...S.portfolio.goldLoans]) curs.add(getCur(i));
  if (!curs.size) curs.add('USD');
  return [...curs];
}

function renderPortfolioSummary() {
  if (!S.portfolio.savings.length && !S.portfolio.loans.length && !S.portfolio.goldLoans.length) return '';
  return getPortfolioCurrencies().map(cur => {
    const sav = S.portfolio.savings.filter(i=>getCur(i)===cur).reduce((a,i)=>a+i.amount,0);
    const loans = S.portfolio.loans.filter(i=>getCur(i)===cur&&!i.closed).reduce((a,i)=>a+computeOutstanding(i),0);
    const gold = S.portfolio.goldLoans.filter(i=>getCur(i)===cur&&!i.closed).reduce((a,i)=>a+i.principal+computeGoldLoanInterest(i),0);
    return `<div class="cards-row">
      <div class="stat-card"><div class="sc-label"><span class="sc-dot" style="background:#10b981;display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle"></span>Savings · ${cur}</div><div class="sc-amount income">${formatMoney(sav,cur)}</div></div>
      <div class="stat-card"><div class="sc-label"><span class="sc-dot" style="background:#f43f5e;display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle"></span>Loans · ${cur}</div><div class="sc-amount expense">${formatMoney(loans+gold,cur)}</div></div>
    </div>`;
  }).join('');
}

// ── Actions ───────────────────────────────────────────────────────────────────
function formData(form) { const o={}; for (const [k,v] of new FormData(form).entries()) o[k]=v; return o; }

function handleSubmit(e) {
  const form = e.target, action = form.dataset.action;
  if (!action) return; e.preventDefault();
  const d = formData(form);

  if (action==='save-api-key') {
    const key = (d.apiKey||'').trim();
    if (key) { localStorage.setItem('mmc.apiKey', key); toast('API key saved'); }
    else { localStorage.removeItem('mmc.apiKey'); toast('API key removed'); }
    return;
  }

  if (action==='add-tx') {
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    const type = S.addEntryType==='tx-income' ? 'income' : 'expense';
    const txDate = d.date ? new Date(d.date+'T12:00:00').toISOString() : new Date().toISOString();
    S.transactions.unshift({id:uid(),type,amount,category:d.category,note:d.note||undefined,date:txDate,currency:d.currency});
    if (d.currency) { S.txCurrency=d.currency; localStorage.setItem('mmc.lastCurrency.v1',d.currency); }
    S.addEntryType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderDashboard(); toast('Transaction added'); return;
  }
  if (action==='add-recurring-income') {
    if (!d.name.trim()) return toast('Name is required');
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    S.recurring.items.push({id:uid(),name:d.name.trim(),type:'income',category:d.category||'Salary',amount,currency:d.currency,dayOfMonth:d.dayOfMonth?parseInt(d.dayOfMonth):undefined,months:{},createdAt:todayISO()});
    if (d.currency) { S.txCurrency=d.currency; localStorage.setItem('mmc.lastCurrency.v1',d.currency); }
    S.recurringAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderDashboard(); renderRecurring(); toast('Recurring income added'); return;
  }
  if (action==='add-bill') {
    if (!d.name.trim()) return toast('Name is required');
    const isVariable = d.isVariable==='1';
    const amount = isVariable ? 0 : (parseFloat(d.amount)||0);
    S.recurring.items.push({id:uid(),name:d.name.trim(),type:'expense',isVariable,amount,currency:d.currency,dayOfMonth:d.dayOfMonth?parseInt(d.dayOfMonth):undefined,months:{},createdAt:todayISO()});
    if (d.currency) { S.txCurrency=d.currency; localStorage.setItem('mmc.lastCurrency.v1',d.currency); }
    S.recurringAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderDashboard(); renderRecurring(); toast('Bill added'); return;
  }
  if (action==='add-credit-card') {
    if (!d.name.trim()) return toast('Card name is required');
    const dueDay = parseInt(d.dueDay); if (!dueDay||dueDay<1||dueDay>31) return toast('Enter a valid due day');
    S.recurring.creditCards.push({id:uid(),name:d.name.trim(),currency:d.currency,dueDay,months:{},createdAt:todayISO()});
    if (d.currency) { S.txCurrency=d.currency; localStorage.setItem('mmc.lastCurrency.v1',d.currency); }
    S.recurringAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderDashboard(); renderRecurring(); toast('Card added'); return;
  }
  if (action==='add-transfer') {
    const fromAmount = parseFloat(d.fromAmount), toAmount = parseFloat(d.toAmount);
    if (!fromAmount||fromAmount<=0||!toAmount||toAmount<=0) return toast('Enter valid amounts');
    if (d.fromCurrency===d.toCurrency) return toast('Choose two different currencies');
    const txDate = d.date ? new Date(d.date+'T12:00:00').toISOString() : new Date().toISOString();
    S.transactions.unshift({id:uid(),type:'transfer',fromCurrency:d.fromCurrency,fromAmount,toCurrency:d.toCurrency,toAmount,currency:d.fromCurrency,note:d.note||undefined,date:txDate});
    S.txCurrency=d.fromCurrency; localStorage.setItem('mmc.lastCurrency.v1',d.fromCurrency);
    S.addEntryType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderDashboard(); toast('Transfer recorded'); return;
  }
  if (action==='add-savings-fund') {
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    const saving = S.portfolio.savings.find(s=>s.id===d.savingId);
    if (!saving) return;
    if (!saving.payments) saving.payments = [];
    const txDate = d.date ? new Date(d.date+'T12:00:00').toISOString() : new Date().toISOString();
    saving.payments.unshift({id:uid(), date:d.date||todayISO(), amount, type:d.type||'deposit', note:d.note||undefined});
    if (d.type==='deposit') { saving.amount += amount; S.transactions.unshift({id:uid(),type:'expense',amount,category:'Saving',note:saving.name+(d.note?' - '+d.note:''),date:txDate,currency:getCur(saving)}); }
    else { saving.amount = Math.max(0, saving.amount - amount); S.transactions.unshift({id:uid(),type:'income',amount,category:'Saving',note:saving.name+(d.note?' - '+d.note:''),date:txDate,currency:getCur(saving)}); }
    S.addEntryType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderDashboard(); renderPortfolio(); toast((d.type==='deposit'?'Deposit':'Withdrawal')+' recorded'); return;
  }
  if (action==='save-card-bill') {
    const card = S.recurring.creditCards.find(c=>c.id===form.dataset.id); if (!card) return;
    const mon = S.selectedMonth; if (!card.months) card.months = {};
    const amount = parseFloat(d.amount)||0;
    card.months[mon] = {...(card.months[mon]||{}), amount};
    const txId = uid();
    S.transactions.unshift({id:txId,type:'expense',amount,category:'Bills',note:card.name+' CC Bill',date:dateInMonth(mon),currency:card.currency||'INR'});
    card.months[mon].paid = true; card.months[mon].txId = txId;
    save(); renderDashboard(); renderRecurring(); toast(card.name+' bill recorded'); return;
  }
  if (action==='mark-variable-bill') {
    const item = S.recurring.items.find(i=>i.id===form.dataset.id); if (!item) return;
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    const mon = S.selectedMonth; if (!item.months) item.months = {};
    const txId = uid();
    S.transactions.unshift({id:txId,type:'expense',amount,category:'Bills',note:item.name,date:dateInMonth(mon),currency:item.currency||'INR'});
    item.months[mon] = {paid:true, amount, txId};
    save(); renderDashboard(); renderRecurring(); toast(item.name+' marked paid'); return;
  }
  if (action==='add-saving') {
