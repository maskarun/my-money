    const amount = parseFloat(d.amount); if (!amount||amount<0) return toast('Enter a valid amount');
    S.portfolio.savings.unshift({id:uid(),name:d.name.trim(),institution:d.institution||undefined,amount,interestRate:d.interestRate?parseFloat(d.interestRate):undefined,note:d.note||undefined,currency:d.currency,createdAt:todayISO()});
    S.portfolioAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderPortfolio(); toast('Saving added'); return;
  }
  if (action==='update-saving') {
    const amount = parseFloat(d.amount);
    S.portfolio.savings = S.portfolio.savings.map(i=>i.id===form.dataset.id?{...i,name:d.name.trim(),institution:d.institution||undefined,amount,interestRate:d.interestRate?parseFloat(d.interestRate):undefined,note:d.note||undefined,currency:d.currency}:i);
    S.editingId=null; S.editSection=null; save(); renderPortfolio(); toast('Saving updated'); return;
  }
  if (action==='add-investment') {
    if (!d.name.trim()) return toast('Name is required');
    const amountInvested = parseFloat(d.amountInvested); const currentValue = parseFloat(d.currentValue);
    if (!(amountInvested>=0) || !(currentValue>=0)) return toast('Enter valid amounts');
    S.portfolio.investments.unshift({id:uid(),name:d.name.trim(),type:d.type||undefined,amountInvested,currentValue,note:d.note||undefined,currency:d.currency,createdAt:todayISO()});
    S.addingInvestment=false; S.portfolioAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderPortfolio(); toast('Investment added'); return;
  }
  if (action==='update-investment') {
    const amountInvested = parseFloat(d.amountInvested); const currentValue = parseFloat(d.currentValue);
    S.portfolio.investments = S.portfolio.investments.map(i=>i.id===form.dataset.id?{...i,name:d.name.trim(),type:d.type||undefined,amountInvested,currentValue,note:d.note||undefined,currency:d.currency}:i);
    S.editingId=null; S.editSection=null; save(); renderPortfolio(); toast('Investment updated'); return;
  }
  if (action==='add-insurance') {
    if (!d.name.trim()) return toast('Name is required');
    const sumAssured = parseFloat(d.sumAssured);
    if (!(sumAssured>=0)) return toast('Enter valid sum assured');
    if (!d.startDate) return toast('Start date is required');
    const premium = d.premium ? parseFloat(d.premium) : undefined;
    S.portfolio.insurance.unshift({id:uid(),name:d.name.trim(),type:d.type||undefined,sumAssured,premium,premiumFreq:d.premiumFreq||'Yearly',startDate:d.startDate,endDate:d.endDate||undefined,note:d.note||undefined,currency:d.currency,createdAt:todayISO()});
    S.addingInsurance=false; S.portfolioAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderPortfolio(); toast('Policy added'); return;
  }
  if (action==='update-insurance') {
    const sumAssured = parseFloat(d.sumAssured);
    const premium = d.premium ? parseFloat(d.premium) : undefined;
    S.portfolio.insurance = S.portfolio.insurance.map(i=>i.id===form.dataset.id?{...i,name:d.name.trim(),type:d.type||undefined,sumAssured,premium,premiumFreq:d.premiumFreq||'Yearly',startDate:d.startDate,endDate:d.endDate||undefined,note:d.note||undefined,currency:d.currency}:i);
    S.editingId=null; S.editSection=null; save(); renderPortfolio(); toast('Policy updated'); return;
  }
  if (action==='add-loan') {
    if (!d.name.trim()) return toast('Name is required');
    const emi = computeEmi(parseFloat(d.principal), parseFloat(d.interestRate), parseFloat(d.tenureYears));
    const loanId = uid();
    const recurId = uid();
    const loan = {id:loanId,name:d.name.trim(),lender:d.lender||undefined,principal:parseFloat(d.principal),startDate:d.startDate,tenureYears:parseFloat(d.tenureYears),interestRate:parseFloat(d.interestRate),note:d.note||undefined,currency:d.currency,partPayments:[],createdAt:todayISO()};
    if (emi > 0) { loan.linkedRecurringId = recurId; S.recurring.items.push({id:recurId,name:d.name.trim(),type:'expense',amount:Math.round(emi*100)/100,currency:d.currency,months:{},createdAt:todayISO(),linkedLoanId:loanId}); }
    S.portfolio.loans.unshift(loan);
    S.portfolioAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderPortfolio(); renderRecurring(); toast('Loan added'); return;
  }
  if (action==='update-loan') {
    S.portfolio.loans = S.portfolio.loans.map(i=>i.id===form.dataset.id?{...i,name:d.name.trim(),lender:d.lender||undefined,principal:parseFloat(d.principal),startDate:d.startDate,tenureYears:parseFloat(d.tenureYears),interestRate:parseFloat(d.interestRate),note:d.note||undefined,currency:d.currency}:i);
    S.editingId=null; S.editSection=null; save(); renderPortfolio(); toast('Loan updated'); return;
  }
  if (action==='add-part-payment') {
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    const loan = S.portfolio.loans.find(l=>l.id===form.dataset.id);
    if (!loan) return;
    if (!loan.partPayments) loan.partPayments = [];
    loan.partPayments.unshift({id:uid(), date:d.date||todayISO(), amount, note:d.note||undefined});
    S.showingPPForm=null; save(); renderPortfolio(); toast('Part payment recorded'); return;
  }
  if (action==='add-gold-payment') {
    const amount = parseFloat(d.amount); if (!amount||amount<=0) return toast('Enter a valid amount');
    const loan = S.portfolio.goldLoans.find(l=>l.id===form.dataset.id);
    if (!loan) return;
    if (!loan.payments) loan.payments = [];
    loan.payments.unshift({id:uid(), date:d.date||todayISO(), amount, note:d.note||undefined});
    loan.principal = Math.max(0, loan.principal - amount);
    S.showingGoldPayForm=null; save(); renderPortfolio(); renderDashboard(); toast('Payment recorded'); return;
  }
  if (action==='add-gold') {
    if (!d.name.trim()) return toast('Name is required');
    const principal = parseFloat(d.principal), rate = parseFloat(d.interestRate);
    const loanId = uid();
    const recurId = uid();
    const loan = {id:loanId,name:d.name.trim(),lender:d.lender||undefined,principal,interestRate:rate,startDate:d.startDate||undefined,note:d.note||undefined,currency:d.currency,createdAt:todayISO()};
    const monthlyInterest = (principal && rate) ? Math.round(principal * rate / 100 / 12 * 100) / 100 : 0;
    if (monthlyInterest > 0) {
      const startMon = d.startDate ? d.startDate.slice(0,7) : thisMonth();
      const endMon = shiftMonth(startMon, 11);
      loan.linkedRecurringId = recurId;
      S.recurring.items.push({id:recurId,name:d.name.trim(),type:'expense',amount:monthlyInterest,currency:d.currency,months:{},createdAt:todayISO(),startMonth:startMon,endMonth:endMon,linkedLoanId:loanId});
    }
    S.portfolio.goldLoans.unshift(loan);
    S.portfolioAddType=null; document.getElementById('bottom-sheet').style.display='none'; save(); renderPortfolio(); renderRecurring(); toast('Gold loan added'); return;
  }
  if (action==='update-gold') {
    S.portfolio.goldLoans = S.portfolio.goldLoans.map(i=>i.id===form.dataset.id?{...i,name:d.name.trim(),lender:d.lender||undefined,principal:parseFloat(d.principal),interestRate:parseFloat(d.interestRate),startDate:d.startDate||undefined,note:d.note||undefined,currency:d.currency}:i);
    S.editingId=null; S.editSection=null; save(); renderPortfolio(); toast('Gold loan updated'); return;
  }
}

function handleClick(e) {
  const btn = e.target.closest('[data-action]'); if (!btn) return;
  const action = btn.dataset.action;

  if (action==='switch-tab') {
    const tabMap = { transactions: 'dashboard', investments: 'portfolio' };
    let tab = btn.dataset.tab;
    if (tabMap[tab]) tab = tabMap[tab];
    if (!['dashboard','portfolio','recurring','settings','insights'].includes(tab)) tab = 'dashboard';
    S.tab = tab;
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('tab-'+S.tab).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===S.tab));
    if (S.tab==='dashboard') renderDashboard();
    else if (S.tab==='portfolio') renderPortfolio();
    else if (S.tab==='recurring') renderRecurring();
    else if (S.tab==='insights') renderInsights();
    else if (S.tab==='settings') renderSettings();
    updateHeaderMonthNav();
    const fab = document.getElementById('fab'); if(fab) fab.classList.toggle('hidden', !['dashboard','portfolio','recurring'].includes(S.tab));
    return;
  }
  if (action==='prev-month') { S.selectedMonth = shiftMonth(S.selectedMonth, -1); renderDashboard(); renderRecurring(); return; }
  if (action==='next-month') { const next = shiftMonth(S.selectedMonth, 1); if (next <= thisMonth()) S.selectedMonth = next; renderDashboard(); renderRecurring(); return; }
  if (action==='goto-current-month') { S.selectedMonth = thisMonth(); renderDashboard(); renderRecurring(); return; }
  if (action==='filter-activity-cur') { S.activityCurFilter = btn.dataset.cur || null; renderDashboard(); return; }
  if (action==='toggle-add-entry') { S.addEntryType = S.addEntryType ? null : 'tx-expense'; renderDashboard(); return; }
  if (action==='set-entry-type') { S.addEntryType=btn.dataset.type; const bs=document.getElementById('bottom-sheet'); if(bs.style.display!=='none'){document.getElementById('bottom-sheet-content').innerHTML=renderQuickAdd();}else{renderDashboard();} return; }
  if (action==='cancel-entry') { S.addEntryType=null; document.getElementById('bottom-sheet').style.display='none'; renderDashboard(); return; }
  if (action==='toggle-fab') {
    const bs=document.getElementById('bottom-sheet'), bsc=document.getElementById('bottom-sheet-content');
    if (S.tab==='portfolio') { if(!S.portfolioAddType) S.portfolioAddType='saving'; bsc.innerHTML=renderPortfolioQuickAdd(); }
    else if (S.tab==='recurring') { if(!S.recurringAddType) S.recurringAddType='recurring-income'; bsc.innerHTML=renderRecurringQuickAdd(); }
    else { if(!S.addEntryType) S.addEntryType='tx-expense'; bsc.innerHTML=renderQuickAdd(); }
    bs.style.display=''; return;
  }
  if (action==='close-fab-backdrop') { if (btn.id==='bottom-sheet') { S.addEntryType=null; btn.style.display='none'; } return; }
  if (action==='toggle-recurring-add') { S.recurringAddType = S.recurringAddType ? null : 'recurring-income'; renderRecurring(); return; }
  if (action==='set-recurring-add-type') { S.recurringAddType=btn.dataset.type; const bs=document.getElementById('bottom-sheet'); if(bs.style.display!=='none'){document.getElementById('bottom-sheet-content').innerHTML=renderRecurringQuickAdd();}else{renderRecurring();} return; }
  if (action==='cancel-recurring-add') { S.recurringAddType=null; document.getElementById('bottom-sheet').style.display='none'; renderRecurring(); return; }
  if (action==='confirm-recurring') {
    const item = S.recurring.items.find(i=>i.id===btn.dataset.id); if (!item) return;
    const mon = S.selectedMonth;
    if (!item.months) item.months = {};
    const txId = uid();
    S.transactions.unshift({id:txId,type:'income',amount:item.amount,category:item.category||'Salary',note:item.name,date:dateInMonth(mon),currency:item.currency||'USD'});
    item.months[mon] = {paid:true, amount:item.amount, txId};
    save(); renderDashboard(); renderRecurring(); toast(item.name+' credited'); return;
  }
  if (action==='unmark-recurring-item') {
    const item = S.recurring.items.find(i=>i.id===btn.dataset.id); if (!item) return;
    const mon = S.selectedMonth; const ms = item.months?.[mon]; if (!ms) return;
    if (ms.txId) S.transactions = S.transactions.filter(t=>t.id!==ms.txId);
    ms.paid = false; ms.txId = undefined;
    save(); renderDashboard(); renderRecurring(); toast(item.name+' marked unpaid'); return;
  }
  if (action==='unmark-card') {
    const card = S.recurring.creditCards.find(c=>c.id===btn.dataset.id); if (!card) return;
    const mon = S.selectedMonth; const ms = card.months?.[mon]; if (!ms) return;
    if (ms.txId) S.transactions = S.transactions.filter(t=>t.id!==ms.txId);
    ms.paid = false; ms.txId = undefined;
    save(); renderDashboard(); renderRecurring(); toast(card.name+' marked unpaid'); return;
  }
  if (action==='del-recurring-item') {
    if (!confirm('Remove this recurring entry?')) return;
    S.recurring.items = S.recurring.items.filter(i=>i.id!==btn.dataset.id); save(); renderDashboard(); renderRecurring(); return;
  }
  // Bills
  if (action==='mark-bill-paid') {
    const item = S.recurring.items.find(i=>i.id===btn.dataset.id); if (!item) return;
    const mon = S.selectedMonth;
    if (!item.months) item.months = {};
    const txId = uid();
    S.transactions.unshift({id:txId,type:'expense',amount:item.amount,category:'Bills',note:item.name,date:dateInMonth(mon),currency:item.currency||'INR'});
    item.months[mon] = {paid:true, amount:item.amount, txId};
    save(); renderDashboard(); renderRecurring(); toast(item.name+' marked paid'); return;
  }

  if (action==='del-credit-card') {
    if (!confirm('Remove this card?')) return;
    S.recurring.creditCards = S.recurring.creditCards.filter(c=>c.id!==btn.dataset.id); save(); renderDashboard(); renderRecurring(); return;
  }
  if (action==='del-tx') {
    if (!confirm('Delete this transaction?')) return;
    S.transactions=S.transactions.filter(t=>t.id!==btn.dataset.id); save(); renderDashboard(); return;
  }
  if (action==='toggle-add-investment') { S.addingInvestment=!S.addingInvestment; S.editingId=null; renderPortfolio(); return; }
  if (action==='cancel-investment') { S.addingInvestment=false; S.portfolioAddType=null; S.editingId=null; S.editSection=null; document.getElementById('bottom-sheet').style.display='none'; renderPortfolio(); return; }
  if (action==='edit-investment') { S.editingId=btn.dataset.id; S.editSection='investment'; S.addingInvestment=false; renderPortfolio(); return; }
  if (action==='del-investment') {
    if (!confirm('Delete this investment?')) return;
    S.portfolio.investments=S.portfolio.investments.filter(i=>i.id!==btn.dataset.id); save(); renderPortfolio(); return;
  }
  if (action==='toggle-add-insurance') { S.addingInsurance=!S.addingInsurance; S.editingId=null; renderPortfolio(); return; }
  if (action==='cancel-insurance') { S.addingInsurance=false; S.portfolioAddType=null; S.editingId=null; S.editSection=null; document.getElementById('bottom-sheet').style.display='none'; renderPortfolio(); return; }
  if (action==='edit-insurance') { S.editingId=btn.dataset.id; S.editSection='insurance'; S.addingInsurance=false; renderPortfolio(); return; }
  if (action==='del-insurance') {
    if (!confirm('Delete this policy?')) return;
    S.portfolio.insurance=S.portfolio.insurance.filter(i=>i.id!==btn.dataset.id); save(); renderPortfolio(); return;
  }
  if (action==='toggle-portfolio-add') { S.portfolioAddType=S.portfolioAddType?null:'saving'; renderPortfolio(); return; }
  if (action==='set-portfolio-add-type') { S.portfolioAddType=btn.dataset.type; const bs=document.getElementById('bottom-sheet'); if(bs.style.display!=='none'){document.getElementById('bottom-sheet-content').innerHTML=renderPortfolioQuickAdd();}else{renderPortfolio();} return; }
  if (action==='cancel-saving') { S.portfolioAddType=null; S.editingId=null; S.editSection=null; document.getElementById('bottom-sheet').style.display='none'; renderPortfolio(); return; }
  if (action==='edit-saving') { S.editingId=btn.dataset.id; S.editSection='saving'; renderPortfolio(); return; }
  if (action==='del-saving') {
    if (!confirm('Delete this saving?')) return;
    S.portfolio.savings=S.portfolio.savings.filter(i=>i.id!==btn.dataset.id); save(); renderPortfolio(); return;
  }
  if (action==='cancel-loan') { S.portfolioAddType=null; S.editingId=null; S.editSection=null; document.getElementById('bottom-sheet').style.display='none'; renderPortfolio(); return; }
  if (action==='edit-loan') { S.editingId=btn.dataset.id; S.editSection='loan'; renderPortfolio(); return; }
  if (action==='del-loan') {
    if (!confirm('Delete this loan?')) return;
    const loan = S.portfolio.loans.find(l=>l.id===btn.dataset.id);
    if (loan?.linkedRecurringId) S.recurring.items = S.recurring.items.filter(i=>i.id!==loan.linkedRecurringId);
    S.portfolio.loans=S.portfolio.loans.filter(i=>i.id!==btn.dataset.id); save(); renderPortfolio(); renderRecurring(); return;
  }
  if (action==='close-loan') {
    const loan = S.portfolio.loans.find(l=>l.id===btn.dataset.id); if (!loan) return;
    loan.closed = true; loan.closedDate = new Date().toISOString();
    if (loan.linkedRecurringId) { const item = (S.recurring?.items||[]).find(i=>i.id===loan.linkedRecurringId); if (item && !item.closed) { item.closed=true; item.closedDate=loan.closedDate; } }
    save(); renderPortfolio(); renderRecurring(); toast(loan.name + ' closed'); return;
  }
  if (action==='reopen-loan') {
    const loan = S.portfolio.loans.find(l=>l.id===btn.dataset.id); if (!loan) return;
    loan.closed = false; delete loan.closedDate;
    if (loan.linkedRecurringId) { const item = (S.recurring?.items||[]).find(i=>i.id===loan.linkedRecurringId); if (item && item.closed) { item.closed=false; delete item.closedDate; } }
    save(); renderPortfolio(); renderRecurring(); toast(loan.name + ' reopened'); return;
  }
  if (action==='toggle-loan') { S.expandedLoan=S.expandedLoan===btn.dataset.id?null:btn.dataset.id; S.showingPPForm=null; renderPortfolio(); return; }
  if (action==='toggle-pp-form') { S.showingPPForm=S.showingPPForm===btn.dataset.id?null:btn.dataset.id; renderPortfolio(); return; }
  if (action==='toggle-saving') { S.expandedSaving=S.expandedSaving===btn.dataset.id?null:btn.dataset.id; renderPortfolio(); return; }
  if (action==='toggle-gold-pay-form') { S.showingGoldPayForm=S.showingGoldPayForm===btn.dataset.id?null:btn.dataset.id; renderPortfolio(); return; }


  if (action==='toggle-section') { const k=btn.dataset.sec; S.secOpen[k]=!S.secOpen[k]; renderDashboard(); renderPortfolio(); renderRecurring(); return; }
  if (action==='del-part-payment') {
    if (!confirm('Delete this payment?')) return;
    const loan = S.portfolio.loans.find(l=>l.id===btn.dataset.loanId);
    if (loan) { loan.partPayments=(loan.partPayments||[]).filter(p=>p.id!==btn.dataset.paymentId); save(); renderPortfolio(); }
    return;
  }
  if (action==='del-saving-payment') {
    if (!confirm('Delete this payment?')) return;
    const saving = S.portfolio.savings.find(s=>s.id===btn.dataset.savingId);
    if (saving) {
      const pay = (saving.payments||[]).find(p=>p.id===btn.dataset.paymentId);
      if (pay) { if (pay.type==='deposit') saving.amount = Math.max(0, saving.amount - pay.amount); else saving.amount += pay.amount; }
      saving.payments = (saving.payments||[]).filter(p=>p.id!==btn.dataset.paymentId);
      save(); renderPortfolio(); renderDashboard();
    }
    return;
  }
  if (action==='del-gold-payment') {
    if (!confirm('Delete this payment?')) return;
    const loan = S.portfolio.goldLoans.find(l=>l.id===btn.dataset.goldId);
    if (loan) {
      const pay = (loan.payments||[]).find(p=>p.id===btn.dataset.paymentId);
      if (pay) loan.principal += pay.amount;
      loan.payments = (loan.payments||[]).filter(p=>p.id!==btn.dataset.paymentId);
      save(); renderPortfolio(); renderDashboard();
    }
    return;
  }
  if (action==='cancel-gold') { S.portfolioAddType=null; S.editingId=null; S.editSection=null; document.getElementById('bottom-sheet').style.display='none'; renderPortfolio(); return; }
  if (action==='edit-gold') { S.editingId=btn.dataset.id; S.editSection='goldLoan'; renderPortfolio(); return; }
  if (action==='close-gold') {
    const loan = S.portfolio.goldLoans.find(l=>l.id===btn.dataset.id); if (!loan) return;
    loan.closed = true; loan.closedDate = new Date().toISOString();
    if (loan.linkedRecurringId) { const item = (S.recurring?.items||[]).find(i=>i.id===loan.linkedRecurringId); if (item && !item.closed) { item.closed=true; item.closedDate=loan.closedDate; } }
    save(); renderPortfolio(); renderRecurring(); toast(loan.name + ' closed'); return;
  }
  if (action==='reopen-gold') {
    const loan = S.portfolio.goldLoans.find(l=>l.id===btn.dataset.id); if (!loan) return;
    loan.closed = false; delete loan.closedDate;
    if (loan.linkedRecurringId) { const item = (S.recurring?.items||[]).find(i=>i.id===loan.linkedRecurringId); if (item && item.closed) { item.closed=false; delete item.closedDate; } }
    save(); renderPortfolio(); renderRecurring(); toast(loan.name + ' reopened'); return;
  }
  if (action==='del-gold') {
    if (!confirm('Delete this gold loan?')) return;
    const loan = S.portfolio.goldLoans.find(l=>l.id===btn.dataset.id);
    if (loan?.linkedRecurringId) S.recurring.items = S.recurring.items.filter(i=>i.id!==loan.linkedRecurringId);
    S.portfolio.goldLoans=S.portfolio.goldLoans.filter(i=>i.id!==btn.dataset.id); save(); renderPortfolio(); renderRecurring(); return;
  }
  if (action==='toggle-gold') { S.expandedGoldLoan=S.expandedGoldLoan===btn.dataset.id?null:btn.dataset.id; renderPortfolio(); return; }
  if (action==='export') { exportJSON(); return; }
  if (action==='get-insights') { getInsights(); return; }
  if (action==='get-invest-suggestions') { getInvestmentSuggestions(); return; }
  if (action==='import-trigger') { document.getElementById('file-input').click(); return; }
  if (action==='restore-backup') {
    if (!confirm('Restore from last auto-backup? This will overwrite current data.')) return;
    const raw = localStorage.getItem('mmc.backup');
    if (!raw) { toast('No backup found'); return; }
    try {
      const data = JSON.parse(raw);
      S.transactions = data.transactions || [];
      S.portfolio = Object.assign({savings:[],loans:[],goldLoans:[],investments:[],insurance:[]}, data.portfolio||{});
      S.recurring = Object.assign({items:[],creditCards:[]}, data.recurring||{});
      save(); renderDashboard(); renderPortfolio(); renderRecurring(); renderSettings();
      toast('Restored from backup');
    } catch(e) { toast('Backup corrupted'); }
    return;
  }
}

function handleInput(e) {
  const inp = e.target;
  if (inp.hasAttribute('data-loan-preview')) {
    const form = inp.closest('form'); if (!form) return;
    const p=parseFloat(form.querySelector('[name=principal]')?.value)||0;
    const r=parseFloat(form.querySelector('[name=interestRate]')?.value)||0;
    const y=parseFloat(form.querySelector('[name=tenureYears]')?.value)||0;
    const emi=computeEmi(p,r,y), totalInt=emi*y*12-p;
    const c=form.querySelector('[name=currency]')?.value||'USD';
    const ep=document.getElementById('prev-emi'), ei=document.getElementById('prev-int'), et=document.getElementById('prev-total');
    if (ep) ep.textContent=emi?formatMoney(emi,c):'—';
    if (ei) ei.textContent=totalInt>0?formatMoney(totalInt,c):'—';
    if (et) et.textContent=(emi&&p)?formatMoney(emi*y*12,c):'—';
  }
  if (inp.hasAttribute('data-gold-preview')) {
    const form = inp.closest('form'); if (!form) return;
    const p=parseFloat(form.querySelector('[name=principal]')?.value)||0;
    const r=parseFloat(form.querySelector('[name=interestRate]')?.value)||0;
    const c=form.querySelector('[name=currency]')?.value||'USD';
    const annualInt=(p*r)/100;
    const gp=document.getElementById('gprev-p'), gi=document.getElementById('gprev-i'), gt=document.getElementById('gprev-t');
    if (gp) gp.textContent=p?formatMoney(p,c):'—';
    if (gi) gi.textContent=annualInt?formatMoney(annualInt,c):'—';
    if (gt) gt.textContent=(p&&annualInt)?formatMoney(p+annualInt,c):'—';
  }
  if (inp.name==='currency' && inp.closest('[data-action="add-tx"]')) {
    S.txCurrency=inp.value; localStorage.setItem('mmc.lastCurrency.v1',inp.value);
  }
}

function exportJSON() {
  const payload = JSON.stringify({version:3,transactions:S.transactions,portfolio:S.portfolio,recurring:S.recurring},null,2);
  const fname = 'my-money.json';
  const blob = new Blob([payload],{type:'application/json'}), url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=fname;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000); toast('Exported ' + fname);
}

document.getElementById('file-input').addEventListener('change', async function(e) {
  const file = e.target.files[0]; if (!file) return;
  try {
    const data = JSON.parse(await file.text());
    let transactions, portfolio, recurring;
    if (Array.isArray(data)) { transactions=data; portfolio={savings:[],loans:[],goldLoans:[]}; recurring={items:[],creditCards:[]}; }
    else {
      transactions=data.transactions||[];
      portfolio=Object.assign({savings:[],loans:[],goldLoans:[]},data.portfolio||{});
      recurring=Object.assign({items:[],creditCards:[]},data.recurring||{});
    }
    S.transactions=transactions; S.portfolio=portfolio; S.recurring=recurring;
    save(); renderDashboard(); renderPortfolio(); renderRecurring(); renderSettings(); toast(`Imported ${transactions.length} transactions`);
  } catch(err) { toast('Import failed — invalid JSON'); }
  this.value='';
});

document.addEventListener('submit', handleSubmit);
document.addEventListener('click', handleClick);
document.addEventListener('input', handleInput);
document.addEventListener('change', function(e) {
  if (e.target.dataset.action === 'change-ai-provider') {
    localStorage.setItem('mmc.aiProvider', e.target.value);
    toast('Provider changed to ' + (e.target.value === 'gemini' ? 'Gemini' : 'Claude') + '.');
    renderSettings();
  }
});

load(); renderDashboard(); renderPortfolio(); renderRecurring(); renderInsights(); renderSettings();
document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
</script>
<script>
(function(){
  const c = document.createElement('canvas');
  c.width = c.height = 180;
  const ctx = c.getContext('2d');
  const r = 38;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(180-r,0); ctx.quadraticCurveTo(180,0,180,r);
  ctx.lineTo(180,180-r); ctx.quadraticCurveTo(180,180,180-r,180);
  ctx.lineTo(r,180); ctx.quadraticCurveTo(0,180,0,180-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();
  ctx.fillStyle='#0369a1'; ctx.fill();
  ctx.save(); ctx.clip();
  function wave(y1,cp,y2,fill){
    ctx.beginPath();
    ctx.moveTo(0,y1);
    ctx.quadraticCurveTo(45,cp,73,y1);
    ctx.quadraticCurveTo(102,y2,131,y1);
    ctx.quadraticCurveTo(160,cp,180,y1);
    ctx.lineTo(180,180); ctx.lineTo(0,180);
    ctx.closePath();
    ctx.fillStyle=fill; ctx.fill();
  }
  wave(139,115,163,'#0284c7');
  wave(106,82,130,'#0ea5e9');
  wave(74,49,98,'#38bdf8');
  ctx.restore();
  ctx.beginPath(); ctx.arc(90,57,28,0,Math.PI*2);
  ctx.fillStyle='#fbbf24'; ctx.fill();
  ctx.beginPath(); ctx.arc(90,57,22,0,Math.PI*2);
  ctx.strokeStyle='#d97706'; ctx.lineWidth=3; ctx.stroke();
  ctx.font='900 26px Inter,sans-serif';
  ctx.fillStyle='#92400e'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('₹$',90,59);
  document.getElementById('ati').href = c.toDataURL('image/png');
})();
</script>
